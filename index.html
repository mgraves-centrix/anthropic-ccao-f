/* ============================================================
   CCAO-F Practice Console
   Aesthetic: precise "measurement instrument" for a credential.
   Signature: the calibration bar (100-1000 scaled score, 720 cut).
   ============================================================ */

:root {
  --ink: #191b21;
  --ink-2: #3b4049;
  --muted: #6b717a;
  --paper: #eef0ee;          /* cool light ground, deliberately not cream */
  --surface: #ffffff;
  --surface-2: #f7f8f7;
  --line: #e0e2de;
  --line-strong: #c9ccc6;

  --accent: #3b44d9;         /* indigo signal */
  --accent-ink: #2a31a8;
  --accent-tint: #ececfb;

  --correct: #17925a;
  --correct-tint: #e4f3eb;
  --wrong: #ce3a32;
  --wrong-tint: #fbe9e7;
  --warn: #b07a00;

  --slate: #9aa0a6;          /* below-cut fill */

  --font-display: "Space Grotesk", system-ui, -apple-system, sans-serif;
  --font-body: "Inter", system-ui, -apple-system, sans-serif;
  --font-mono: "IBM Plex Mono", ui-monospace, "SFMono-Regular", monospace;

  --r: 6px;
  --r-sm: 4px;
  --maxw: 1080px;
  --shadow: 0 1px 2px rgba(25,27,33,.05), 0 4px 16px rgba(25,27,33,.06);
}

* { box-sizing: border-box; }

html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  font-family: var(--font-body);
  color: var(--ink);
  background: var(--paper);
  line-height: 1.55;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 600; line-height: 1.15; margin: 0; letter-spacing: -.01em; }
p { margin: 0 0 .8em; }
a { color: var(--accent-ink); }

.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.eyebrow {
  font-family: var(--font-mono);
  font-size: .68rem;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--muted);
}

:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: var(--r-sm);
}

/* ---------- shell ---------- */
.shell { min-height: 100vh; display: flex; flex-direction: column; }

.masthead {
  position: sticky; top: 0; z-index: 50;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
}
.masthead__inner {
  max-width: var(--maxw); margin: 0 auto;
  padding: .7rem 1.25rem;
  display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
}
.brand { display: flex; align-items: center; gap: .7rem; text-decoration: none; color: var(--ink); margin-right: auto; }
.brand__glyph { width: 34px; height: 34px; flex: none; }
.brand__text { display: flex; flex-direction: column; line-height: 1.05; }
.brand__code { font-family: var(--font-mono); font-weight: 500; font-size: 1.02rem; letter-spacing: .02em; }
.brand__sub { font-size: .72rem; color: var(--muted); }

.nav { display: flex; gap: .15rem; flex-wrap: wrap; }
.nav a {
  font-size: .9rem; text-decoration: none; color: var(--ink-2);
  padding: .42rem .7rem; border-radius: var(--r-sm);
}
.nav a:hover { background: var(--surface-2); color: var(--ink); }
.nav a.is-active { background: var(--accent-tint); color: var(--accent-ink); font-weight: 500; }

.main { flex: 1; width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 1.75rem 1.25rem 4rem; }

.foot {
  border-top: 1px solid var(--line);
  padding: 1.1rem 1.25rem; text-align: center;
  color: var(--muted); font-size: .78rem; background: var(--surface);
}
.foot .mono { color: var(--ink-2); }

/* ---------- calibration bar (signature) ---------- */
.calib { --pct: 0%; margin: 0; }
.calib__head { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; margin-bottom: .5rem; }
.calib__score { font-family: var(--font-mono); font-weight: 600; font-size: 2.4rem; line-height: 1; letter-spacing: -.02em; }
.calib__score .unit { font-size: .95rem; color: var(--muted); margin-left: .35rem; letter-spacing: 0; }
.calib__verdict { font-family: var(--font-mono); font-size: .72rem; letter-spacing: .12em; text-transform: uppercase; padding: .25rem .5rem; border-radius: 999px; }
.calib__verdict.pass { background: var(--correct-tint); color: var(--correct); }
.calib__verdict.below { background: #eef0ee; color: var(--muted); }

.calib__track {
  position: relative; height: 34px;
  background: repeating-linear-gradient(90deg, var(--surface-2) 0 9.9%, #eceeeb 9.9% 10%);
  border: 1px solid var(--line-strong); border-radius: var(--r-sm);
  overflow: hidden;
}
.calib__fill {
  position: absolute; inset: 0 auto 0 0; width: var(--pct);
  background: var(--accent);
  transition: width .7s cubic-bezier(.22,1,.36,1);
}
.calib__fill.below { background: var(--slate); }
.calib__cut {
  position: absolute; top: -4px; bottom: -4px; left: 68.9%; /* (720-100)/900 */
  width: 0; border-left: 2px dashed var(--ink);
}
.calib__cutlabel {
  position: absolute; top: -1.35rem; left: 68.9%; transform: translateX(-50%);
  font-family: var(--font-mono); font-size: .64rem; letter-spacing: .08em;
  color: var(--ink); white-space: nowrap;
}
.calib__scale { display: flex; justify-content: space-between; margin-top: .35rem; font-family: var(--font-mono); font-size: .66rem; color: var(--muted); }
.calib__note { font-size: .78rem; color: var(--muted); margin-top: .55rem; }

/* ---------- cards / panels ---------- */
.panel {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r); padding: 1.4rem; box-shadow: var(--shadow);
}
.stack > * + * { margin-top: 1.25rem; }

.hero { padding: 1.6rem 1.6rem 1.8rem; }
.hero__title { font-size: 1.9rem; margin-bottom: .3rem; }
.hero__lead { color: var(--ink-2); max-width: 54ch; }

.grid-modes { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
.modecard {
  display: block; text-align: left; text-decoration: none; color: inherit;
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r);
  padding: 1.2rem; cursor: pointer; font: inherit; width: 100%;
  transition: border-color .15s ease, transform .15s ease, box-shadow .15s ease;
}
.modecard:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }
.modecard__num { font-family: var(--font-mono); font-size: .7rem; color: var(--muted); letter-spacing: .1em; }
.modecard h3 { font-size: 1.15rem; margin: .35rem 0 .3rem; }
.modecard p { font-size: .88rem; color: var(--muted); margin: 0; }

/* domain weight bars */
.weights { display: grid; gap: .55rem; }
.wrow { display: grid; grid-template-columns: 1.4rem 1fr auto; gap: .7rem; align-items: center; }
.wrow__code { font-family: var(--font-mono); font-size: .8rem; color: var(--muted); }
.wrow__bar { height: 10px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
.wrow__bar > span { display: block; height: 100%; background: var(--accent); border-radius: 999px; }
.wrow__meta { font-family: var(--font-mono); font-size: .78rem; color: var(--ink-2); white-space: nowrap; }
.wrow__name { font-size: .9rem; }
.wrow__top { display: flex; justify-content: space-between; gap: .5rem; align-items: baseline; }

/* facts table */
.facts { width: 100%; border-collapse: collapse; }
.facts td { padding: .55rem .2rem; border-bottom: 1px solid var(--line); vertical-align: top; font-size: .92rem; }
.facts tr:last-child td { border-bottom: 0; }
.facts td:first-child { color: var(--muted); width: 38%; }
.facts td:last-child { font-weight: 500; }

/* ---------- setup (practice / mock intro) ---------- */
.setup__grid { display: grid; gap: .6rem; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
.check {
  display: flex; gap: .7rem; align-items: flex-start;
  padding: .75rem .85rem; border: 1px solid var(--line); border-radius: var(--r);
  background: var(--surface); cursor: pointer; font-size: .9rem;
}
.check:hover { border-color: var(--line-strong); }
.check input { margin-top: .2rem; accent-color: var(--accent); width: 1.05rem; height: 1.05rem; flex: none; }
.check__meta { font-family: var(--font-mono); font-size: .72rem; color: var(--muted); }
.check__name { display: block; color: var(--ink); }

.row { display: flex; gap: .8rem; flex-wrap: wrap; align-items: center; }
.field { display: flex; flex-direction: column; gap: .3rem; }
.field label { font-size: .78rem; color: var(--muted); font-family: var(--font-mono); letter-spacing: .04em; }
select, .btn {
  font: inherit; border-radius: var(--r-sm); border: 1px solid var(--line-strong);
  padding: .55rem .8rem; background: var(--surface); color: var(--ink);
}
select { min-width: 8rem; }

.btn { cursor: pointer; font-weight: 500; transition: background .15s, border-color .15s, color .15s; }
.btn:hover { border-color: var(--accent); }
.btn--primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn--primary:hover { background: var(--accent-ink); border-color: var(--accent-ink); }
.btn--primary:disabled { background: var(--slate); border-color: var(--slate); cursor: not-allowed; }
.btn--ghost { background: transparent; }
.btn--sm { padding: .38rem .6rem; font-size: .85rem; }
.linkbtn { background: none; border: 0; color: var(--accent-ink); cursor: pointer; font: inherit; text-decoration: underline; padding: 0; }

/* ---------- runner ---------- */
.runbar {
  display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
  margin-bottom: 1.1rem;
}
.runbar__meta { font-family: var(--font-mono); font-size: .82rem; color: var(--muted); }
.progressline { flex: 1; min-width: 120px; height: 6px; background: var(--surface); border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
.progressline > span { display: block; height: 100%; background: var(--accent); transition: width .3s ease; }

.timer { font-family: var(--font-mono); font-weight: 600; font-size: 1.05rem; padding: .3rem .6rem; border-radius: var(--r-sm); border: 1px solid var(--line-strong); }
.timer.warn { color: var(--warn); border-color: var(--warn); background: #fff8e8; }
.timer.crit { color: var(--wrong); border-color: var(--wrong); background: var(--wrong-tint); }

.qcard { }
.qcard__tags { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .8rem; }
.tag { font-family: var(--font-mono); font-weight: 500; font-size: .72rem; letter-spacing: .05em; padding: .26rem .6rem; border-radius: 999px; background: #e4e7e1; border: 1px solid var(--line-strong); color: var(--ink-2); }
.tag.dom { color: #fff; background: var(--accent); border-color: transparent; }
.tag.multi { color: #fff; background: var(--warn); border-color: transparent; }
.tag.doc { color: #fff; background: var(--correct); border-color: transparent; }
.tag.guide { color: var(--accent-ink); background: var(--accent-tint); border-color: transparent; }
.rationale__src { margin: .5rem 0 0 !important; font-size: .72rem; color: var(--muted); }
.rationale__src a { color: var(--accent-ink); text-decoration: underline; text-underline-offset: 2px; }
.rationale__src a:hover { color: var(--accent); }
.qcard__stem { font-size: 1.12rem; font-weight: 500; margin-bottom: 1rem; color: var(--ink); }

.options { display: grid; gap: .6rem; margin-bottom: 1.1rem; }
.opt {
  display: flex; gap: .8rem; align-items: flex-start;
  padding: .8rem .9rem; border: 1px solid var(--line); border-radius: var(--r);
  background: var(--surface); cursor: pointer; text-align: left; font: inherit; color: var(--ink);
  transition: border-color .12s, background .12s;
}
.opt:hover:not([disabled]) { border-color: var(--line-strong); background: var(--surface-2); }
.opt__mark {
  flex: none; width: 1.5rem; height: 1.5rem; border-radius: 50%;
  border: 1.5px solid var(--line-strong); display: grid; place-items: center;
  font-family: var(--font-mono); font-size: .8rem; color: var(--muted);
}
.opt.type-multi .opt__mark { border-radius: var(--r-sm); }
.opt.selected { border-color: var(--accent); background: var(--accent-tint); }
.opt.selected .opt__mark { border-color: var(--accent); background: var(--accent); color: #fff; }
.opt__body { flex: 1; }
.opt[disabled] { cursor: default; }

.opt.correct { border-color: var(--correct); background: var(--correct-tint); }
.opt.correct .opt__mark { border-color: var(--correct); background: var(--correct); color: #fff; }
.opt.incorrect { border-color: var(--wrong); background: var(--wrong-tint); }
.opt.incorrect .opt__mark { border-color: var(--wrong); background: var(--wrong); color: #fff; }
.opt.missed { border-color: var(--correct); border-style: dashed; }

.rationale {
  border-left: 3px solid var(--accent); background: var(--surface-2);
  padding: .9rem 1rem; border-radius: 0 var(--r) var(--r) 0; margin-bottom: 1.1rem;
}
.rationale__head { display: flex; align-items: center; gap: .5rem; margin-bottom: .35rem; }
.rationale__verdict { font-family: var(--font-mono); font-size: .74rem; letter-spacing: .08em; text-transform: uppercase; }
.rationale__verdict.right { color: var(--correct); }
.rationale__verdict.wrong { color: var(--wrong); }
.rationale p { margin: 0; font-size: .92rem; color: var(--ink-2); }

.runfoot { display: flex; justify-content: space-between; gap: 1rem; align-items: center; flex-wrap: wrap; }

/* mock navigator */
.navgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(2.4rem, 1fr)); gap: .35rem; margin-top: 1rem; }
.navdot {
  aspect-ratio: 1; border: 1px solid var(--line-strong); border-radius: var(--r-sm);
  background: var(--surface); font-family: var(--font-mono); font-size: .78rem; cursor: pointer; color: var(--ink-2);
}
.navdot.answered { background: var(--accent-tint); border-color: var(--accent); color: var(--accent-ink); }
.navdot.flagged { box-shadow: inset 0 0 0 2px var(--warn); }
.navdot.current { outline: 2px solid var(--ink); outline-offset: 1px; }

/* ---------- study guide ---------- */
.guide { display: grid; grid-template-columns: 220px 1fr; gap: 1.6rem; align-items: start; }
.guide__toc { position: sticky; top: 74px; display: grid; gap: .1rem; }
.guide__toc a { font-size: .85rem; text-decoration: none; color: var(--ink-2); padding: .35rem .55rem; border-radius: var(--r-sm); border-left: 2px solid transparent; }
.guide__toc a:hover { background: var(--surface-2); }
.guide__body { display: grid; gap: 1.3rem; }
.gsec { scroll-margin-top: 78px; }
.gsec h2 { font-size: 1.35rem; margin-bottom: .5rem; }
.gsec h2 .w { font-family: var(--font-mono); font-size: .72rem; color: var(--accent-ink); background: var(--accent-tint); padding: .15rem .45rem; border-radius: 999px; margin-left: .5rem; vertical-align: middle; }
.gsec .overview { color: var(--ink-2); }
.gsec ul { margin: .4rem 0 0; padding-left: 1.1rem; }
.gsec li { margin-bottom: .4rem; font-size: .93rem; }
.refgroup { margin-top: 1rem; }
.refgroup__name { font-size: 1rem; color: var(--accent-ink); margin-bottom: .1rem; }
.refgroup + .refgroup { border-top: 1px solid var(--line); padding-top: .6rem; }
.watchfor { margin-top: .9rem; border-left: 3px solid var(--warn); background: #fff8e8; padding: .7rem .9rem; border-radius: 0 var(--r) var(--r) 0; font-size: .9rem; }
.watchfor strong { color: var(--warn); }

.refs { margin-top: .9rem; padding-top: .7rem; border-top: 1px solid var(--line); }
.refs__label { display: block; font-size: .68rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: .35rem; }
.refs__list { margin: 0 !important; padding-left: 0 !important; list-style: none; display: grid; gap: .3rem; }
.refs__list li { margin: 0; font-size: .88rem; }
.refs__list a, .course a { color: var(--accent-ink); text-decoration: none; overflow-wrap: anywhere; }
.refs__list a:hover, .course a:hover { text-decoration: underline; }
.courses { margin: .6rem 0 0; padding-left: 0; list-style: none; display: grid; gap: .7rem; }
.course { margin: 0; display: grid; gap: .15rem; }
.course a { font-weight: 500; font-size: .96rem; }
.course__note { color: var(--ink-2); font-size: .86rem; }

/* ---------- results ---------- */
.results__domains { display: grid; gap: .55rem; margin-top: 1rem; }
.dscore { display: grid; grid-template-columns: 1.6rem 1fr 4.5rem; align-items: center; gap: .7rem; }
.dscore__bar { height: 10px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
.dscore__bar > span { display: block; height: 100%; }
.dscore__pct { font-family: var(--font-mono); font-size: .82rem; text-align: right; }

/* ---------- misc ---------- */
.empty { text-align: center; color: var(--muted); padding: 2rem 1rem; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
.section-title { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; margin-bottom: .9rem; flex-wrap: wrap; }

/* long links / labels never force horizontal scroll */
.rationale__src, .rationale__src a { overflow-wrap: anywhere; word-break: break-word; }

/* tablets */
@media (max-width: 820px) {
  .guide { grid-template-columns: 1fr; }
  .guide__toc {
    position: static; grid-auto-flow: column; grid-template-columns: none;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    padding-bottom: .5rem; border-bottom: 1px solid var(--line);
  }
  .guide__toc a { border-left: 0; white-space: nowrap; }
}

/* phones */
@media (max-width: 560px) {
  .main { padding: 1.1rem .85rem 3rem; }
  .masthead__inner { padding: .55rem .85rem; gap: .5rem .6rem; }
  .brand__sub { display: none; }
  .brand__glyph { width: 28px; height: 28px; }
  .nav { width: 100%; gap: .1rem; }
  .nav a { flex: 1 1 auto; text-align: center; font-size: .82rem; padding: .45rem .5rem; }
  .panel, .hero { padding: 1.05rem; }
  .hero__title { font-size: 1.5rem; }
  .grid-modes, .setup__grid { grid-template-columns: 1fr; }
  .section-title h1 { font-size: 1.3rem; }
  .qcard__stem { font-size: 1.05rem; }
  .opt { padding: .8rem; min-height: 44px; }
  .btn { min-height: 44px; }
  .runbar { gap: .5rem .7rem; }
  .runbar__meta { font-size: .78rem; }
  .progressline { min-width: 84px; }
  .runfoot { gap: .6rem; }
  .runfoot .btn--primary { flex: 1 1 auto; }
  .calib__score { font-size: 2rem; }
  .calib__scale { font-size: .6rem; }
  .navgrid { grid-template-columns: repeat(auto-fill, minmax(2.15rem, 1fr)); }
  .facts td { font-size: .88rem; }
  .facts td:first-child { width: 42%; }
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}

  <script>window.__CCAOF__ = {"questions": {"meta": {"credential": "Claude Certified Associate – Foundations", "examCode": "CCAO-F", "version": "1.0", "totalQuestions": 262, "domains": [{"id": 1, "name": "Prompting and Task Execution", "weight": 14}, {"id": 2, "name": "Output Evaluation and Validation", "weight": 21}, {"id": 3, "name": "Product and Model Selection", "weight": 12}, {"id": 4, "name": "Workflow Integration and Solution Design", "weight": 16}, {"id": 5, "name": "Configuration and Knowledge Management", "weight": 12}, {"id": 6, "name": "Governance, Risk, and Responsible Use", "weight": 15}, {"id": 7, "name": "Troubleshooting and Optimization", "weight": 10}]}, "questions": [{"id": "D1-01", "domain": 1, "type": "single", "question": "An associate needs Claude to draft a product announcement email. Which prompt is most likely to produce a usable first draft?", "options": ["Write an email.", "Write a product announcement.", "Write a 150-word product announcement email to existing customers announcing our new reporting dashboard; use a friendly, professional tone and end with a single call to action to book a demo.", "Make it good and send it to customers."], "correct": [2], "rationale": "Effective prompts specify the task, audience, length, tone, and desired outcome. Option C gives Claude the context and constraints it needs; the others are too vague to produce a targeted draft.", "source": "Claude Docs — Be clear, direct, and detailed", "sourceUrl": "https://docs.claude.com/en/docs/build-with-claude/prompt-engineering/be-clear-and-direct"}, {"id": "D1-02", "domain": 1, "type": "single", "question": "A complex request involves analyzing a survey, identifying themes, and writing an executive summary. What is the best way to structure the work?", "options": ["Ask for everything in one sentence and accept the first output.", "Decompose the task into steps: extract themes first, review them, then summarize based on the confirmed themes.", "Ask Claude to skip the analysis and write the summary directly.", "Submit the raw survey with no instructions."], "correct": [1], "rationale": "Task decomposition breaks a complex request into sequential, verifiable steps. Handling theme extraction before summarizing lets the associate check intermediate output and improves final quality.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D1-03", "domain": 1, "type": "single", "question": "An associate's first output is close but too formal for a casual internal audience. What is the most efficient next step?", "options": ["Start a brand-new conversation from scratch.", "Iterate: ask Claude to revise the existing draft into a more casual, conversational tone.", "Accept the formal version because rewriting is not allowed.", "Switch to a different AI tool."], "correct": [1], "rationale": "Iterating on an existing draft is faster and preserves good content. A targeted revision instruction adjusts tone without discarding the work already done.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D1-04", "domain": 1, "type": "multi", "question": "Which techniques generally improve prompt quality for business tasks? (Select THREE.)", "options": ["Providing relevant context and constraints", "Specifying the desired output format", "Leaving the audience unspecified so Claude can choose", "Including an example of the style or structure you want", "Using vague adjectives like 'nice' as the main instruction"], "correct": [0, 1, 3], "rationale": "Context, explicit format, and examples all sharpen output. Leaving the audience unspecified and relying on vague adjectives reduce quality and predictability.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D1-05", "domain": 1, "type": "single", "question": "For a brainstorming task, which prompting approach is most appropriate?", "options": ["Ask for one single 'correct' answer.", "Ask for a broad set of diverse ideas, then narrow in a follow-up.", "Forbid Claude from offering more than one idea.", "Provide no topic and expect relevant ideas."], "correct": [1], "rationale": "Brainstorming benefits from divergent generation first (many varied ideas) followed by convergence. Restricting to a single answer defeats the purpose of ideation.", "source": "CCAO-F Exam Guide (v1.0) — Domain 1: Prompting and Task Execution"}, {"id": "D1-06", "domain": 1, "type": "single", "question": "An associate wants Claude to reason carefully through a multi-step logistics problem. Which instruction best supports quality?", "options": ["Give me only the final number, nothing else.", "Work through the problem step by step, then state the final answer.", "Answer as fast as possible.", "Guess if you are unsure."], "correct": [1], "rationale": "Asking Claude to reason step by step before answering improves accuracy on multi-step problems and makes the logic reviewable.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D1-07", "domain": 1, "type": "single", "question": "Which of the following is the clearest example of an instruction that specifies format?", "options": ["Tell me about our sales.", "Summarize Q3 sales as a three-bullet list, each bullet under 15 words.", "Sales summary please.", "Give me the sales, formatted well."], "correct": [1], "rationale": "Specifying the exact structure (three bullets, length limit) gives Claude an unambiguous target and produces consistent, usable output.", "source": "Claude Docs — Be clear, direct, and detailed", "sourceUrl": "https://docs.claude.com/en/docs/build-with-claude/prompt-engineering/be-clear-and-direct"}, {"id": "D1-08", "domain": 1, "type": "single", "question": "When adapting a prompt for a research task rather than a drafting task, an associate should primarily:", "options": ["Ask for creative, imaginative language.", "Emphasize sourcing, scope, and asking Claude to distinguish established facts from uncertainty.", "Remove all context to keep it short.", "Request the longest possible answer regardless of relevance."], "correct": [1], "rationale": "Research tasks prioritize accuracy, clear scope, and transparency about uncertainty, unlike creative drafting where tone and originality matter more.", "source": "CCAO-F Exam Guide (v1.0) — Domain 1: Prompting and Task Execution"}, {"id": "D1-09", "domain": 1, "type": "single", "question": "An associate keeps getting outputs that are longer than needed. Which prompt adjustment most directly fixes this?", "options": ["Add 'be thorough' to the prompt.", "State an explicit length constraint, such as 'in no more than 100 words'.", "Ask the same question again with no changes.", "Request more detail."], "correct": [1], "rationale": "An explicit length constraint directly controls verbosity. Vague words like 'thorough' or asking for more detail push output the wrong direction.", "source": "Claude Docs — Be clear, direct, and detailed", "sourceUrl": "https://docs.claude.com/en/docs/build-with-claude/prompt-engineering/be-clear-and-direct"}, {"id": "D1-10", "domain": 1, "type": "single", "question": "Providing Claude with one or two worked examples of the desired input-output pattern is known as:", "options": ["Zero-shot prompting", "Few-shot prompting (providing examples)", "Fine-tuning", "Prompt injection"], "correct": [1], "rationale": "Supplying a small number of examples to demonstrate the desired pattern is few-shot prompting, a reliable way to steer format and style.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D1-11", "domain": 1, "type": "single", "question": "An associate asks Claude to 'not write anything unprofessional.' The output is inconsistent. What is a more reliable phrasing?", "options": ["Repeat 'not unprofessional' several times.", "State positively what is wanted: 'Use a professional, courteous tone throughout.'", "Add more negative constraints.", "Leave tone unspecified."], "correct": [1], "rationale": "Positive instructions that describe the desired behavior are generally more reliable than stacking negative 'do not' constraints.", "source": "Claude Docs — Be clear, direct, and detailed", "sourceUrl": "https://docs.claude.com/en/docs/build-with-claude/prompt-engineering/be-clear-and-direct"}, {"id": "D1-12", "domain": 1, "type": "single", "question": "Which is the best reason to assign Claude a role or persona in a prompt (e.g., 'act as an onboarding specialist')?", "options": ["It guarantees factual accuracy.", "It helps set the perspective, vocabulary, and level of detail appropriate to the task.", "It removes the need to review the output.", "It makes the model faster."], "correct": [1], "rationale": "A role primes appropriate perspective, tone, and depth. It does not guarantee accuracy or remove the need for human review.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D1-13", "domain": 1, "type": "single", "question": "An associate needs the same structured extraction repeated across many documents. The most scalable prompting approach is to:", "options": ["Rewrite the instructions differently every time.", "Define a clear, reusable prompt template that specifies the fields and output format.", "Rely on Claude to guess the fields each time.", "Avoid specifying fields to stay flexible."], "correct": [1], "rationale": "A reusable template with defined fields and a fixed output format produces consistent, comparable results across many documents.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D1-14", "domain": 1, "type": "multi", "question": "An associate's prompt produced an off-target draft. Which two adjustments are reasonable first iterations? (Select TWO.)", "options": ["Add the missing context about the audience and goal", "Immediately escalate to a developer", "Specify the output format and length explicitly", "Abandon Claude for the task", "Send the off-target draft unchanged"], "correct": [0, 2], "rationale": "Adding audience/goal context and specifying format/length are direct, low-cost prompt iterations that typically fix off-target output before any escalation is warranted.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D1-15", "domain": 1, "type": "single", "question": "Which describes task decomposition most accurately?", "options": ["Combining several tasks into one long prompt to save time", "Breaking a complex goal into smaller, ordered sub-tasks that can each be checked", "Removing all constraints from a prompt", "Asking Claude to choose which task to do"], "correct": [1], "rationale": "Task decomposition means splitting a complex goal into smaller, sequential, verifiable steps, which improves reliability and reviewability.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D2-01", "domain": 2, "type": "single", "question": "Claude produces a summary of a new regulation citing a specific subsection number, to be sent to the compliance team. What is the most appropriate action?", "options": ["Send it as-is because Claude sounded confident.", "Verify the cited subsection against the official regulation text before sharing.", "Ask Claude to rate its own confidence and send if high.", "Reword it to sound more formal, then send."], "correct": [1], "rationale": "Models can fabricate specific-looking details such as citation numbers. Verifying factual claims against an authoritative source is the required diligence step, especially for a compliance audience. Self-reported confidence is not a reliable accuracy signal.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-02", "domain": 2, "type": "single", "question": "An output includes a precise statistic ('adoption rose 47% in Q2') with no source. Before using it in a board deck, the associate should:", "options": ["Trust it because the number is specific.", "Treat it as unverified and confirm it against the underlying data or a reliable source.", "Round it to 50% to be safe.", "Add it only if it makes the story stronger."], "correct": [1], "rationale": "Specificity is not evidence of accuracy; unsourced statistics can be hallucinated. High-stakes figures must be validated against the actual data before use.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-03", "domain": 2, "type": "single", "question": "Which is the best working definition of a hallucination in this context?", "options": ["Any answer the user disagrees with", "Content that is plausible-sounding but fabricated or unsupported by real sources", "An answer that is too short", "A grammatical error"], "correct": [1], "rationale": "A hallucination is confident, plausible-sounding output that is not grounded in fact, such as invented citations, quotes, or statistics.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-04", "domain": 2, "type": "single", "question": "An associate notices the same report gives a total of 1,200 in one paragraph and 1,020 in another. This is an example of:", "options": ["A bias", "An internal inconsistency that should be resolved before use", "A formatting preference", "A hallucinated citation"], "correct": [1], "rationale": "Conflicting figures within one output are an internal inconsistency. The associate should reconcile them against the source data before relying on the report.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-05", "domain": 2, "type": "single", "question": "Which factor most strongly indicates that human review is required before using an output?", "options": ["The output is written in full sentences.", "The output will drive a high-stakes decision or go to an external/regulated audience.", "The output is longer than one paragraph.", "The output uses bullet points."], "correct": [1], "rationale": "The need for human review scales with stakes and audience. High-stakes, external, or regulated outputs require verification regardless of how polished they look.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-06", "domain": 2, "type": "multi", "question": "Which of the following are appropriate fact-checking or validation techniques? (Select THREE.)", "options": ["Cross-check claims against authoritative primary sources", "Confirm figures against the underlying dataset", "Accept the claim if Claude repeats it confidently", "Have a subject-matter expert review high-stakes content", "Assume longer answers are more accurate"], "correct": [0, 1, 3], "rationale": "Cross-checking primary sources, confirming figures against source data, and expert review are valid. Confident repetition and answer length are not evidence of accuracy.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-07", "domain": 2, "type": "single", "question": "A hiring-screening summary describes candidates using assumptions about gender and age. The associate should:", "options": ["Use it because it is concise.", "Flag and remove the biased assumptions and re-run with neutral, job-relevant criteria.", "Keep it but add a disclaimer.", "Ignore it since Claude generated it."], "correct": [1], "rationale": "Outputs can reflect bias. The associate should identify the biased content, remove it, and refocus on job-relevant, non-discriminatory criteria before use.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-08", "domain": 2, "type": "single", "question": "The best reason to compare two different Claude outputs for the same request is to:", "options": ["Double the length of the final answer.", "Evaluate which better meets accuracy, completeness, and audience needs.", "Prove the model is inconsistent.", "Avoid having to review either."], "correct": [1], "rationale": "Comparing outputs helps the associate select or synthesize the version that best meets the accuracy, completeness, and audience requirements of the task.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-09", "domain": 2, "type": "single", "question": "An associate must adapt a technical analysis for a non-technical executive audience. The most appropriate action is to:", "options": ["Send the technical version unchanged.", "Refine the output to plain language and lead with implications, keeping accuracy intact.", "Delete all the findings.", "Add more jargon to sound authoritative."], "correct": [1], "rationale": "Adapting for the audience means translating technical detail into plain language and foregrounding what matters to that reader, without altering the underlying facts.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-10", "domain": 2, "type": "single", "question": "When should an associate choose a structured-data output (like a table) over inline prose?", "options": ["Never; prose is always better.", "When the information is comparative or repetitive and readers need to scan or reuse it.", "Only when the answer is short.", "Whenever the associate is in a hurry."], "correct": [1], "rationale": "Structured formats suit comparative or repetitive data that readers scan or reuse. Format choice should match how the information will be consumed.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-11", "domain": 2, "type": "single", "question": "An Artifact is most appropriate when the associate wants to:", "options": ["Ask a quick factual question.", "Produce a substantial, reusable deliverable (like a document or app) they will iterate on and keep.", "Have a one-line chat reply.", "Avoid saving any output."], "correct": [1], "rationale": "Artifacts are suited to substantial, standalone deliverables meant to be edited, reused, or shared, rather than brief conversational answers.", "source": "Claude Help Center — What are artifacts and how do I use them", "sourceUrl": "https://support.claude.com/en/articles/9487310-what-are-artifacts-and-how-do-i-use-them"}, {"id": "D2-12", "domain": 2, "type": "single", "question": "Claude confidently answers a question about last week's news that occurred after typical knowledge limits. The safest interpretation is:", "options": ["The answer is definitely correct.", "The answer may be outdated or unverified; confirm against a current source.", "News questions never need checking.", "The confidence level proves recency."], "correct": [1], "rationale": "Time-sensitive claims can fall outside a model's reliable knowledge. Recent or fast-changing facts should be verified against current sources.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-13", "domain": 2, "type": "single", "question": "Which is the strongest sign an output is incomplete rather than inaccurate?", "options": ["It contains a fabricated citation.", "It answers only part of a multi-part request and omits required sections.", "It contradicts itself.", "It uses biased language."], "correct": [1], "rationale": "Completeness is about coverage. Omitting required parts of a multi-part request is an incompleteness problem, distinct from accuracy, consistency, or bias issues.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-14", "domain": 2, "type": "multi", "question": "Which of these outputs warrant heightened scrutiny before use? (Select THREE.)", "options": ["A legal interpretation to be relied on by clients", "A medical dosage recommendation", "A casual brainstorm of team lunch ideas", "Financial figures headed into an audited report", "A list of ice-breaker questions for a workshop"], "correct": [0, 1, 3], "rationale": "Legal, medical, and financial outputs carry high consequences and require validation. Low-stakes brainstorms and ice-breakers do not warrant the same scrutiny.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-15", "domain": 2, "type": "single", "question": "An associate curating research from Claude into a briefing should primarily:", "options": ["Paste everything Claude produced verbatim.", "Select, verify, and organize the relevant points, discarding unverified or off-topic material.", "Keep only the longest section.", "Include contradictory claims without noting them."], "correct": [1], "rationale": "Curation means selecting and verifying the relevant, accurate points and organizing them coherently, not dumping raw output.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-16", "domain": 2, "type": "single", "question": "Claude provides an answer plus a quoted 'expert statement.' No such expert or quote can be found anywhere. This is best described as:", "options": ["A valid citation", "A fabricated attribution that must not be used", "A minor formatting issue", "A stylistic choice"], "correct": [1], "rationale": "An unverifiable quote attributed to a named source is a fabricated attribution. Presenting it as real would spread misinformation.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-17", "domain": 2, "type": "single", "question": "The most reliable way to judge whether an output is accurate is to:", "options": ["Ask Claude if it is sure.", "Check the specific claims against authoritative external evidence.", "See whether it is grammatically correct.", "Count how many sources it mentions."], "correct": [1], "rationale": "Accuracy is established by checking claims against authoritative evidence. Self-assessment, grammar, and source count are not reliable accuracy indicators.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-18", "domain": 2, "type": "single", "question": "An associate wants to reduce the chance of shipping a hallucinated fact in a customer FAQ. The best control is to:", "options": ["Increase the length of each answer.", "Route all factual claims through human verification against source material before publishing.", "Tell Claude to be accurate and skip review.", "Publish quickly and correct later."], "correct": [1], "rationale": "A human verification step against source material is the effective control for factual claims in published content; instructions alone do not guarantee accuracy.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-19", "domain": 2, "type": "single", "question": "When Claude declines to answer or says it is unsure, the associate should interpret this as:", "options": ["A failure that must be overridden.", "Useful signal that the request may need verification, rephrasing, or a human expert.", "Proof the tool is broken.", "A reason to send the last confident answer instead."], "correct": [1], "rationale": "Expressed uncertainty is informative. It can indicate a need to verify, rephrase, or bring in human expertise rather than force a possibly wrong answer.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-20", "domain": 2, "type": "single", "question": "Which output is most appropriately delivered as inline chat text rather than a saved Artifact?", "options": ["A 12-page onboarding handbook", "A quick clarification of one policy term the user asked about conversationally", "A reusable project charter template", "A full marketing plan to be edited over days"], "correct": [1], "rationale": "A brief conversational clarification is best inline. Substantial, reusable, or iteratively edited deliverables are better as Artifacts.", "source": "Claude Help Center — What are artifacts and how do I use them", "sourceUrl": "https://support.claude.com/en/articles/9487310-what-are-artifacts-and-how-do-i-use-them"}, {"id": "D2-21", "domain": 2, "type": "single", "question": "An associate receives a fluent, well-structured answer to a niche technical question. What is the correct takeaway about fluency?", "options": ["Fluency confirms the content is correct.", "Fluency and structure are independent of accuracy and do not verify the facts.", "Fluent answers never contain errors.", "Structure guarantees completeness."], "correct": [1], "rationale": "Polished, fluent writing is not evidence of correctness. Facts must still be verified regardless of how well the answer reads.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-22", "domain": 2, "type": "single", "question": "Two associates get different answers to the same factual question from Claude. The best response is to:", "options": ["Pick the longer answer.", "Investigate and confirm the correct answer against an authoritative source.", "Average the two answers.", "Assume the first one is right."], "correct": [1], "rationale": "Divergent answers signal uncertainty. Resolving the discrepancy against an authoritative source is the reliable path, not length, ordering, or averaging.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-23", "domain": 2, "type": "single", "question": "For an output that will be translated and sent to customers in several countries, an added validation concern is:", "options": ["Only the font used.", "Whether claims, tone, and any regulatory statements remain accurate and appropriate per locale.", "The color of the email.", "Nothing beyond spelling."], "correct": [1], "rationale": "Cross-locale delivery adds validation needs: claims and any regulated statements must remain accurate and appropriate for each audience and jurisdiction.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-24", "domain": 2, "type": "multi", "question": "Which practices help an associate evaluate completeness of an output? (Select TWO.)", "options": ["Check the output against each part of the original request", "Confirm required sections or fields are all present", "Count the number of adjectives used", "Assume completeness if the tone is confident"], "correct": [0, 1], "rationale": "Completeness is checked by mapping the output back to every part of the request and confirming all required elements are present, not by tone or word choice.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D2-25", "domain": 2, "type": "single", "question": "An associate is unsure whether a summary faithfully reflects a 40-page source. The most reliable check is to:", "options": ["Trust the summary because it is concise.", "Spot-check key claims and figures against the actual source passages.", "Ask Claude to shorten it further.", "Assume summaries are always faithful."], "correct": [1], "rationale": "Verifying a summary means spot-checking its key claims and numbers against the source text to confirm nothing was distorted or invented.", "source": "CCAO-F Exam Guide (v1.0) — Domain 2: Output Evaluation and Validation"}, {"id": "D3-01", "domain": 3, "type": "single", "question": "An associate must generate a high volume of short customer-reply drafts where speed and cost matter more than deep reasoning. Which choice best fits?", "options": ["Use the most capable, highest-cost model for every reply.", "Use a faster, lower-cost model suited to straightforward, high-volume tasks.", "Disable all product features to reduce cost.", "Switch to a different AI platform."], "correct": [1], "rationale": "Aligning model choice with the task means matching a faster, lower-cost model to straightforward, high-volume work and reserving the most capable model for complex reasoning.", "source": "Claude Help Center — Manage usage credits", "sourceUrl": "https://support.claude.com/en/articles/12429409-manage-usage-credits-for-paid-claude-plans"}, {"id": "D3-02", "domain": 3, "type": "single", "question": "A task requires deep, multi-step reasoning over a complex legal analysis where quality is paramount. The best-aligned model tier is:", "options": ["The fastest, lowest-cost model", "The most capable model, accepting higher cost and latency", "Any model, since they are identical", "No model; avoid the task"], "correct": [1], "rationale": "Complex, high-stakes reasoning justifies the most capable model even at higher cost and latency, which is the appropriate trade-off for quality-critical work.", "source": "Claude Help Center — Manage usage credits", "sourceUrl": "https://support.claude.com/en/articles/12429409-manage-usage-credits-for-paid-claude-plans"}, {"id": "D3-03", "domain": 3, "type": "single", "question": "Within Claude's model family, which statement about the tiers is most accurate for planning purposes?", "options": ["Haiku is the most capable and slowest; Opus is the fastest.", "Haiku favors speed and low cost; Opus favors maximum capability; Sonnet balances the two.", "All tiers cost and perform identically.", "Sonnet is only for images."], "correct": [1], "rationale": "As a planning heuristic, Haiku emphasizes speed and low cost, Opus emphasizes capability for complex work, and Sonnet offers a balance of performance and cost.", "source": "CCAO-F Exam Guide (v1.0) — Domain 3: Product and Model Selection"}, {"id": "D3-04", "domain": 3, "type": "single", "question": "An associate wants to keep instructions, files, and context together for a recurring initiative so every chat starts with the same background. The best feature is:", "options": ["A single long chat message", "A Claude Project", "Turning off all context", "A new account per task"], "correct": [1], "rationale": "Projects hold shared instructions and knowledge so related conversations start with consistent context, ideal for recurring initiatives.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D3-05", "domain": 3, "type": "single", "question": "For a task that needs Claude to gather and synthesize information across many sources into a thorough report, the most fitting capability is:", "options": ["A one-line chat reply", "A research-oriented workflow that investigates multiple sources before synthesizing", "Disabling context", "A quick single-shot answer"], "correct": [1], "rationale": "Multi-source investigation and synthesis is what a research-oriented mode is designed for, versus a quick single-shot chat answer.", "source": "Claude Help Center — Use research on Claude", "sourceUrl": "https://support.claude.com/en/articles/11088861-use-research-on-claude"}, {"id": "D3-06", "domain": 3, "type": "single", "question": "A conversation has grown very long and Claude seems to lose track of earlier details. The best first action is to:", "options": ["Keep adding messages and hope it recovers.", "Summarize the essential context and continue, or start a fresh chat seeded with that summary.", "Delete the account.", "Switch to a lower-cost model to fix memory."], "correct": [1], "rationale": "When context becomes unwieldy, summarizing the key points and continuing (or restarting seeded with that summary) restores focus. Model tier does not fix context overflow.", "source": "Claude Help Center — How usage and length limits work", "sourceUrl": "https://support.claude.com/en/articles/11647753-how-do-usage-and-length-limits-work"}, {"id": "D3-07", "domain": 3, "type": "single", "question": "Which is the best reason to use an Artifact rather than a plain chat response?", "options": ["To ask a yes/no question", "To create a substantial document or interactive piece the associate will refine and reuse", "To reduce the model's capability", "To hide the output from the user"], "correct": [1], "rationale": "Artifacts are for substantial, reusable, iteratively edited deliverables, unlike brief conversational replies.", "source": "Claude Help Center — What are artifacts and how do I use them", "sourceUrl": "https://support.claude.com/en/articles/9487310-what-are-artifacts-and-how-do-i-use-them"}, {"id": "D3-08", "domain": 3, "type": "single", "question": "An associate is deciding between models for drafting internal meeting notes from a transcript, a fairly routine task. The most cost-effective aligned choice is:", "options": ["The most capable, highest-cost model, always", "A faster, lower-cost tier that handles routine summarization well", "No model", "A model chosen at random"], "correct": [1], "rationale": "Routine summarization is well served by a faster, lower-cost tier; reserving the top model for such tasks wastes cost and latency budget.", "source": "Claude Help Center — Manage usage credits", "sourceUrl": "https://support.claude.com/en/articles/12429409-manage-usage-credits-for-paid-claude-plans"}, {"id": "D3-09", "domain": 3, "type": "multi", "question": "Which factors should drive model selection? (Select THREE.)", "options": ["Required reasoning depth and quality", "Speed/latency needs", "Cost and volume constraints", "The associate's favorite model name", "The color of the interface"], "correct": [0, 1, 2], "rationale": "Model selection aligns to reasoning depth/quality, speed, and cost/volume. Personal preference and interface color are not decision factors.", "source": "CCAO-F Exam Guide (v1.0) — Domain 3: Product and Model Selection"}, {"id": "D3-10", "domain": 3, "type": "single", "question": "Regarding context limits, which statement is most accurate?", "options": ["Claude remembers everything from all past chats automatically forever.", "A conversation has a finite context window, so very long threads may need summarizing or restarting.", "Context limits do not exist.", "Only images count toward context."], "correct": [1], "rationale": "Conversations have a finite context window. Managing it, by summarizing or restarting, is a core skill when threads grow long.", "source": "Claude Help Center — How usage and length limits work", "sourceUrl": "https://support.claude.com/en/articles/11647753-how-do-usage-and-length-limits-work"}, {"id": "D3-11", "domain": 3, "type": "single", "question": "An associate needs the same reference documents available across many related chats without re-uploading each time. The best fit is to:", "options": ["Paste the documents into every message.", "Add them as knowledge in a Project so all its chats can draw on them.", "Email the documents to Claude.", "Avoid using documents."], "correct": [1], "rationale": "Project knowledge sources make reference material available across all conversations in the Project, avoiding repeated uploads.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D3-12", "domain": 3, "type": "single", "question": "When quality, speed, and cost all matter but none dominates, a reasonable default is to:", "options": ["Always pick the cheapest option regardless of quality.", "Choose a balanced tier and adjust only if results or costs require it.", "Always pick the most expensive option.", "Avoid choosing and use several at once."], "correct": [1], "rationale": "A balanced tier is a sensible default when no single factor dominates; the associate can escalate or downgrade based on observed results and cost.", "source": "CCAO-F Exam Guide (v1.0) — Domain 3: Product and Model Selection"}, {"id": "D3-13", "domain": 3, "type": "single", "question": "An associate wants Claude's output to persist as an editable canvas they can revise over time. Which is most appropriate?", "options": ["An ephemeral inline reply", "An Artifact", "Turning off memory", "A lower-cost model"], "correct": [1], "rationale": "Artifacts provide a persistent, editable surface for content the associate will revise, unlike an ephemeral inline reply.", "source": "Claude Help Center — What are artifacts and how do I use them", "sourceUrl": "https://support.claude.com/en/articles/9487310-what-are-artifacts-and-how-do-i-use-them"}, {"id": "D4-01", "domain": 4, "type": "single", "question": "Before building an AI-assisted workflow, an associate should first:", "options": ["Pick a model and start prompting immediately.", "Analyze the requirements and the actual use case, including inputs, outputs, and success criteria.", "Buy the most expensive plan.", "Automate the entire process at once."], "correct": [1], "rationale": "Solution design starts by understanding the requirements and use case, inputs, outputs, and what success looks like, before choosing tools or prompts.", "source": "CCAO-F Exam Guide (v1.0) — Domain 4: Workflow Integration and Solution Design"}, {"id": "D4-02", "domain": 4, "type": "single", "question": "An associate wants to redesign a manual reporting process with Claude. The best early step is to:", "options": ["Replace every human step without analysis.", "Map the current process to find high-value, low-risk steps where Claude adds the most benefit.", "Automate only the steps that are already automated.", "Avoid documenting the process."], "correct": [1], "rationale": "Process optimization begins by mapping the current workflow and targeting steps where Claude adds clear value at acceptable risk, rather than automating indiscriminately.", "source": "CCAO-F Exam Guide (v1.0) — Domain 4: Workflow Integration and Solution Design"}, {"id": "D4-03", "domain": 4, "type": "single", "question": "When communicating Claude's value to stakeholders, the most credible approach is to:", "options": ["Promise it will replace all staff.", "Present realistic benefits alongside limitations and where human oversight is required.", "Claim it never makes mistakes.", "Avoid mentioning any limitations."], "correct": [1], "rationale": "Credible stakeholder communication pairs realistic benefits with honest limitations and the points where human review is needed, building trust and correct expectations.", "source": "CCAO-F Exam Guide (v1.0) — Domain 4: Workflow Integration and Solution Design"}, {"id": "D4-04", "domain": 4, "type": "single", "question": "An associate is integrating Claude into an existing approval workflow. The safest design keeps:", "options": ["No human involvement anywhere.", "A human review/approval checkpoint before consequential actions are finalized.", "Claude making all final approvals autonomously.", "All steps hidden from reviewers."], "correct": [1], "rationale": "Augmenting a workflow responsibly means retaining human checkpoints before consequential actions, so Claude accelerates work without removing accountability.", "source": "CCAO-F Exam Guide (v1.0) — Domain 4: Workflow Integration and Solution Design"}, {"id": "D4-05", "domain": 4, "type": "single", "question": "For a new use case with unclear requirements, how can Claude best support the design phase?", "options": ["By finalizing the solution without questions.", "By helping analyze requirements, surface options, and draft a plan the team can review.", "By committing to one option immediately.", "By ignoring constraints."], "correct": [1], "rationale": "In early design, Claude is valuable for analyzing requirements, generating and comparing options, and drafting plans that humans then evaluate and refine.", "source": "CCAO-F Exam Guide (v1.0) — Domain 4: Workflow Integration and Solution Design"}, {"id": "D4-06", "domain": 4, "type": "multi", "question": "Which are appropriate uses of Claude in workflow and solution design? (Select THREE.)", "options": ["Drafting a project plan for human review", "Researching options and summarizing trade-offs", "Making the final hiring decision autonomously", "Prototyping and iterating on a process design", "Approving legal contracts without review"], "correct": [0, 1, 3], "rationale": "Drafting plans, researching trade-offs, and prototyping are strong uses. Autonomous final hiring or legal approval without review exceeds appropriate scope and needs human judgment.", "source": "CCAO-F Exam Guide (v1.0) — Domain 4: Workflow Integration and Solution Design"}, {"id": "D4-07", "domain": 4, "type": "single", "question": "An associate encounters a use case that requires custom API integration and agentic orchestration. The correct action is to:", "options": ["Attempt to build it alone despite lacking the skills.", "Recognize the limit and escalate to a Claude Architect or Developer.", "Declare it impossible.", "Use a spreadsheet instead and never mention it."], "correct": [1], "rationale": "Recognizing scope boundaries and escalating complex, technical implementation to Architects/Developers is a defining associate competency.", "source": "CCAO-F Exam Guide (v1.0) — Domain 4: Workflow Integration and Solution Design"}, {"id": "D4-08", "domain": 4, "type": "single", "question": "When redesigning a workflow, an early measure of success should be defined so the associate can:", "options": ["Claim victory regardless of outcome.", "Evaluate whether the new workflow actually improves quality, speed, or cost.", "Avoid measuring anything.", "Compare only against unrelated teams."], "correct": [1], "rationale": "Defining success measures up front lets the associate objectively assess whether the redesigned workflow improved the intended outcomes.", "source": "CCAO-F Exam Guide (v1.0) — Domain 4: Workflow Integration and Solution Design"}, {"id": "D4-09", "domain": 4, "type": "single", "question": "A stakeholder asks whether Claude can 'just handle everything' in a compliance-heavy process. The best response is to:", "options": ["Agree, to keep them happy.", "Explain what Claude can accelerate and where human validation and controls remain essential.", "Refuse to discuss it.", "Promise full automation with no oversight."], "correct": [1], "rationale": "Setting accurate expectations means explaining Claude's real contribution while being clear about required human validation and controls in regulated processes.", "source": "CCAO-F Exam Guide (v1.0) — Domain 4: Workflow Integration and Solution Design"}, {"id": "D4-10", "domain": 4, "type": "single", "question": "Which is the best example of using Claude to support iteration in solution design?", "options": ["Producing one draft and never revisiting it.", "Generating a draft, gathering feedback, and refining the design across several rounds.", "Refusing to change the first version.", "Ignoring stakeholder input."], "correct": [1], "rationale": "Iteration means generating a draft, incorporating feedback, and refining, exactly the loop Claude can accelerate in design work.", "source": "CCAO-F Exam Guide (v1.0) — Domain 4: Workflow Integration and Solution Design"}, {"id": "D4-11", "domain": 4, "type": "single", "question": "An associate wants Claude to help plan a project timeline. The most useful framing is to:", "options": ["Ask for a timeline with no constraints or context.", "Provide scope, milestones, dependencies, and constraints so the plan is realistic.", "Request the shortest timeline regardless of feasibility.", "Avoid giving any details."], "correct": [1], "rationale": "A useful plan needs real inputs, scope, milestones, dependencies, and constraints, so Claude can produce a realistic, reviewable timeline.", "source": "CCAO-F Exam Guide (v1.0) — Domain 4: Workflow Integration and Solution Design"}, {"id": "D4-12", "domain": 4, "type": "single", "question": "When Claude is integrated to augment (not replace) an analyst's work, the analyst's role becomes primarily to:", "options": ["Rubber-stamp all outputs.", "Direct the work, validate outputs, and apply judgment Claude cannot.", "Stop reviewing entirely.", "Only copy and paste."], "correct": [1], "rationale": "Augmentation keeps the human directing the work, validating outputs, and applying domain judgment, while Claude handles drafting and analysis support.", "source": "CCAO-F Exam Guide (v1.0) — Domain 4: Workflow Integration and Solution Design"}, {"id": "D4-13", "domain": 4, "type": "single", "question": "An associate presenting a Claude-enabled workflow to leadership should include:", "options": ["Only the upside.", "Expected benefits, key risks, required controls, and how outputs are validated.", "A guarantee of zero errors.", "No mention of validation."], "correct": [1], "rationale": "A balanced proposal covers benefits, risks, controls, and the validation approach, giving leadership the full picture to make an informed decision.", "source": "CCAO-F Exam Guide (v1.0) — Domain 4: Workflow Integration and Solution Design"}, {"id": "D4-14", "domain": 4, "type": "multi", "question": "Which signals suggest a task should be escalated beyond an associate's scope? (Select TWO.)", "options": ["It needs custom software development against APIs", "It requires designing an enterprise-scale agentic system", "It requires drafting a routine status email", "It involves summarizing a meeting transcript"], "correct": [0, 1], "rationale": "Custom API development and enterprise agentic system design belong to Architects/Developers. Routine drafting and summarizing are within associate scope.", "source": "CCAO-F Exam Guide (v1.0) — Domain 4: Workflow Integration and Solution Design"}, {"id": "D4-15", "domain": 4, "type": "single", "question": "An associate finds that a proposed automation would remove a control that catches costly errors. The right design decision is to:", "options": ["Remove the control anyway for speed.", "Preserve the control, or replace it with an equivalent check, before automating.", "Ignore the risk.", "Automate and disable error logging."], "correct": [1], "rationale": "Responsible integration preserves the controls that prevent costly errors, or substitutes an equivalent check, rather than trading safety for speed.", "source": "CCAO-F Exam Guide (v1.0) — Domain 4: Workflow Integration and Solution Design"}, {"id": "D4-16", "domain": 4, "type": "single", "question": "Using Claude for requirements analysis, the associate can most appropriately ask it to:", "options": ["Invent requirements without input.", "Help structure and clarify stated requirements and identify gaps for the team to confirm.", "Finalize scope with no stakeholder review.", "Ignore stakeholder constraints."], "correct": [1], "rationale": "Claude helps organize and pressure-test stated requirements and surface gaps, which the team then confirms, rather than inventing or finalizing scope alone.", "source": "CCAO-F Exam Guide (v1.0) — Domain 4: Workflow Integration and Solution Design"}, {"id": "D4-17", "domain": 4, "type": "single", "question": "The clearest sign a Claude-augmented workflow is well designed is that it:", "options": ["Eliminates every human touchpoint.", "Improves a target outcome (quality, speed, or cost) while keeping appropriate oversight.", "Uses the most expensive model.", "Produces the longest outputs."], "correct": [1], "rationale": "A good design measurably improves the intended outcome while retaining appropriate human oversight, not merely removing people or maximizing model size.", "source": "CCAO-F Exam Guide (v1.0) — Domain 4: Workflow Integration and Solution Design"}, {"id": "D5-01", "domain": 5, "type": "single", "question": "An associate wants every conversation in a Project to follow the same tone and rules. The best place to set this is:", "options": ["A note taped to their monitor.", "The Project's custom instructions.", "The first line of each separate chat, retyped every time.", "Nowhere; it cannot be configured."], "correct": [1], "rationale": "Project custom instructions apply consistently across all conversations in that Project, the right place for shared tone and rules.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D5-02", "domain": 5, "type": "single", "question": "Which is the best example of an effective system-level instruction for a Project?", "options": ["Be helpful.", "You are assisting the onboarding team. Use a warm, plain-language tone, cite the uploaded HR policy when relevant, and flag anything requiring HR sign-off.", "Do stuff.", "Answer however you like."], "correct": [1], "rationale": "Effective instructions are specific about role, tone, sources to use, and escalation behavior, unlike vague directives such as 'be helpful.'", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D5-03", "domain": 5, "type": "single", "question": "An associate adds a Google Drive connector so Claude can reference team documents. A key responsibility is to:", "options": ["Assume access controls no longer matter.", "Ensure only appropriate, permitted data is exposed and that access aligns with policy.", "Connect every possible data source by default.", "Share credentials in the chat."], "correct": [1], "rationale": "Connecting data sources requires ensuring only appropriate, permitted data is exposed and that access respects organizational policy and permissions.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D5-04", "domain": 5, "type": "single", "question": "The uploaded knowledge in a Project has become outdated after a policy change. The correct maintenance action is to:", "options": ["Leave the old version in place.", "Update or replace the knowledge source so Claude references the current policy.", "Delete the entire Project.", "Tell users to ignore Claude."], "correct": [1], "rationale": "Configurations must be maintained; when source material changes, the knowledge should be updated or replaced so Claude reflects current information.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D5-05", "domain": 5, "type": "single", "question": "Which best describes the purpose of Project knowledge sources?", "options": ["To slow Claude down.", "To give Claude reliable, reusable reference material grounded in the team's own documents.", "To replace the need for instructions.", "To hide information from the team."], "correct": [1], "rationale": "Knowledge sources ground Claude's responses in the team's own reference material, improving relevance and consistency across the Project.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D5-06", "domain": 5, "type": "multi", "question": "Which practices support good configuration and knowledge management? (Select THREE.)", "options": ["Writing clear, specific Project instructions", "Keeping knowledge sources current", "Uploading sensitive data without checking policy", "Documenting what each Project is for", "Connecting every data source indiscriminately"], "correct": [0, 1, 3], "rationale": "Clear instructions, current knowledge, and documented purpose are good practice. Uploading sensitive data without policy checks or connecting sources indiscriminately create risk.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D5-07", "domain": 5, "type": "single", "question": "An associate is setting up a Project for the sales team. Which instruction detail is most useful to include?", "options": ["Nothing; keep it blank.", "The audience, preferred tone, key sources to rely on, and any topics to avoid or escalate.", "A personal anecdote unrelated to sales.", "Only the word 'sales.'"], "correct": [1], "rationale": "Useful configuration specifies audience, tone, authoritative sources, and escalation/avoidance rules so outputs are consistent and appropriate.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D5-08", "domain": 5, "type": "single", "question": "When a connector like Gmail is enabled for a Project, the associate should verify:", "options": ["That everyone gets full access to all mailboxes.", "That the scope of access matches the task and complies with privacy and org policy.", "That access is as broad as possible.", "Nothing, since connectors are always safe."], "correct": [1], "rationale": "Enabling a connector requires confirming the access scope fits the task and complies with privacy and organizational policy, not maximizing access.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D5-09", "domain": 5, "type": "single", "question": "Two associates maintain the same Project. To avoid conflicting configurations, they should:", "options": ["Each change instructions silently and often.", "Agree on the Project's purpose and coordinate updates to instructions and knowledge.", "Never document anything.", "Delete each other's changes at random."], "correct": [1], "rationale": "Shared configurations need coordination: a clear agreed purpose and a process for updating instructions and knowledge prevents conflicting or confusing behavior.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D5-10", "domain": 5, "type": "single", "question": "The best reason to periodically review a Project's instructions and sources is that:", "options": ["Instructions never need to change.", "Business needs, policies, and source documents evolve, and the configuration must stay accurate.", "Reviews reduce the model's capability.", "It is required to log in."], "correct": [1], "rationale": "Ongoing review keeps the configuration aligned with evolving business needs, policies, and source documents so outputs remain accurate and appropriate.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D5-11", "domain": 5, "type": "single", "question": "An associate notices Claude in a Project keeps ignoring a formatting rule. Where should they look first?", "options": ["The weather.", "The Project instructions, to confirm the rule is stated clearly and not contradicted.", "A different Project entirely.", "The user's browser history."], "correct": [1], "rationale": "When Project behavior is off, the instructions are the first place to check: confirm the rule is present, clear, and not contradicted by other guidance.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D5-12", "domain": 5, "type": "single", "question": "Which is the most appropriate knowledge source to add to a customer-support Project?", "options": ["A random collection of unrelated PDFs.", "The current, approved support policies and product documentation.", "Personal photos.", "An outdated draft nobody approved."], "correct": [1], "rationale": "Relevant, current, approved documentation is the right knowledge to ground a support Project; unrelated, personal, or unapproved material degrades quality.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D5-13", "domain": 5, "type": "single", "question": "After onboarding a new product line, the associate should update the Project by:", "options": ["Doing nothing.", "Adding the new product's documentation and revising instructions to cover it.", "Deleting the old products' docs without checking.", "Locking the Project so no one can edit it."], "correct": [1], "rationale": "Keeping a configuration current means adding the new documentation and updating instructions so Claude can support the expanded scope accurately.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D6-01", "domain": 6, "type": "single", "question": "A project manager wants to upload a spreadsheet of customer names and account numbers for trend analysis, but policy restricts sharing regulated personal data. The most appropriate action is to:", "options": ["Upload the file as-is since the analysis is internal.", "Remove or anonymize the personal identifiers before uploading, consistent with policy.", "Upload the file but instruct Claude not to retain it.", "Skip the analysis entirely."], "correct": [1], "rationale": "Applying data-sensitivity safeguards means anonymizing regulated identifiers before use, so analysis can proceed without exposing protected data. Instructing the model not to retain data does not satisfy the policy control, and abandoning the task is unnecessary.", "source": "CCAO-F Exam Guide (v1.0) — Domain 6: Governance, Risk, and Responsible Use"}, {"id": "D6-02", "domain": 6, "type": "single", "question": "Which is the clearest example of an inappropriate use of Claude in a business setting?", "options": ["Drafting an internal newsletter.", "Presenting unverified AI output as authoritative legal advice to clients.", "Brainstorming event themes.", "Summarizing a public report."], "correct": [1], "rationale": "Passing off unverified AI output as authoritative professional (e.g., legal) advice is inappropriate and risky; the other tasks are routine, low-risk uses.", "source": "CCAO-F Exam Guide (v1.0) — Domain 6: Governance, Risk, and Responsible Use"}, {"id": "D6-03", "domain": 6, "type": "single", "question": "An associate is asked to feed confidential employee health information into a general tool with no policy clearance. The right action is to:", "options": ["Proceed because it is faster.", "Stop and follow data-sensitivity and privacy policy, seeking clearance or anonymization before any use.", "Upload it and hope for the best.", "Share it externally to get a second opinion."], "correct": [1], "rationale": "Sensitive health data triggers privacy and regulatory obligations. The associate must follow policy, obtaining clearance or anonymizing, before any use.", "source": "CCAO-F Exam Guide (v1.0) — Domain 6: Governance, Risk, and Responsible Use"}, {"id": "D6-04", "domain": 6, "type": "single", "question": "Which best reflects responsible-AI practice when using Claude's output for a decision affecting individuals?", "options": ["Automate the decision with no oversight.", "Keep a human accountable for the decision and check outputs for accuracy and bias.", "Assume the output is unbiased.", "Hide that AI was involved."], "correct": [1], "rationale": "Decisions affecting individuals require human accountability and checks for accuracy and bias; automation without oversight and hidden AI use are irresponsible.", "source": "CCAO-F Exam Guide (v1.0) — Domain 6: Governance, Risk, and Responsible Use"}, {"id": "D6-05", "domain": 6, "type": "multi", "question": "Which are appropriate uses of Claude under typical organizational policy? (Select THREE.)", "options": ["Drafting i
