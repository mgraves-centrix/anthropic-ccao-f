nternal documentation for human review", "Summarizing publicly available information", "Making final medical diagnoses to give to patients", "Brainstorming marketing ideas", "Submitting regulated personal data without safeguards"], "correct": [0, 1, 3], "rationale": "Drafting for review, summarizing public info, and brainstorming are appropriate. Final medical diagnoses and submitting regulated personal data without safeguards are not.", "source": "CCAO-F Exam Guide (v1.0) — Domain 6: Governance, Risk, and Responsible Use"}, {"id": "D6-06", "domain": 6, "type": "single", "question": "An organization has an AI usage policy. When a task conflicts with that policy, the associate should:", "options": ["Ignore the policy to finish faster.", "Follow the policy and seek guidance or approval before proceeding.", "Assume policies are optional.", "Delete the policy."], "correct": [1], "rationale": "Organizational AI policies are binding; when a task conflicts, the associate follows the policy and seeks approval rather than bypassing it.", "source": "CCAO-F Exam Guide (v1.0) — Domain 6: Governance, Risk, and Responsible Use"}, {"id": "D6-07", "domain": 6, "type": "single", "question": "Which is a key ethical concern when using AI to screen job applicants?", "options": ["The model's response speed.", "The risk of biased or discriminatory outcomes affecting real people.", "The color scheme of the interface.", "Whether outputs are in bullet points."], "correct": [1], "rationale": "Using AI in consequential decisions like hiring raises the ethical risk of bias and discrimination, which must be actively guarded against.", "source": "CCAO-F Exam Guide (v1.0) — Domain 6: Governance, Risk, and Responsible Use"}, {"id": "D6-08", "domain": 6, "type": "single", "question": "Before pasting a contract containing another company's confidential terms into Claude, the associate should:", "options": ["Paste it freely; confidentiality does not apply to AI.", "Confirm that doing so is permitted under confidentiality obligations and org policy.", "Share it publicly first.", "Assume any data is fine to upload."], "correct": [1], "rationale": "Third-party confidential information carries obligations; the associate must confirm permitted use under confidentiality terms and policy before uploading it.", "source": "CCAO-F Exam Guide (v1.0) — Domain 6: Governance, Risk, and Responsible Use"}, {"id": "D6-09", "domain": 6, "type": "single", "question": "An associate realizes a workflow might expose customers' regulated data. The most responsible immediate step is to:", "options": ["Continue and address it later.", "Pause the workflow and escalate the privacy risk for review and remediation.", "Delete the customer records to hide it.", "Tell no one."], "correct": [1], "rationale": "Discovering a potential exposure of regulated data warrants pausing and escalating the risk for review and remediation, not proceeding or concealing it.", "source": "CCAO-F Exam Guide (v1.0) — Domain 6: Governance, Risk, and Responsible Use"}, {"id": "D6-10", "domain": 6, "type": "single", "question": "Which statement best captures appropriate transparency about AI use?", "options": ["Always conceal that AI was used.", "Be transparent where stakeholders reasonably need to know AI contributed, per policy.", "Claim AI output is human-authored expertise.", "Never document AI involvement."], "correct": [1], "rationale": "Responsible use includes appropriate transparency, disclosing AI involvement where stakeholders reasonably need to know and policy requires it.", "source": "CCAO-F Exam Guide (v1.0) — Domain 6: Governance, Risk, and Responsible Use"}, {"id": "D6-11", "domain": 6, "type": "single", "question": "An associate wants to use Claude to give tailored tax advice to external clients. The most appropriate stance is to:", "options": ["Provide it as definitive professional advice.", "Recognize the limits: use Claude to support qualified professionals, not to replace regulated professional judgment.", "Skip any human expert review.", "Guarantee the advice is correct."], "correct": [1], "rationale": "Regulated professional advice requires qualified human judgment. Claude can support the professional but should not be presented as a substitute for it.", "source": "CCAO-F Exam Guide (v1.0) — Domain 6: Governance, Risk, and Responsible Use"}, {"id": "D6-12", "domain": 6, "type": "multi", "question": "Which are data-sensitivity red flags that should prompt extra caution before using Claude? (Select THREE.)", "options": ["Personally identifiable information (PII)", "Protected health or financial data", "A public press release", "Third-party confidential information", "A published blog post"], "correct": [0, 1, 3], "rationale": "PII, protected health/financial data, and third-party confidential information all trigger heightened caution. Public press releases and published posts do not.", "source": "CCAO-F Exam Guide (v1.0) — Domain 6: Governance, Risk, and Responsible Use"}, {"id": "D6-13", "domain": 6, "type": "single", "question": "The primary reason to align Claude usage with governance standards is to:", "options": ["Slow down the team.", "Manage legal, privacy, and reputational risk while enabling responsible value.", "Prevent anyone from using AI.", "Increase costs deliberately."], "correct": [1], "rationale": "Governance alignment manages legal, privacy, and reputational risk while still enabling responsible, valuable AI use, not to block usage or add cost.", "source": "CCAO-F Exam Guide (v1.0) — Domain 6: Governance, Risk, and Responsible Use"}, {"id": "D6-14", "domain": 6, "type": "single", "question": "An associate is unsure whether a particular use case is permitted. The best action is to:", "options": ["Assume it is fine and proceed.", "Check the organization's AI policy and, if still unclear, ask the appropriate owner before proceeding.", "Do the opposite of policy.", "Never use Claude again."], "correct": [1], "rationale": "When permitted use is unclear, the associate consults the AI policy and escalates to the appropriate owner for guidance rather than assuming.", "source": "CCAO-F Exam Guide (v1.0) — Domain 6: Governance, Risk, and Responsible Use"}, {"id": "D6-15", "domain": 6, "type": "single", "question": "Which is the best example of applying a privacy safeguard proactively?", "options": ["Uploading raw customer records to save time.", "Redacting or pseudonymizing identifiers before analysis so individuals cannot be identified.", "Sharing data widely to get feedback.", "Ignoring data classification labels."], "correct": [1], "rationale": "Redacting or pseudonymizing identifiers before analysis is a proactive privacy safeguard that reduces the risk of exposing individuals.", "source": "CCAO-F Exam Guide (v1.0) — Domain 6: Governance, Risk, and Responsible Use"}, {"id": "D6-16", "domain": 6, "type": "single", "question": "A vendor asks the associate to share exam-like internal data classified 'restricted' via Claude. The correct response is to:", "options": ["Share it because a vendor asked.", "Decline or escalate, since restricted data must be handled per its classification and policy.", "Reclassify it themselves to 'public.'", "Share a slightly smaller portion."], "correct": [1], "rationale": "Data classified 'restricted' must be handled according to its classification; the associate declines or escalates rather than sharing or reclassifying it.", "source": "CCAO-F Exam Guide (v1.0) — Domain 6: Governance, Risk, and Responsible Use"}, {"id": "D7-01", "domain": 7, "type": "single", "question": "A prompt consistently returns answers that miss the point. The most effective first troubleshooting step is to:", "options": ["Blame the model and give up.", "Diagnose the prompt: clarify the goal, add missing context, and specify the desired output.", "Send the same prompt repeatedly.", "Switch tools without changing the prompt."], "correct": [1], "rationale": "Underperforming prompts are usually fixed by diagnosing and improving them, clarifying the goal, adding context, and specifying output, before changing tools.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D7-02", "domain": 7, "type": "single", "question": "Outputs are too generic for the audience. The best optimization is to:", "options": ["Ask for the same generic result again.", "Add audience details and concrete constraints so responses are specific and relevant.", "Remove all context.", "Increase randomness with no other change."], "correct": [1], "rationale": "Generic output improves when the prompt supplies audience specifics and concrete constraints, giving Claude what it needs to tailor the response.", "source": "Claude Docs — Be clear, direct, and detailed", "sourceUrl": "https://docs.claude.com/en/docs/build-with-claude/prompt-engineering/be-clear-and-direct"}, {"id": "D7-03", "domain": 7, "type": "single", "question": "An associate's multi-part request keeps dropping one required section. A reliable fix is to:", "options": ["Hope it appears next time.", "Break the request into steps or explicitly enumerate every required section.", "Make the prompt vaguer.", "Ask for a shorter answer."], "correct": [1], "rationale": "When parts get dropped, decomposing the task or explicitly listing each required section makes coverage reliable.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D7-04", "domain": 7, "type": "single", "question": "A long conversation has drifted off-topic and quality is declining. The best optimization is to:", "options": ["Keep going in the same thread indefinitely.", "Summarize the essentials and restart a focused conversation with that context.", "Add unrelated topics to reset it.", "Switch to a cheaper model to fix drift."], "correct": [1], "rationale": "Drift in a long thread is resolved by summarizing key context and restarting a focused conversation, not by continuing or changing model tier.", "source": "Claude Help Center — How usage and length limits work", "sourceUrl": "https://support.claude.com/en/articles/11647753-how-do-usage-and-length-limits-work"}, {"id": "D7-05", "domain": 7, "type": "multi", "question": "Which are sound steps when an output underperforms? (Select THREE.)", "options": ["Clarify the instructions and success criteria", "Provide an example of the desired result", "Immediately conclude the task is impossible", "Break the task into smaller steps", "Repeat the identical prompt unchanged"], "correct": [0, 1, 3], "rationale": "Clarifying instructions, giving an example, and decomposing the task are effective. Declaring impossibility or repeating the same prompt unchanged are not.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D7-06", "domain": 7, "type": "single", "question": "After several iterations a prompt works well. To optimize the broader workflow, the associate should:", "options": ["Discard the working prompt.", "Capture it as a reusable template and document how to apply it.", "Keep it secret from the team.", "Change it randomly each use."], "correct": [1], "rationale": "Optimizing a workflow includes capturing what works as a reusable, documented template so the whole team benefits consistently.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D7-07", "domain": 7, "type": "single", "question": "Claude returns a plausible but wrong answer to a factual query. Beyond fixing the immediate answer, the associate should:", "options": ["Assume it will not happen again.", "Add a verification step to the workflow so factual claims are checked before use.", "Stop checking outputs.", "Increase output length."], "correct": [1], "rationale": "A recurring accuracy risk is best mitigated by building a verification step into the workflow, not just correcting the single answer.", "source": "CCAO-F Exam Guide (v1.0) — Domain 7: Troubleshooting and Optimization"}, {"id": "D7-08", "domain": 7, "type": "single", "question": "An associate notices a Project's outputs are inconsistent across users. A likely optimization is to:", "options": ["Tell users to phrase things randomly.", "Tighten the Project instructions so shared behavior is well specified.", "Remove all instructions.", "Give each user a different policy."], "correct": [1], "rationale": "Inconsistent Project behavior often traces to loose instructions; tightening the shared configuration makes outputs more consistent.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D7-09", "domain": 7, "type": "single", "question": "Feedback shows a workflow is accurate but too slow and costly for its volume. A reasonable optimization is to:", "options": ["Always use the most capable model regardless of need.", "Match routine, high-volume steps to a faster, lower-cost model and reserve the top model for complex steps.", "Add more manual steps.", "Ignore the cost and latency."], "correct": [1], "rationale": "Optimizing for volume means aligning routine steps to faster, cheaper models while reserving the most capable model for genuinely complex steps.", "source": "Claude Help Center — Manage usage credits", "sourceUrl": "https://support.claude.com/en/articles/12429409-manage-usage-credits-for-paid-claude-plans"}, {"id": "D7-10", "domain": 7, "type": "single", "question": "When adjusting an approach based on results, the associate should primarily rely on:", "options": ["Guesswork with no evidence.", "Observed output quality and feedback, changing one variable at a time to see what helps.", "Whatever is fastest to type.", "Never changing the approach."], "correct": [1], "rationale": "Effective optimization is evidence-driven: use observed quality and feedback and change one variable at a time to learn what actually improves results.", "source": "CCAO-F Exam Guide (v1.0) — Domain 7: Troubleshooting and Optimization"}, {"id": "D7-11", "domain": 7, "type": "single", "question": "A prompt sometimes ignores a formatting requirement. Before assuming a deeper problem, the associate should check whether:", "options": ["The requirement is stated clearly and not contradicted elsewhere in the prompt or instructions.", "The office Wi-Fi is on.", "The model dislikes the format.", "The task is cursed."], "correct": [0], "rationale": "Intermittent format misses often come from unclear or contradictory instructions; confirming the requirement is stated clearly and consistently is the practical first check.", "source": "Claude Docs — Be clear, direct, and detailed", "sourceUrl": "https://docs.claude.com/en/docs/build-with-claude/prompt-engineering/be-clear-and-direct"}, {"id": "D1-16", "domain": 1, "type": "single", "question": "An associate wants Claude to answer from a specific role perspective and tone in every chat within a workspace, without retyping it each time. Per Claude's Projects documentation, where does this belong?", "options": ["In each individual chat message", "In the project's custom instructions, which every chat in the project inherits", "In the project name and description", "In an uploaded spreadsheet"], "correct": [1], "rationale": "Project instructions are the global prompt every chat in the project inherits, so shared role and tone are set once there. The project name and description are informational and do not steer Claude.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D1-17", "domain": 1, "type": "single", "question": "For a custom Skill to activate at the right time, Claude's documentation stresses that the most important element is:", "options": ["The number of scripts bundled with it", "A clear, specific description telling Claude when to use the skill", "The color of the skill icon", "The length of the SKILL.md file"], "correct": [1], "rationale": "Skills load via progressive disclosure based on their description; a vague description means the skill may never fire. A precise description of when to use it is what lets Claude select it correctly.", "source": "Claude Help Center — What are skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D1-18", "domain": 1, "type": "single", "question": "An associate notes that giving Claude a general preference like 'always ask clarifying questions before starting' should apply to everything. Per the docs, the right home for this is:", "options": ["A task-specific Skill", "Custom instructions, which apply broadly across conversations", "A single chat message", "The project knowledge base"], "correct": [1], "rationale": "Custom instructions apply broadly to all conversations, which fits a universal working preference. Skills are task-specific and load only when relevant.", "source": "Claude Help Center — What are skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D2-26", "domain": 2, "type": "single", "question": "Per Claude's documentation, Claude creates an artifact (rather than answering inline) when the content is:", "options": ["Any answer longer than one sentence", "Significant, self-contained, and something you're likely to edit, iterate on, or reuse outside the conversation", "Always, for every response", "Only computer code"], "correct": [1], "rationale": "The documented criteria: content that is significant and self-contained (typically over 15 lines), likely to be edited/iterated/reused outside the chat, and able to stand on its own. Brief conversational answers stay inline.", "source": "Claude Help Center — What are artifacts and how do I use them", "sourceUrl": "https://support.claude.com/en/articles/9487310-what-are-artifacts-and-how-do-i-use-them"}, {"id": "D2-27", "domain": 2, "type": "single", "question": "An associate has a Markdown document artifact and wants to change one paragraph without regenerating the whole thing. The documented way is to:", "options": ["Delete the artifact and start over", "Highlight the text, click 'Edit with Claude,' and type the request so the change happens in place", "Ask in chat and hope Claude finds the right section", "Export to Word first"], "correct": [1], "rationale": "For Markdown documents, artifacts support in-place editing: highlight the text, choose 'Edit with Claude,' and describe the change, so you don't have to explain which section you mean.", "source": "Claude Help Center — What are artifacts and how do I use them", "sourceUrl": "https://support.claude.com/en/articles/9487310-what-are-artifacts-and-how-do-i-use-them"}, {"id": "D2-28", "domain": 2, "type": "single", "question": "After several revisions to an artifact, an associate wants to compare or return to an earlier version. Claude's artifacts feature provides:", "options": ["No version history — edits are permanent", "A version selector to switch between different versions", "Only a full undo of the entire conversation", "Versions only on Enterprise plans"], "correct": [1], "rationale": "Artifacts include a version selector so you can switch between versions. Editing prior chat messages can also branch the conversation with its own set of artifacts.", "source": "Claude Help Center — What are artifacts and how do I use them", "sourceUrl": "https://support.claude.com/en/articles/9487310-what-are-artifacts-and-how-do-i-use-them"}, {"id": "D2-29", "domain": 2, "type": "single", "question": "When choosing an output format, an associate should pick an artifact over an inline reply mainly when the content is:", "options": ["A quick factual answer to a question asked in passing", "Something the reader will refer back to, edit, or reuse outside the conversation", "A one-line acknowledgement", "Never — inline is always preferred"], "correct": [1], "rationale": "Artifacts suit substantial, reusable, self-contained deliverables the user will keep or iterate on. Brief conversational answers are better inline.", "source": "Claude Help Center — What are artifacts and how do I use them", "sourceUrl": "https://support.claude.com/en/articles/9487310-what-are-artifacts-and-how-do-i-use-them"}, {"id": "D2-30", "domain": 2, "type": "multi", "question": "According to the documentation, which are true of Claude's artifacts? (Select TWO.)", "options": ["They appear in a dedicated window beside the chat", "Editing an artifact rewrites Claude's memory of the original content", "You can switch between versions with a version selector", "They can only ever contain plain text"], "correct": [0, 2], "rationale": "Artifacts render in a dedicated side window and support versioning. Your edits don't change Claude's memory of the original content, and artifacts support many types (documents, code, HTML, SVG, diagrams, and more).", "source": "Claude Help Center — What are artifacts and how do I use them", "sourceUrl": "https://support.claude.com/en/articles/9487310-what-are-artifacts-and-how-do-i-use-them"}, {"id": "D2-31", "domain": 2, "type": "single", "question": "An associate builds an AI-powered artifact to share with the team. Regarding cost, the documentation states that usage:", "options": ["Is billed entirely to the artifact's creator", "Counts against each user's own Claude subscription limits, not the creator's", "Requires every user to paste in an API key", "Is free and unlimited for everyone forever"], "correct": [1], "rationale": "For AI-powered artifacts, users authenticate with their own Claude account and usage counts against each user's own subscription limits — no API keys required, and no cost to the creator.", "source": "Claude Help Center — What are artifacts and how do I use them", "sourceUrl": "https://support.claude.com/en/articles/9487310-what-are-artifacts-and-how-do-i-use-them"}, {"id": "D3-14", "domain": 3, "type": "single", "question": "A free-plan colleague asks how many Projects they can create. Per Claude's documentation:", "options": ["Projects are paid-only; free users get none", "Free users can create up to five projects", "Unlimited on every plan", "Exactly one project per account"], "correct": [1], "rationale": "Projects are available to all users, including free accounts; free users can create a maximum of five projects. Paid plans offer higher limits and enhanced project knowledge via RAG.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D3-15", "domain": 3, "type": "single", "question": "An associate needs a workspace where uploaded reference documents are available across many related chats and every chat starts with the same instructions. The documented feature is:", "options": ["A single long conversation", "A Project, which bundles a knowledge base and instructions shared across its chats", "Incognito chat", "An artifact"], "correct": [1], "rationale": "Projects are self-contained workspaces with their own chat histories and knowledge bases; uploaded content is used across all chats in the project, and project instructions are inherited by each chat.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D3-16", "domain": 3, "type": "single", "question": "On a paid plan, when a project's knowledge base holds a large volume of documents, the documentation says the project handles the content through:", "options": ["Silently ignoring documents beyond the first one", "Retrieval Augmented Generation (RAG), which scales project knowledge on paid plans", "Emailing the documents to Claude", "Requiring you to delete older files"], "correct": [1], "rationale": "Enhanced project knowledge with RAG is available on paid plans (Pro, Max, Team, Enterprise); projects automatically scale to handle large amounts of content through RAG.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D3-17", "domain": 3, "type": "single", "question": "An associate wants a quick, private one-off chat that Claude will not save to history or use to build memory. The documented tool is:", "options": ["A new Project", "Incognito chat (the ghost icon on chats outside a project)", "An artifact", "Custom instructions"], "correct": [1], "rationale": "Incognito chat creates a temporary conversation that isn't saved to chat history or memory. It's available on chats outside a project via the ghost icon and is offered on all plans.", "source": "Claude Help Center — Use incognito chats", "sourceUrl": "https://support.claude.com/en/articles/12260368-use-incognito-chats"}, {"id": "D3-18", "domain": 3, "type": "single", "question": "Which statement about searching past chats matches Claude's documentation?", "options": ["It is available on all plans including free", "It is available on paid plans (Pro, Max, Team, Enterprise) and uses RAG, appearing as a tool call", "It works only inside incognito chats", "It requires uploading your chats manually"], "correct": [1], "rationale": "Searching past chats is available to paid plans and uses Retrieval-Augmented Generation, showing up as a tool call in the conversation. Memory from chat history is separately available to all plans.", "source": "Claude Help Center — Chat search and memory", "sourceUrl": "https://support.claude.com/en/articles/11817273-use-claude-s-chat-search-and-memory-to-build-on-previous-context"}, {"id": "D3-19", "domain": 3, "type": "single", "question": "An associate expects Claude to remember details from a project's chats within that project but not bleed into other work. Per the docs, memory in projects is:", "options": ["Shared globally across all projects and chats", "Scoped separately to each project, keeping contexts contained", "Unavailable inside projects", "Only for Enterprise admins"], "correct": [1], "rationale": "Claude creates a separate memory for each project, so contexts stay contained (a safety guardrail) and unrelated initiatives don't mix. Global memory synthesis excludes chats inside projects.", "source": "Claude Help Center — Chat search and memory", "sourceUrl": "https://support.claude.com/en/articles/11817273-use-claude-s-chat-search-and-memory-to-build-on-previous-context"}, {"id": "D3-20", "domain": 3, "type": "single", "question": "A stakeholder asks Claude to 'generate a video' of a concept. Based on Claude's documented capabilities, the accurate response is that Claude:", "options": ["Generates native video on request", "Is a text-and-image-input, text-output model and does not natively generate image, audio, or video", "Generates video only on Enterprise plans", "Generates audio but not video"], "correct": [1], "rationale": "Claude accepts text and image input and produces text output; it has no native image, audio, or video generation. Setting this expectation correctly is part of product selection.", "source": "Claude Platform Docs — Features overview", "sourceUrl": "https://platform.claude.com/docs/en/intro"}, {"id": "D3-21", "domain": 3, "type": "single", "question": "The documentation notes that once you close an incognito chat, it:", "options": ["Is archived to your history", "Cannot be reopened", "Is automatically added to project memory", "Is emailed to you"], "correct": [1], "rationale": "Incognito chats are temporary; once closed they cannot be reopened. On Team/Enterprise they're retained for a limited period for safety and appear in compliance exports, but they aren't restored to your history.", "source": "Claude Help Center — Use incognito chats", "sourceUrl": "https://support.claude.com/en/articles/12260368-use-incognito-chats"}, {"id": "D3-22", "domain": 3, "type": "single", "question": "An associate wants Claude to draft a document, spreadsheet, or slide deck as a downloadable file. Per the docs, this depends on which capability being enabled?", "options": ["Incognito chat", "Code execution and file creation (also required for artifacts)", "A separate video plan", "The project name field"], "correct": [1], "rationale": "Artifacts and Anthropic's document-creation Skills (Excel, Word, PowerPoint, PDF) require Code execution and file creation to be enabled in settings; without it, artifacts are no longer supported.", "source": "Claude Help Center — What are artifacts and how do I use them", "sourceUrl": "https://support.claude.com/en/articles/9487310-what-are-artifacts-and-how-do-i-use-them"}, {"id": "D3-23", "domain": 3, "type": "multi", "question": "Per the documentation, which are accurate about Projects? (Select TWO.)", "options": ["Each chat in a project inherits the project's instructions", "The project name and description are used by Claude as prompts", "Uploaded knowledge is available across all chats in the project", "Projects are available only on Enterprise plans"], "correct": [0, 2], "rationale": "Project instructions are inherited by every chat, and knowledge-base content is available across all of a project's chats. The name and description are informational only, and projects are available on all plans (free users get five).", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D4-18", "domain": 4, "type": "single", "question": "An associate wants Claude to help clear an inbox by sending replies automatically through the Gmail connector. Per the documentation, Claude can:", "options": ["Send emails on your behalf once connected", "Draft emails in your Gmail account, but you must send them manually", "Only delete emails", "Access attachment contents and send them"], "correct": [1], "rationale": "The Gmail connector lets Claude search, read, and draft emails with context, but Claude cannot send email on your behalf — drafts must be sent manually. This keeps a human in the loop for outbound messages.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D4-19", "domain": 4, "type": "single", "question": "To standardize how the whole team produces a recurring deliverable (same structure and standards every time), the documented mechanism is to:", "options": ["Rely on each person to re-explain the format each time", "Package the approach as a Skill so Claude applies it consistently across conversations", "Put the entire standard in every single prompt", "Use incognito chat"], "correct": [1], "rationale": "Skills let you package proven workflows and standards so Claude applies them automatically whenever relevant, giving consistent outputs without re-explaining. Team/Enterprise owners can provision skills org-wide.", "source": "Claude Help Center — Use skills in Claude", "sourceUrl": "https://support.claude.com/en/articles/12512180-use-skills-in-claude"}, {"id": "D4-20", "domain": 4, "type": "single", "question": "An associate wants Claude to both access a team system and follow the team's exact procedure for using it. Per the docs, the right combination is:", "options": ["Skills alone", "MCP/connectors for access to the external service, plus a Skill for the procedure on how to use it", "Custom instructions alone", "Neither is possible"], "correct": [1], "rationale": "MCP connects Claude to external services and data (access), while Skills provide procedural knowledge (how to complete the task). The documentation notes you can use both together.", "source": "Claude Help Center — What are skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D4-21", "domain": 4, "type": "single", "question": "A team wants Claude to prepare a meeting brief by pulling from calendar, recent email, and Drive files. Per the documentation, this is enabled by:", "options": ["Uploading screenshots of each app", "Connecting the relevant Google Workspace connectors (Calendar, Gmail, Drive), which Claude accesses only when asked", "Nothing — Claude cannot read external apps", "Switching to incognito chat"], "correct": [1], "rationale": "Google Workspace connectors let Claude search email, read calendar events, and work with Drive documents from the conversation. Claude accesses this data only when you explicitly ask and retrieves the minimum needed.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D5-14", "domain": 5, "type": "single", "question": "When creating a Project, an associate puts the key behavioral rules in the project name and description. Per the documentation, the problem is:", "options": ["Names and descriptions are the only thing Claude reads", "Claude does not have access to the project name and description; behavioral rules belong in project instructions", "Descriptions must be under five words", "Instructions are ignored by Claude"], "correct": [1], "rationale": "The project name and description are informational for humans and are not seen by Claude. Behavioral guidance must go in the project instructions, which every chat inherits.", "source": "Claude Help Center — Create and manage projects", "sourceUrl": "https://support.claude.com/en/articles/9519177-how-can-i-create-and-manage-projects"}, {"id": "D5-15", "domain": 5, "type": "single", "question": "For a Team or Enterprise organization, before individual members can authenticate Google Workspace connectors, the documentation requires that:", "options": ["Each member emails Anthropic", "An Owner or Primary Owner enables the connectors at the organization level", "Members disable memory first", "The connectors are always on with no admin step"], "correct": [1], "rationale": "On Team and Enterprise plans, an Owner or Primary Owner must enable Google Workspace connectors at the organization level before individual users can authenticate and use them.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D5-16", "domain": 5, "type": "single", "question": "An associate configures a connector and worries Claude might reach data the associate can't normally see. Per the documentation, connectors:", "options": ["Grant Claude broader access than the user has", "Mirror your existing permissions — Claude cannot access anything you can't already access", "Ignore permissions entirely", "Require sharing your password in chat"], "correct": [1], "rationale": "Claude mirrors your existing permissions; you cannot access information through a connector that you don't already have access to. Claude also only retrieves data when you explicitly ask.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D5-17", "domain": 5, "type": "single", "question": "The Anthropic-built Skills for creating Excel, Word, PowerPoint, and PDF files are, per the documentation:", "options": ["Only available if you write them yourself", "Built-in and invoked automatically by Claude when relevant (with code execution enabled)", "Restricted to Enterprise plans", "Manually triggered with a slash command every time"], "correct": [1], "rationale": "Anthropic provides built-in document-creation Skills available to all users; Claude invokes them automatically when relevant, provided code execution is enabled.", "source": "Claude Help Center — What are skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D5-18", "domain": 5, "type": "single", "question": "Per the documentation, Skills avoid overloading the context window by:", "options": ["Loading every skill's full contents into every chat", "Progressive disclosure — Claude loads only the relevant skill and only the information it needs", "Deleting your chat history", "Restricting you to one skill total"], "correct": [1], "rationale": "Skills work through progressive disclosure: Claude determines which skills are relevant and loads only what it needs for the task, helping prevent context-window overload.", "source": "Claude Help Center — What are skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D5-19", "domain": 5, "type": "single", "question": "A custom Skill an associate uploads on a Pro plan is, by default:", "options": ["Automatically shared with the whole organization", "Private to their individual account", "Published publicly on the internet", "Deleted after one use"], "correct": [1], "rationale": "Custom skills you upload are private to your individual account. On Team and Enterprise plans you can share skills with colleagues or the organization; owners can also provision skills org-wide.", "source": "Claude Help Center — Use skills in Claude", "sourceUrl": "https://support.claude.com/en/articles/12512180-use-skills-in-claude"}, {"id": "D5-20", "domain": 5, "type": "single", "question": "To keep a Project's outputs accurate after a policy document changes, the documented maintenance action is to:", "options": ["Do nothing; knowledge updates itself", "Update or replace the file in the project knowledge base so chats reference the current version", "Rename the project", "Delete the project instructions"], "correct": [1], "rationale": "Project knowledge grounds Claude's responses; when source material changes, updating or replacing the knowledge file keeps every chat in the project referencing current information.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D5-21", "domain": 5, "type": "single", "question": "According to the documentation, how do Skills differ from a Project's custom instructions?", "options": ["Skills apply to everything; instructions are task-specific", "Custom instructions apply broadly; Skills are task-specific and load only when relevant", "They are identical features", "Skills cannot contain instructions"], "correct": [1], "rationale": "Custom instructions apply broadly across conversations, while Skills are task-specific, hold far more detail, and activate only when the work matches — making them suited to specialized workflows.", "source": "Claude Help Center — What are skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D5-22", "domain": 5, "type": "single", "question": "The documentation describes a custom Skill's core file as:", "options": ["A spreadsheet named skill.xlsx", "A SKILL.md Markdown file with instructions (plus optional scripts and resources)", "A compiled binary", "A video walkthrough"], "correct": [1], "rationale": "A skill is a folder with a SKILL.md file containing Markdown instructions; simple skills need no code, and you can attach executable scripts and resources for more advanced functionality.", "source": "Claude Help Center — What are skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D6-17", "domain": 6, "type": "single", "question": "For a sensitive, one-off review the associate doesn't want retained, the documented privacy tool is incognito chat. Which statement is accurate per the docs?", "options": ["Incognito chats are saved to history like normal chats", "Incognito chats aren't saved to history or memory, though on Team/Enterprise they're retained for a limited period for safety and appear in compliance exports", "Incognito chats can be reopened anytime", "Incognito chat works inside projects"], "correct": [1], "rationale": "Incognito chats aren't saved to chat history or memory and can't be reopened. On Team/Enterprise plans they're retained for a limited time for safety, are included in organizational exports, and the Compliance API — so they aren't a guarantee of non-retention. They're available only outside projects.", "source": "Claude Help Center — Use incognito chats", "sourceUrl": "https://support.claude.com/en/articles/12260368-use-incognito-chats"}, {"id": "D6-18", "domain": 6, "type": "single", "question": "Regarding data pulled through Google Workspace connectors, the documentation states that Anthropic:", "options": ["Trains its models on your Gmail, Drive, and Calendar connector data", "Does not train its models on your Gmail, Drive, or Calendar connector data", "Shares connector data publicly", "Retains connector data even after you delete the chat"], "correct": [1], "rationale": "Anthropic does not train models on Gmail, Drive, or Calendar connector data. Retrieved data is stored with its associated chat, so deleting the chat deletes that retrieved data.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D6-19", "domain": 6, "type": "single", "question": "An associate plans to publish an artifact to share a tool with people outside the company. The documented privacy caution is:", "options": ["Publishing is always private, so anything is fine to include", "Don't include confidential or sensitive information, since publishing/sharing makes it accessible to others", "Published artifacts can never be viewed by anyone", "Sharing requires each recipient to buy a license"], "correct": [1], "rationale": "Publishing or sharing an artifact makes it accessible to others (recipients may not even need an account), so you should avoid including confidential or sensitive information. For AI-powered artifacts, consider whether shared storage is used before entering sensitive data.", "source": "Claude Help Center — What are artifacts and how do I use them", "sourceUrl": "https://support.claude.com/en/articles/9487310-what-are-artifacts-and-how-do-i-use-them"}, {"id": "D6-20", "domain": 6, "type": "single", "question": "A team handling confidential client work wants persistent context per client but no cross-client leakage. Per the documentation, the safest structure is:", "options": ["One global memory shared across all clients", "A separate Project per client, since project memory and knowledge are scoped and don't bleed across projects or into global memory", "One long incognito chat for everything", "Putting all clients in a single project"], "correct": [1], "rationale": "Each project has its own scoped memory, knowledge base, and chat history that don't bleed into other projects or global memory — a documented containment guardrail well suited to per-client confidentiality.", "source": "Claude Help Center — Chat search and memory", "sourceUrl": "https://support.claude.com/en/articles/11817273-use-claude-s-chat-search-and-memory-to-build-on-previous-context"}, {"id": "D6-21", "domain": 6, "type": "single", "question": "Before Claude uses connector data, the documentation says Claude accesses your Gmail/Drive/Calendar:", "options": ["Continuously in the background", "Only when you explicitly ask a question or request an action that requires it, retrieving the minimum needed", "Only for Enterprise admins", "By copying your entire mailbox on connect"], "correct": [1], "rationale": "Claude accesses connector data only when you explicitly ask something that requires it and retrieves the minimum information needed, consistent with least-privilege handling of your data.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D6-22", "domain": 6, "type": "single", "question": "An Enterprise admin wants to remove Google Workspace connector access for the whole organization. Per the documentation, they can:", "options": ["Not change it once enabled", "Disable the connectors in Organization settings (Owners/Primary Owners control org-level connector access)", "Only disable it per individual chat, never org-wide", "Delete every user account"], "correct": [1], "rationale": "On Team and Enterprise plans, Owners and Primary Owners can disable Google Workspace connectors for the organization in Organization settings; individual users can also disable specific tools from the chat interface.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D7-12", "domain": 7, "type": "single", "question": "An associate enabled a custom Skill but it never activates. Per the documentation, the most likely cause is:", "options": ["The skill file is too short", "The skill's description is too vague, so Claude doesn't recognize when to load it", "Skills only work on Tuesdays", "The account has too many projects"], "correct": [1], "rationale": "Skills load based on their description via progressive disclosure. A vague description is the common reason a skill 'doesn't fire'; tightening the description to clearly state when to use it fixes it.", "source": "Claude Help Center — What are skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D7-13", "domain": 7, "type": "single", "question": "Claude isn't producing artifacts (or creating files) for an associate. The documented first thing to check is:", "options": ["Whether it is a leap year", "Whether Code execution and file creation is enabled in settings/capabilities", "Whether the associate has five projects", "Whether memory is turned off"], "correct": [1], "rationale": "Artifacts require Code execution and file creation to be enabled (Settings > Capabilities, or Organization settings for Team/Enterprise). Without it, artifacts are no longer supported.", "source": "Claude Help Center — What are artifacts and how do I use them", "sourceUrl": "https://support.claude.com/en/articles/9487310-what-are-artifacts-and-how-do-i-use-them"}, {"id": "D7-14", "domain": 7, "type": "single", "question": "A Google connector stops working with a 'you may need to reconnect' error. The documented remedy is to:", "options": ["Delete your Claude account", "Go to Customize > Connectors, disconnect the Google connector, then re-authenticate on next use", "Wait a year", "Switch to incognito chat"], "correct": [1], "rationale": "The documented fix is to disconnect the Google connector under Customize > Connectors and re-authenticate the next time you use a Workspace feature; if issues persist, remove the Claude connection from your Google account settings.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D7-15", "domain": 7, "type": "single", "question": "An associate's long single chat keeps losing track of earlier context and mixing topics. A documented, structural way to keep specialized guidance available without overloading context is to:", "options": ["Paste all guidance into every message", "Encode the recurring guidance as a Skill, which loads only when relevant via progressive disclosure", "Turn off memory", "Rename the chat"], "correct": [1], "rationale": "Skills load on demand through progressive disclosure, keeping specialized instructions available without cluttering the context window — a cleaner approach than pasting everything into every prompt.", "source": "Claude Help Center — What are skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D1-19", "domain": 1, "type": "single", "question": "Anthropic's documentation gives a 'golden rule of clear prompting.' What is it?", "options": ["Always make prompts as short as possible", "Show your prompt to a colleague with minimal context; if they're confused, Claude likely will be too", "Always include at least five examples", "Never give Claude any context"], "correct": [1], "rationale": "The golden rule: show your prompt to a colleague who has minimal context and ask them to follow it. If they're confused, Claude probably will be too — a practical clarity check.", "source": "Claude Docs — Be clear, direct, and detailed", "sourceUrl": "https://docs.claude.com/en/docs/build-with-claude/prompt-engineering/be-clear-and-direct"}, {"id": "D1-20", "domain": 1, "type": "single", "question": "The docs suggest thinking of Claude as which of the following when writing prompts?", "options": ["A mind reader who infers unstated intent", "A brilliant but very new employee (with amnesia) who needs explicit instructions and context", "A search engine that only needs keywords", "A coworker who already knows your norms"], "correct": [1], "rationale": "Anthropic frames Claude as a brilliant but brand-new employee with amnesia: it lacks your norms and context, so the more precisely you explain what you want, the better the result.", "source": "Claude Docs — Be clear, direct, and detailed", "sourceUrl": "https://docs.claude.com/en/docs/build-with-claude/prompt-engineering/be-clear-and-direct"}, {"id": "D1-21", "domain": 1, "type": "single", "question": "Per the prompt-engineering guidance, the most effective way to convey a desired style or format is often to:", "options": ["Stack many adjectives like 'nice' and 'professional'", "Provide one good example of the desired output (a sample beats adjectives)", "Ask Claude to guess the format", "Avoid examples to save tokens"], "correct": [1], "rationale": "The docs note that one good example beats multiple adjectives describing what you want. Showing input-output samples (multishot) reliably steers format and style.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D1-22", "domain": 1, "type": "single", "question": "Which instruction reflects the documentation's advice to 'be specific'?", "options": ["'Be concise.'", "'Write 5 bullets, each under 15 words.'", "'Make it good.'", "'Summarize this.'"], "correct": [1], "rationale": "The guidance favors explicit, measurable constraints ('5 bullets, each under 15 words') over vague directives like 'be concise,' which leave room for misinterpretation.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D1-23", "domain": 1, "type": "single", "question": "Per the docs, assigning Claude a role or expert persona (via a system prompt) primarily helps by:", "options": ["Guaranteeing factual accuracy", "Setting the appropriate perspective, tone, and vocabulary for the task", "Removing the need to review output", "Increasing the usage limit"], "correct": [1], "rationale": "Role prompting defines an expert persona so Claude adopts the right perspective, tone, and vocabulary. It shapes communication style, not factual guarantees.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D1-24", "domain": 1, "type": "single", "question": "The documentation's 'prompt chaining' technique means:", "options": ["Sending the same prompt repeatedly", "Breaking a complex task into a sequence of smaller prompts/steps", "Chaining multiple accounts together", "Removing all structure from a prompt"], "correct": [1], "rationale": "Prompt chaining breaks a complex task into ordered steps (for example, outline first, then expand each section), which improves reliability and lets you check intermediate results.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D1-25", "domain": 1, "type": "single", "question": "To reduce hallucinations, Anthropic's prompting guidance recommends explicitly:", "options": ["Telling Claude to always be confident", "Allowing Claude to say 'I don't know' when it is unsure", "Forbidding Claude from citing sources", "Asking for the longest possible answer"], "correct": [1], "rationale": "Explicitly giving Claude permission to say 'I don't know' (and to flag uncertainty) reduces fabricated answers — especially important for factual and RAG-style tasks.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D1-26", "domain": 1, "type": "single", "question": "According to the docs, which statement about prompt length is accurate?", "options": ["Longer, more complex prompts are always better", "Longer prompts are not always better; clarity and specificity matter more than length", "Prompts should never include context", "Only one-word prompts work well"], "correct": [1], "rationale": "The documentation warns against over-engineering: longer prompts aren't inherently better, and verbosity without added structure can make outputs worse. Start with clear, explicit instructions.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D1-27", "domain": 1, "type": "single", "question": "The prompt-engineering docs describe using XML tags or clear delimiters mainly to:", "options": ["Make the prompt look technical", "Separate instructions from data/context so Claude follows them reliably", "Increase the model's speed", "Bypass usage limits"], "correct": [1], "rationale": "Tags or delimiters clearly separate instructions, context, and examples so Claude can tell them apart; modern models also do well with clear headings and explicit language.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D1-28", "domain": 1, "type": "single", "question": "An associate refined a prompt for one model and worries it will break on the next model version. Per the docs, prompts:", "options": ["Must be fully rewritten for every model update", "Largely persist through model upgrades, unlike fine-tuned approaches", "Stop working after any update", "Are never affected by the model"], "correct": [1], "rationale": "Prompt engineering works atop existing models and prompts largely carry over through model upgrades, which is one advantage over fine-tuning.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D1-29", "domain": 1, "type": "single", "question": "Per the documentation, a good first step when you don't have a draft prompt is to:", "options": ["Give up and use another tool", "Use the prompt generator in the Claude Console to draft one", "Write a 2,000-word prompt immediately", "Copy someone else's password"], "correct": [1], "rationale": "The docs point to the Console's prompt generator to create a solid first-draft prompt when you're starting from scratch, then iterate from there.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D1-30", "domain": 1, "type": "multi", "question": "Which are documented prompt-engineering techniques for Claude? (Select THREE.)", "options": ["Be clear and direct with explicit instructions", "Provide examples of the desired output", "Give Claude a relevant role via a system prompt", "Rely on vague, ambiguous wording", "Never provide any context"], "correct": [0, 1, 2], "rationale": "Clarity/explicit instructions, examples (multishot), and role prompting are all documented techniques. Ambiguity and withholding context reduce quality.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D1-31", "domain": 1, "type": "single", "question": "The docs note that giving Claude more contextual information usually:", "options": ["Confuses the model", "Improves its performance, just as more context helps a person do a task", "Has no effect", "Is against policy"], "correct": [1], "rationale": "Just as a person performs better with more context, Claude performs better when given relevant background — purpose, audience, constraints, and examples.", "source": "Claude Docs — Be clear, direct, and detailed", "sourceUrl": "https://docs.claude.com/en/docs/build-with-claude/prompt-engineering/be-clear-and-direct"}, {"id": "D1-32", "domain": 1, "type": "single", "question": "For a task Claude only needs to do once, the documentation suggests:", "options": ["Always build a Skill first", "Just prompt well — explain what you want, give context, and refine", "Never prompt; wait for a template", "Create a new Project for every one-off task"], "correct": [1], "rationale": "For one-off or exploratory tasks, good prompting is enough. Skills are for approaches you want Claude to apply consistently across many conversations.", "source": "Claude Help Center — Skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D2-32", "domain": 2, "type": "single", "question": "A benefit of Claude's Research feature for validation, per the docs, is that it delivers reports with:", "options": ["No sources, to keep them short", "Easy-to-check citations so you can verify the findings", "Only Claude's opinions", "Randomized facts"], "correct": [1], "rationale": "Research produces thorough answers with easy-to-check citations, so you can trace and verify claims against the cited sources rather than trusting them blindly.", "source": "Claude Help Center — Use research on Claude", "sourceUrl": "https://support.claude.com/en/articles/11088861-use-research-on-claude"}, {"id": "D2-33", "domain": 2, "type": "single", "question": "Claude generates an Excel financial model via file creation. Before relying on it, the documented best practice is to:", "options": ["Trust it since Claude wrote the formulas", "Review the formulas, data, and any sensitive content — treat the first draft as a strong starting point", "Delete it and redo it by hand", "Publish it immediately"], "correct": [1], "rationale": "File-creation outputs are a strong starting point, but the guidance is to keep a human in the loop: verify formulas and data and review sensitive content before sharing.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D2-34", "domain": 2, "type": "single", "question": "An associate needs a polished, downloadable deliverable (a formatted report) rather than an on-screen answer. The documented capability is:", "options": ["Incognito chat", "Code execution and file creation, which produces real .docx/.pdf/.xlsx/.pptx files", "The project name field", "Turning off memory"], "correct": [1], "rationale": "Code execution and file creation generates actual downloadable Office/PDF files (with formatting, formulas, and charts), unlike an inline text answer or an in-app artifact preview.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D2-35", "domain": 2, "type": "single", "question": "Per the 'when to use' guidance, extended thinking is best suited to:", "options": ["Simple lookups that need a fast answer", "Complex reasoning where Claude benefits from planning its approach before answering", "Reducing the length of every answer", "Avoiding any tool use"], "correct": [1], "rationale": "Extended thinking suits complex reasoning tasks; it lets Claude plan its approach. It can also be combined with research to plan and then gather information comprehensively.", "source": "Claude Help Center — Web search, extended thinking, and research", "sourceUrl": "https://support.claude.com/en/articles/11095361-when-should-i-use-web-search-extended-thinking-and-research"}, {"id": "D2-36", "domain": 2, "type": "single", "question": "The documentation says the Research feature's final output is:", "options": ["A single short sentence", "A longer, synthesized report with citations across multiple sources", "Only a list of links", "An audio file"], "correct": [1], "rationale": "Research synthesizes information across multiple web and internal sources into a longer final report with proper citations, unlike a single-search quick answer.", "source": "Claude Help Center — Web search, extended thinking, and research", "sourceUrl": "https://support.claude.com/en/articles/11095361-when-should-i-use-web-search-extended-thinking-and-research"}, {"id": "D2-37", "domain": 2, "type": "single", "question": "An associate wants Claude to turn a messy CSV into a clean analysis with charts and a written summary. The most fitting documented approach is:", "options": ["Ask for advice on how to do it in Excel themselves", "Use code execution / file creation, which can clean data, analyze it, and produce formatted outputs", "Use incognito chat", "Rename the file"], "correct": [1], "rationale": "Code execution lets Claude perform data cleaning, analysis, visualization, and Python-based data science, returning formatted deliverables — the right fit for turning raw data into insights.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D2-38", "domain": 2, "type": "single", "question": "When comparing outputs for an external audience, the documentation's editing feature for Markdown artifacts lets you:", "options": ["Only regenerate the whole thing", "Highlight specific text and use 'Edit with Claude' to change it in place", "Edit only on Enterprise", "Never edit once created"], "correct": [1], "rationale": "Markdown artifacts support targeted in-place editing: highlight the text and choose 'Edit with Claude,' so you refine specific sections without regenerating everything.", "source": "Claude Help Center — What are artifacts", "sourceUrl": "https://support.claude.com/en/articles/9487310-what-are-artifacts-and-how-do-i-use-them"}, {"id": "D2-39", "domain": 2, "type": "single", "question": "Per the docs, when should an associate reach for web search rather than answering from Claude's own knowledge?", "options": ["When the answer is a stable historical fact", "When the request depends on current, changing, or recent information", "Never — web search is not for facts", "Only for creative writing"], "correct": [1], "rationale": "Web search is for information that is current, changing, or outside the model's training data. Stable, well-known facts don't require it.", "source": "Claude Help Center — Web search, extended thinking, and research", "sourceUrl": "https://support.claude.com/en/articles/11095361-when-should-i-use-web-search-extended-thinking-and-research"}, {"id": "D2-40", "domain": 2, "type": "multi", "question": "Which outputs warrant human verification before external use, consistent with the file-creation guidance? (Select TWO.)", "options": ["An Excel model's formulas and figures", "A financial report headed to a client", "Nothing — Claude's files are always final", "Only the file name"], "correct": [0, 1], "rationale": "The documentation stresses reviewing formulas, data, and sensitive content in generated files. High-stakes, client-facing outputs especially need verification.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D2-41", "domain": 2, "type": "single", "question": "Combining extended thinking with Research, per the docs, is useful because Claude can:", "options": ["Skip gathering information", "Plan its approach thoughtfully and then execute comprehensive, cited information gathering", "Answer without any sources", "Reduce the report to one line"], "correct": [1], "rationale": "The documentation notes that pairing extended thinking with research lets Claude both plan carefully and carry out thorough, multi-source information gathering — good for proposals and literature reviews.", "source": "Claude Help Center — Web search, extended thinking, and research", "sourceUrl": "https://support.claude.com/en/articles/11095361-when-should-i-use-web-search-extended-thinking-and-research"}, {"id": "D2-42", "domain": 2, "type": "single", "question": "An associate asks Claude to convert a Word report into a slide deck. Per the docs, file creation:", "options": ["Cannot convert between formats", "Can change a document from one format to another while preserving or enhancing the content", "Only works for spreadsheets", "Requires manual retyping"], "correct": [1], "rationale": "File creation supports cross-format conversion (for example, Word to PowerPoint) while preserving or enhancing content, so you don't rebuild the deliverable by hand.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D2-43", "domain": 2, "type": "single", "question": "Which best reflects the documented purpose of citations in Research outputs?", "options": ["Decoration only", "To let you check the sources behind each claim and trust the findings", "To make the report longer", "To hide the sources"], "correct": [1], "rationale": "Citations exist so findings are verifiable — you can follow each cited source to confirm the claim, which supports responsible evaluation of AI output.", "source": "Claude Help Center — Use research on Claude", "sourceUrl": "https://support.claude.com/en/articles/11088861-use-research-on-claude"}, {"id": "D2-44", "domain": 2, "type": "single", "question": "For a quick, single factual lookup during a task, the documentation indicates the best-fit tool is usually:", "options": ["The full Research feature", "A standard web search (a single search returning an answer)", "Incognito chat", "A new Project"], "correct": [1], "rationale": "Simple, quick lookups suit a standard web search. Research is reserved for comprehensive, multi-source investigations needing five or more tool calls.", "source": "Claude Help Center — Web search, extended thinking, and research", "sourceUrl": "https://support.claude.com/en/articles/11095361-when-should-i-use-web-search-extended-thinking-and-research"}, {"id": "D2-45", "domain": 2, "type": "single", "question": "An associate is unsure whether an output is complete for a multi-part request. A sound documented habit is to:", "options": ["Assume completeness if it's well formatted", "Check the output against each part of the request and required sections", "Only count the paragraphs", "Publish and fix later"], "correct": [1], "rationale": "Completeness is verified by mapping the output back to every part of the request. Formatting and confidence are not evidence that all required elements are present.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D2-46", "domain": 2, "type": "single", "question": "When a single CSV is turned into a PowerPoint, PDF, and Excel workbook at once, the documented expectation for each file is that it:", "options": ["Loses all formatting", "Maintains professional formatting and opens directly in Office or Google Workspace", "Can only be viewed in Claude", "Is uneditable"], "correct": [1], "rationale": "The documentation highlights that coordinated multi-format outputs keep professional formatting and open directly in Office or Google Workspace, remaining fully editable.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D2-47", "domain": 2, "type": "single", "question": "A responsible reviewer treats a Claude-generated first-draft document as:", "options": ["The final, unreviewable version", "A strong starting point to verify and refine before sharing", "Proof no review is needed", "Something to publish unread"], "correct": [1], "rationale": "The guidance frames generated files as a strong starting point; the associate still validates data, formulas, and sensitive content and refines before external use.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D3-24", "domain": 3, "type": "single", "question": "Per the documentation, code execution and file creation (Excel/Word/PowerPoint/PDF) is available on:", "options": ["Enterprise only", "All plans — Free, Pro, Max, Team, and Enterprise", "Pro only", "No plans yet"], "correct": [1], "rationale": "Code execution and file creation is available to all Claude users (Free, Pro, Max, Team, Enterprise) on web, Desktop, and Mobile; paid tiers mainly add higher usage limits.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D3-25", "domain": 3, "type": "single", "question": "The documented maximum file size for uploads and downloads with Claude's file features is:", "options": ["5MB", "30MB per file", "512MB", "Unlimited"], "correct": [1], "rationale": "The maximum file size is 30MB per file for both uploads and downloads. PDFs larger than 30MB can be processed through the computing environment without loading into the context window.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D3-26", "domain": 3, "type": "single", "question": "An associate turns on Research but it isn't investigating. Per the docs, Research requires:", "options": ["Extended thinking to be off", "Web search to be turned on", "An Enterprise plan only", "Incognito mode"], "correct": [1], "rationale": "You must have web search turned on for Research to function. Research is enabled via the '+' menu and shows a blue indicator while active.", "source": "Claude Help Center — Use research on Claude", "sourceUrl": "https://support.claude.com/en/articles/11088861-use-research-on-claude"}, {"id": "D3-27", "domain": 3, "type": "single", "question": "Per the 'when to use' guidance, Research is optimal for tasks that:", "options": ["Need a single quick fact", "Require comprehensive gathering across many sources (roughly five or more tool calls) and a synthesized report", "Should avoid citations", "Never touch the web"], "correct": [1], "rationale": "Research fits comprehensive information gathering requiring about five or more tool calls, synthesizing web and integration sources into an in-depth, cited report.", "source": "Claude Help Center — Web search, extended thinking, and research", "sourceUrl": "https://support.claude.com/en/articles/11095361-when-should-i-use-web-search-extended-thinking-and-research"}, {"id": "D3-28", "domain": 3, "type": "single", "question": "According to the documentation, a plan's session-based usage limit resets:", "options": ["Once a month", "Every five hours", "Never", "Every 24 hours only"], "correct": [1], "rationale": "Session-based usage limits reset every five hours. Separately, weekly limits reset at a fixed time each week assigned to your account.", "source": "Claude Help Center — What is the Pro plan", "sourceUrl": "https://support.claude.com/en/articles/8325606-what-is-the-pro-plan"}, {"id": "D3-29", "domain": 3, "type": "single", "question": "The documentation distinguishes usage limits from length limits as follows:", "options": ["They are the same thing", "Usage limits = how much you use Claude over time; length limits = how long a single conversation can get", "Length limits control billing only", "Usage limits apply to one chat"], "correct": [1], "rationale": "Usage limits govern quantity over time across all conversations; length limits govern how long/complex any single conversation can become. Hit length? Start a new chat or use projects.", "source": "Claude Help Center — How usage and length limits work", "sourceUrl": "https://support.claude.com/en/articles/11647753-how-do-usage-and-length-limits-work"}, {"id": "D3-30", "domain": 3, "type": "single", "question": "Per the Pro plan documentation, the Pro plan offers, compared to the free service:", "options": ["The same usage", "At least five times the usage per session, plus priority access and early features", "Less usage", "Only API access"], "correct": [1], "rationale": "Pro provides at least five times the per-session usage of the free service, priority access during high traffic, and early access to new features. It's $20/month (US).", "source": "Claude Help Center — What is the Pro plan", "sourceUrl": "https://support.claude.com/en/articles/8325606-what-is-the-pro-plan"}, {"id": "D3-31", "domain": 3, "type": "single", "question": "The documentation states Team plans support:", "options": ["Unlimited seats", "Up to 150 seats (move to Enterprise for more)", "Exactly 2 seats", "One seat only"], "correct": [1], "rationale": "Team plans support up to 150 seats; organizations needing more upgrade to Enterprise. Usage limits on Team are per-member, not pooled across the whole team.", "source": "Claude Help Center — What is the Team plan", "sourceUrl": "https://support.claude.com/en/articles/9266767-what-is-the-team-plan"}, {"id": "D3-32", "domain": 3, "type": "single", "question": "Per the Team plan documentation, which is included with a Team plan?", "options": ["Only Pro's features, with nothing added for organizations", "Centralized admin and billing, SSO and role-based access, and connectors for workplace tools — with usage limits applied per member", "API usage bundled into every seat", "Unlimited seats with no administrative controls"], "correct": [1], "rationale": "The Team plan adds organization features on top of Pro: centralized admin/billing, advanced identity and access management (SSO, JIT provisioning, role-based permissioning), and workplace connectors. Usage limits are per-member, not pooled. (Enterprise is for organizations that exceed Team's 150-seat cap or need further controls.)", "source": "Claude Help Center — What is the Team plan", "sourceUrl": "https://support.claude.com/en/articles/9266767-what-is-the-team-plan"}, {"id": "D3-33", "domain": 3, "type": "single", "question": "Per the usage-credits guidance, to control token costs while keeping quality, associates should:", "options": ["Always use Opus for everything", "Use the efficient Haiku model or the most recent Sonnet for most tasks, reserving Opus for the hardest work", "Never use Sonnet", "Disable all models"], "correct": [1], "rationale": "The documentation recommends choosing efficient models — Haiku or the most recent Sonnet — for most tasks at lower token cost, keeping Opus for genuinely complex work.", "source": "Claude Help Center — Manage usage credits", "sourceUrl": "https://support.claude.com/en/articles/12429409-manage-usage-credits-for-paid-claude-plans"}, {"id": "D3-34", "domain": 3, "type": "single", "question": "An associate keeps hitting a project's context limit. A documented way to maximize available context is to:", "options": ["Add more unused files", "Use projects effectively (RAG), shorten project instructions, and remove unused files", "Lengthen every instruction", "Turn extended thinking on for everything"], "correct": [1], "rationale": "The docs list maximizing context by leaning on projects' RAG, keeping instructions concise, removing unused files, and toggling extended thinking off when not needed.", "source": "Claude Help Center — How usage and length limits work", "sourceUrl": "https://support.claude.com/en/articles/11647753-how-do-usage-and-length-limits-work"}, {"id": "D3-35", "domain": 3, "type": "single", "question": "Per the documentation, projects handle large amounts of information efficiently because they use:", "options": ["A bigger model automatically", "Retrieval-Augmented Generation (RAG), loading only relevant content into context", "Unlimited context on every plan", "External email"], "correct": [1], "rationale": "Projects use RAG to work with large knowledge efficiently by loading only relevant content into the context window, rather than everything at once.", "source": "Claude Help Center — How usage and length limits work", "sourceUrl": "https://support.claude.com/en/articles/11647753-how-do-usage-and-length-limits-work"}, {"id": "D3-36", "domain": 3, "type": "single", "question": "Which statement about memory availability matches the documentation?", "options": ["Memory from chat history is Enterprise-only", "Memory from chat history is available on all plans; searching past chats is paid-only", "No plan has memory", "Memory only works in incognito"], "correct": [1], "rationale": "Memory from chat history is available to all plans (Free, Pro, Max, Team, Enterprise); the separate 'search past chats' capability is limited to paid plans and uses RAG.", "source": "Claude Help Center — Chat search and memory", "sourceUrl": "https://support.claude.com/en/articles/11817273-use-claude-s-chat-search-and-memory-to-build-on-previous-context"}, {"id": "D3-37", "domain": 3, "type": "single", "question": "Per the documentation, incognito chat is available to:", "options": ["Enterprise only", "All Claude users", "Free only", "No one"], "correct": [1], "rationale": "Incognito chat is available to all Claude users. It creates a temporary conversation (outside projects) that isn't saved to history or memory.", "source": "Claude Help Center — Use incognito chats", "sourceUrl": "https://support.claude.com/en/articles/12260368-use-incognito-chats"}, {"id": "D3-38", "domain": 3, "type": "single", "question": "An associate wants deeper reasoning on a hard analytical task and is deciding on a toggle. The documented feature is:", "options": ["Incognito", "Extended thinking, which they can turn off when not needed to save usage", "The project name", "Web search only"], "correct": [1], "rationale": "Extended thinking provides enhanced reasoning for complex tasks; the docs also note turning it off when you don't need it helps optimize your usage.", "source": "Claude Help Center — How usage and length limits work", "sourceUrl": "https://support.claude.com/en/articles/11647753-how-do-usage-and-length-limits-work"}, {"id": "D3-39", "domain": 3, "type": "single", "question": "Per the documentation, usage credits let paid subscribers (Pro, Max):", "options": ["Get unlimited free usage", "Continue past included limits by billing further usage at standard API rates", "Avoid all limits permanently", "Downgrade the model"], "correct": [1], "rationale": "With usage credits enabled, paid subscribers can keep working after hitting session limits, billed at standard API rates; the five-hour reset still applies.", "source": "Claude Help Center — Manage usage credits", "sourceUrl": "https://support.claude.com/en/articles/12429409-manage-usage-credits-for-paid-claude-plans"}, {"id": "D3-40", "domain": 3, "type": "single", "question": "After Claude creates a f
