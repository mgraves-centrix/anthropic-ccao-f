          '%;background:' + (passed ? "var(--correct)" : "var(--slate)") + '"></span></div>' +
        '<span class="dscore__pct">' + m.scaled + '</span>' +
      '</div>';
    }).join("") + '</div>';
  }

  /* ================= PRACTICE ================= */
  function viewPractice() {
    if (practice && !practice.done) return renderPracticeRunner();
    renderPracticeSetup();
  }

  function renderPracticeSetup() {
    var domChecks = DATA.meta.domains.map(function (d) {
      var n = DATA.questions.filter(function (q) { return q.domain === d.id; }).length;
      return '<label class="check">' +
        '<input type="checkbox" name="dom" value="' + d.id + '" checked />' +
        '<span><span class="check__name">D' + d.id + " · " + esc(d.name) + '</span>' +
        '<span class="check__meta">' + n + " questions · " + d.weight + '% weight</span></span></label>';
    }).join("");

    mount(
      '<div class="stack">' +
        '<div class="section-title"><h1 style="font-size:1.5rem">Practice setup</h1></div>' +
        '<section class="panel stack">' +
          '<div><div class="eyebrow" style="margin-bottom:.6rem">Domains</div>' +
            '<div class="setup__grid" id="domGrid">' + domChecks + '</div>' +
            '<div class="row" style="margin-top:.6rem">' +
              '<button class="btn btn--sm btn--ghost" id="selAll">Select all</button>' +
              '<button class="btn btn--sm btn--ghost" id="selNone">Clear</button></div>' +
          '</div>' +
          '<div class="row">' +
            '<div class="field"><label>Number of questions</label>' +
              '<select id="count"><option value="10">10</option><option value="20" selected>20</option>' +
              '<option value="40">40</option><option value="0">All selected</option></select></div>' +
            '<div class="field"><label>Order</label>' +
              '<select id="order"><option value="shuffle" selected>Shuffle</option><option value="linear">By ID</option></select></div>' +
          '</div>' +
          '<div class="row"><button class="btn btn--primary" id="start">Start practice</button>' +
            '<span class="wrow__meta" id="poolNote"></span></div>' +
        '</section>' +
      '</div>',
      function () {
        function selectedDomains() {
          return Array.prototype.slice.call(document.querySelectorAll('input[name="dom"]:checked'))
            .map(function (i) { return parseInt(i.value, 10); });
        }
        function pool() {
          var doms = selectedDomains();
          return DATA.questions.filter(function (q) { return doms.indexOf(q.domain) !== -1; });
        }
        function updateNote() {
          document.getElementById("poolNote").textContent = pool().length + " questions available";
        }
        document.getElementById("domGrid").addEventListener("change", updateNote);
        document.getElementById("selAll").addEventListener("click", function () {
          document.querySelectorAll('input[name="dom"]').forEach(function (i) { i.checked = true; }); updateNote();
        });
        document.getElementById("selNone").addEventListener("click", function () {
          document.querySelectorAll('input[name="dom"]').forEach(function (i) { i.checked = false; }); updateNote();
        });
        document.getElementById("start").addEventListener("click", function () {
          var p = pool();
          if (!p.length) { alert("Select at least one domain."); return; }
          var order = document.getElementById("order").value;
          var qs = order === "shuffle" ? shuffle(p) : p.slice().sort(function (a, b) { return a.id < b.id ? -1 : 1; });
          var count = parseInt(document.getElementById("count").value, 10);
          if (count > 0) qs = qs.slice(0, count);
          practice = { questions: qs, idx: 0, selected: new Set(), checked: false, correctCount: 0, done: false, perms: {} };
          renderPracticeRunner();
        });
        updateNote();
      }
    );
  }

  function renderPracticeRunner() {
    var q = practice.questions[practice.idx];
    var total = practice.questions.length;
    var progress = ((practice.idx) / total) * 100;

    mount(
      '<div class="runbar">' +
        '<span class="runbar__meta mono">Q ' + (practice.idx + 1) + " / " + total + '</span>' +
        '<div class="progressline"><span style="width:' + progress + '%"></span></div>' +
        '<span class="runbar__meta mono">' + practice.correctCount + ' correct</span>' +
        '<button class="btn btn--sm btn--ghost" id="quit">End session</button>' +
      '</div>' +
      '<section class="panel qcard">' + questionHTML(q, {
        selected: practice.selected, checked: practice.checked, reveal: practice.checked,
        perm: permFor(practice.perms, q.id, q.options.length)
      }) +
        practiceControls() +
      '</section>',
      bindPracticeRunner
    );

  function questionHTML(q, o) {
    var isMulti = q.type === "multi";
    var tags = '<div class="qcard__tags">' +
      '<span class="tag dom mono">D' + q.domain + " · " + esc(domainName(q.domain)) + '</span>' +
      '<span class="tag mono">' + esc(q.id) + '</span>' +
      (isMulti ? '<span class="tag multi mono">Select ' + q.correct.length + '</span>'
               : '<span class="tag mono">Single answer</span>') +
      (q.sourceUrl ? '<span class="tag doc mono">Docs</span>'
                   : (q.source ? '<span class="tag guide mono">Guide</span>' : "")) +
      '</div>';

    // Display order: shuffled if a permutation is supplied, else natural order.
    var order = (o && o.perm && o.perm.length === q.options.length) ? o.perm : rangeArr(q.options.length);

    var opts = order.map(function (oi, pos) {
      var opt = q.options[oi];
      var cls = "opt type-" + q.type;
      var isSel = o.selected && o.selected.has(oi);
      var mark = letter(pos);
      if (o.reveal) {
        var inKey = q.correct.indexOf(oi) !== -1;
        if (inKey && isSel) cls += " correct";
        else if (inKey && !isSel) cls += " missed correct";
        else if (!inKey && isSel) cls += " incorrect";
        if (inKey) mark = "✓"; else if (isSel) mark = "✕";
      } else if (isSel) {
        cls += " selected";
      }
      return '<button class="' + cls + '" data-i="' + oi + '"' + (o.checked ? " disabled" : "") + '>' +
        '<span class="opt__mark mono">' + mark + '</span>' +
        '<span class="opt__body">' + esc(opt) + '</span></button>';
    }).join("");

    var rationale = "";
    if (o.reveal) {
      var right = setsEqual(o.selected, q.correct);
      // Answer letters reflect the shuffled display positions
      var ansLetters = order.map(function (oi, pos) {
        return q.correct.indexOf(oi) !== -1 ? letter(pos) : null;
      }).filter(Boolean).join(", ");
      rationale = '<div class="rationale">' +
        '<div class="rationale__head"><span class="rationale__verdict ' + (right ? "right" : "wrong") + '">' +
          (right ? "Correct" : "Not quite") + '</span>' +
          '<span class="wrow__meta">Answer: ' + ansLetters + '</span></div>' +
        '<p>' + esc(q.rationale) + '</p>' +
        (q.sourceUrl
          ? '<p class="rationale__src mono">Source: <a href="' + esc(q.sourceUrl) + '" target="_blank" rel="noopener noreferrer">' + esc(q.source) + ' ↗</a></p>'
          : (q.source ? '<p class="rationale__src mono">Reference: ' + esc(q.source) + '</p>' : "")) +
        '</div>';
    }

    return tags +
      '<div class="qcard__stem">' + esc(q.question) + '</div>' +
      '<div class="options" id="opts">' + opts + '</div>' +
      rationale;
  }

  function practiceControls() {
    var last = practice.idx === practice.questions.length - 1;
    if (!practice.checked) {
      return '<div class="runfoot"><span></span>' +
        '<button class="btn btn--primary" id="check" disabled>Check answer</button></div>';
    }
    return '<div class="runfoot"><span></span>' +
      '<button class="btn btn--primary" id="next">' + (last ? "See results" : "Next question") + '</button></div>';
  }

  function bindPracticeRunner() {
    var q = practice.questions[practice.idx];
    var quit = document.getElementById("quit");
    quit.addEventListener("click", function () {
      practice = null; location.hash = "#/practice"; render();
    });

    if (!practice.checked) {
      document.getElementById("opts").addEventListener("click", function (e) {
        var b = e.target.closest(".opt"); if (!b) return;
        var i = parseInt(b.getAttribute("data-i"), 10);
        if (q.type === "single") { practice.selected = new Set([i]); }
        else {
          if (practice.selected.has(i)) practice.selected.delete(i); else practice.selected.add(i);
        }
        // re-render options selection state only
        renderPracticeRunner();
      });
      var check = document.getElementById("check");
      if (check) {
        check.disabled = practice.selected.size === 0;
        check.addEventListener("click", function () {
          if (practice.selected.size === 0) return;
          practice.checked = true;
          if (setsEqual(practice.selected, q.correct)) practice.correctCount++;
          recordAttempt(q.id, setsEqual(practice.selected, q.correct));
          renderPracticeRunner();
        });
      }
    } else {
      var next = document.getElementById("next");
      next.addEventListener("click", function () {
        if (practice.idx === practice.questions.length - 1) {
          practice.done = true;
          renderPracticeResults();
        } else {
          practice.idx++;
          practice.selected = new Set();
          practice.checked = false;
          renderPracticeRunner();
        }
      });
    }
  }

  function renderPracticeResults() {
    var total = practice.questions.length;
    var correct = practice.correctCount;
    var acc = total ? correct / total : 0;
    mount(
      '<div class="stack">' +
        '<section class="panel stack">' +
          '<div class="eyebrow">Practice session complete</div>' +
          '<h1 style="font-size:1.5rem">' + correct + " / " + total + " correct · " + pct(acc) + '%</h1>' +
          calibHTML(scaledFromAccuracy(acc), { note: "Estimated readiness for this set. A session isn’t the full exam — mix domains and take the timed mock to gauge readiness." }) +
          '<div class="row">' +
            '<button class="btn btn--primary" id="again">New practice set</button>' +
            '<a class="btn btn--ghost" href="#/mock">Try the mock exam</a>' +
            '<a class="btn btn--ghost" href="#/">Home</a>' +
          '</div>' +
        '</section>' +
      '</div>',
      function () {
        document.getElementById("again").addEventListener("click", function () {
          practice = null; renderPracticeSetup();
        });
      }
    );
  }

  /* ================= MOCK ================= */
  function allocateCounts(total, domains, availByDom) {
    // largest-remainder allocation by weight, clamped to availability
    var sumW = domains.reduce(function (a, d) { return a + d.weight; }, 0);
    var raw = domains.map(function (d) { return { id: d.id, exact: total * d.weight / sumW }; });
    var base = raw.map(function (r) { return { id: r.id, n: Math.floor(r.exact), rem: r.exact - Math.floor(r.exact) }; });
    var assigned = base.reduce(function (a, b) { return a + b.n; }, 0);
    var left = total - assigned;
    base.sort(function (a, b) { return b.rem - a.rem; });
    for (var i = 0; i < left; i++) base[i % base.length].n++;
    var out = {};
    base.forEach(function (b) { out[b.id] = Math.min(b.n, availByDom[b.id] || 0); });
    return out;
  }

  function buildMockQuestions() {
    var availByDom = {};
    DATA.meta.domains.forEach(function (d) {
      availByDom[d.id] = DATA.questions.filter(function (q) { return q.domain === d.id; }).length;
    });
    var counts = allocateCounts(MOCK_COUNT, DATA.meta.domains, availByDom);
    var picked = [];
    var usedIds = {};
    DATA.meta.domains.forEach(function (d) {
      var pool = shuffle(DATA.questions.filter(function (q) { return q.domain === d.id; }));
      pool.slice(0, counts[d.id]).forEach(function (q) { picked.push(q); usedIds[q.id] = 1; });
    });
    // top up to MOCK_COUNT if short
    if (picked.length < MOCK_COUNT) {
      shuffle(DATA.questions).forEach(function (q) {
        if (picked.length >= MOCK_COUNT) return;
        if (!usedIds[q.id]) { picked.push(q); usedIds[q.id] = 1; }
      });
    }
    return shuffle(picked).slice(0, MOCK_COUNT);
  }

  function viewMock() {
    if (mock && mock.submitted) return renderMockResults();
    if (mock) return renderMockRunner();
    renderMockIntro();
  }

  function renderMockIntro() {
    mount(
      '<div class="stack">' +
        '<section class="panel hero stack">' +
          '<div class="eyebrow">Full-length mock exam</div>' +
          '<h1 class="hero__title">' + MOCK_COUNT + ' questions · 120 minutes</h1>' +
          '<p class="hero__lead">Mirrors the real format: questions weighted across all seven domains, no feedback until you submit. ' +
            'The timer starts when you begin. You can flag questions and jump around freely.</p>' +
          '<ul style="color:var(--ink-2);font-size:.92rem;margin:.2rem 0 0;padding-left:1.1rem">' +
            '<li>Multiple-response items tell you how many options to select.</li>' +
            '<li>Aim for ~2 minutes per item; flag and return to the hard ones.</li>' +
            '<li>You need an estimated 720+ (≈69% correct) to clear the cut.</li>' +
          '</ul>' +
          '<div class="row"><button class="btn btn--primary" id="begin">Begin mock exam</button>' +
            '<a class="btn btn--ghost" href="#/">Cancel</a></div>' +
        '</section>' +
      '</div>',
      function () {
        document.getElementById("begin").addEventListener("click", function () {
          mock = {
            questions: buildMockQuestions(), idx: 0,
            answers: {}, flags: {}, submitted: false, perms: {},
            endAt: Date.now() + MOCK_SECONDS * 1000
          };
          startTimer();
          renderMockRunner();
        });
      }
    );
  }

  function startTimer() {
    if (mockTimer) clearInterval(mockTimer);
    mockTimer = setInterval(function () {
      if (!mock || mock.submitted) { clearInterval(mockTimer); mockTimer = null; return; }
      var left = Math.round((mock.endAt - Date.now()) / 1000);
      var elt = document.getElementById("timer");
      if (left <= 0) { submitMock(); return; }
      if (elt) {
        elt.textContent = fmtTime(left);
        elt.className = "timer" + (left <= 60 ? " crit" : left <= 300 ? " warn" : "");
      }
    }, 1000);
  }
  function stopTimer() { if (mockTimer) { clearInterval(mockTimer); mockTimer = null; } }
  function fmtTime(s) {
    var m = Math.floor(s / 60), sec = s % 60;
    return (m < 10 ? "0" : "") + m + ":" + (sec < 10 ? "0" : "") + sec;
  }
  function timeLeft() { return Math.max(0, Math.round((mock.endAt - Date.now()) / 1000)); }

  function renderMockRunner() {
    var q = mock.questions[mock.idx];
    var sel = new Set(mock.answers[q.id] || []);
    var answeredCount = Object.keys(mock.answers).filter(function (k) { return mock.answers[k].length; }).length;

    var nav = mock.questions.map(function (qq, i) {
      var cls = "navdot";
      if ((mock.answers[qq.id] || []).length) cls += " answered";
      if (mock.flags[qq.id]) cls += " flagged";
      if (i === mock.idx) cls += " current";
      return '<button class="' + cls + '" data-nav="' + i + '">' + (i + 1) + '</button>';
    }).join("");

    mount(
      '<div class="runbar">' +
        '<span class="runbar__meta mono">Q ' + (mock.idx + 1) + " / " + mock.questions.length + '</span>' +
        '<div class="progressline"><span style="width:' + (answeredCount / mock.questions.length * 100) + '%"></span></div>' +
        '<span class="runbar__meta mono">' + answeredCount + ' answered</span>' +
        '<span class="timer mono" id="timer">' + fmtTime(timeLeft()) + '</span>' +
      '</div>' +
      '<section class="panel qcard">' +
        questionHTML(q, { selected: sel, checked: false, reveal: false,
          perm: permFor(mock.perms, q.id, q.options.length) }) +
        '<div class="runfoot">' +
          '<div class="row">' +
            '<button class="btn btn--sm btn--ghost" id="prev"' + (mock.idx === 0 ? " disabled" : "") + '>Previous</button>' +
            '<button class="btn btn--sm btn--ghost" id="flag">' + (mock.flags[q.id] ? "Unflag" : "Flag") + '</button>' +
          '</div>' +
          '<button class="btn btn--primary" id="next">' +
            (mock.idx === mock.questions.length - 1 ? "Review & submit" : "Next") + '</button>' +
        '</div>' +
      '</section>' +
      '<section class="panel"><div class="eyebrow" style="margin-bottom:.6rem">Navigator</div>' +
        '<div class="navgrid" id="navGrid">' + nav + '</div>' +
        '<div class="row" style="margin-top:1rem;justify-content:flex-end">' +
          '<button class="btn btn--primary" id="submit">Submit exam</button></div>' +
      '</section>',
      function () {
        // keep timer display fresh immediately
        var t = document.getElementById("timer"); if (t) t.textContent = fmtTime(timeLeft());

        document.getElementById("opts").addEventListener("click", function (e) {
          var b = e.target.closest(".opt"); if (!b) return;
          var i = parseInt(b.getAttribute("data-i"), 10);
          var cur = new Set(mock.answers[q.id] || []);
          if (q.type === "single") cur = new Set([i]);
          else { if (cur.has(i)) cur.delete(i); else cur.add(i); }
          mock.answers[q.id] = Array.from(cur);
          renderMockRunner();
        });
        document.getElementById("flag").addEventListener("click", function () {
          mock.flags[q.id] = !mock.flags[q.id]; renderMockRunner();
        });
        var prev = document.getElementById("prev");
        if (!prev.disabled) prev.addEventListener("click", function () { mock.idx--; renderMockRunner(); });
        document.getElementById("next").addEventListener("click", function () {
          if (mock.idx < mock.questions.length - 1) { mock.idx++; renderMockRunner(); }
          else renderMockRunner(); // last: stay; navigator + submit visible
        });
        document.getElementById("navGrid").addEventListener("click", function (e) {
          var b = e.target.closest("[data-nav]"); if (!b) return;
          mock.idx = parseInt(b.getAttribute("data-nav"), 10); renderMockRunner();
        });
        document.getElementById("submit").addEventListener("click", function () {
          var answered = Object.keys(mock.answers).filter(function (k) { return mock.answers[k].length; }).length;
          var msg = answered < mock.questions.length
            ? "You've answered " + answered + " of " + mock.questions.length + ". Submit anyway?"
            : "Submit your exam for scoring?";
          if (confirm(msg)) submitMock();
        });
      }
    );
  }

  function submitMock() {
    if (!mock || mock.submitted) return;
    stopTimer();
    var byDomain = {};
    var correct = 0;
    DATA.meta.domains.forEach(function (d) { byDomain[d.id] = { c: 0, t: 0 }; });
    mock.questions.forEach(function (q) {
      byDomain[q.domain].t++;
      var sel = new Set(mock.answers[q.id] || []);
      if (setsEqual(sel, q.correct)) { correct++; byDomain[q.domain].c++; }
      recordAttempt(q.id, setsEqual(sel, q.correct));
    });
    var acc = correct / mock.questions.length;
    var result = {
      date: Date.now(), correct: correct, total: mock.questions.length,
      scaled: scaledFromAccuracy(acc), byDomain: byDomain
    };
    mock.submitted = true;
    mock.result = result;
    recordMock(result);
    renderMockResults();
  }

  function renderMockResults() {
    var res = mock.result;
    var acc = res.correct / res.total;
    var pass = res.scaled >= CUT;

    var domainRows = DATA.meta.domains.map(function (d) {
      var b = res.byDomain[d.id];
      var p = b.t ? b.c / b.t : 0;
      var color = p >= 0.7 ? "var(--correct)" : p >= 0.5 ? "var(--warn)" : "var(--wrong)";
      return '<div class="dscore">' +
        '<span class="mono" style="font-size:.78rem;color:var(--muted)">D' + d.id + '</span>' +
        '<div class="dscore__bar"><span style="width:' + (p * 100).toFixed(0) + '%;background:' + color + '"></span></div>' +
        '<span class="dscore__pct">' + b.c + "/" + b.t + '</span>' +
      '</div>';
    }).join("");

    mount(
      '<div class="stack">' +
        '<section class="panel stack">' +
          '<div class="eyebrow">Mock exam result</div>' +
          '<h1 style="font-size:1.6rem">' + res.correct + " / " + res.total + " correct · " + pct(acc) + '%</h1>' +
          calibHTML(res.scaled, {
            note: (pass
              ? "Above the 720 cut on this mock. Keep verifying your weak domains below."
              : "Below the 720 cut on this mock. Focus your studying on the lower-scoring domains below.") +
              " Scaled score is an estimate, not the official scaling."
          }) +
        '</section>' +
        '<section class="panel">' +
          '<div class="eyebrow" style="margin-bottom:.7rem">Percent correct by domain</div>' +
          '<div class="results__domains">' + domainRows + '</div>' +
          '<p class="calib__note" style="margin-top:1rem">On the real exam, domain percentages are diagnostic only — your total scaled score determines pass/fail.</p>' +
        '</section>' +
        '<section class="panel"><div class="row">' +
          '<button class="btn btn--primary" id="retake">Take another mock</button>' +
          '<a class="btn btn--ghost" href="#/practice">Practice weak domains</a>' +
          '<a class="btn btn--ghost" href="#/">Home</a>' +
        '</div></section>' +
      '</div>',
      function () {
        document.getElementById("retake").addEventListener("click", function () {
          mock = null; renderMockIntro();
        });
      }
    );
  }

  /* ================= STUDY GUIDE ================= */
  function viewStudy() {

      return '<a href="#" data-goto="gsec-' + s.id + '">' + esc(s.label) + '</a>';

        inner = s.body.map(function (p) { return "<p>" + esc(p) + "</p>"; }).join("");
      } else if (s.kind === "reference") {

          }).join("");
      } else if (s.kind === "domain") {

          '<p class="overview">' + esc(s.overview) + '</p>' +
          '<ul>' + s.keyPoints.map(function (k) { return "<li>" + esc(k) + "</li>"; }).join("") + '</ul>' +
          '<div class="watchfor"><strong>Watch for:</strong> ' + esc(s.watchFor) + '</div>' +

          }).join("") + '</ul>';

      return '<section class="gsec panel" id="gsec-' + s.id + '">' +

          '<nav class="guide__toc" aria-label="Study guide sections">' + toc + '</nav>' +

      '</div>',
      function () {
        app.querySelectorAll("[data-goto]").forEach(function (a) {

  /* ================= ROUTER ================= */
  function currentRoute() {
    var h = location.hash.replace(/^#\/?/, "");
    if (h.indexOf("practice") === 0) return "practice";
    if (h.indexOf("mock") === 0) return "mock";
    if (h.indexOf("study") === 0) return "study";
    return "home";
  }

  function render() {
    var route = currentRoute();
    // clean up sessions when leaving their routes
    if (route !== "mock" && mock && !mock.submitted) { stopTimer(); mock = null; }
    if (route !== "practice" && practice && !practice.done) { practice = null; }

    document.querySelectorAll("#nav a").forEach(function (a) {
      a.classList.toggle("is-active", a.getAttribute("data-route") === route);
    });

    if (route === "practice") viewPractice();
    else if (route === "mock") viewMock();
    else if (route === "study") viewStudy();
    else viewHome();
  }

  window.addEventListener("hashchange", render);
  window.addEventListener("beforeunload", function (e) {
    if (mock && !mock.submitted) { e.preventDefault(); e.returnValue = ""; }
  });

  /* ================= BOOT ================= */
  function init(qData, guide) {
    DATA.meta = qData.meta;
    DATA.questions = qData.questions;
    DATA.questions.forEach(function (q) { DATA.byId[q.id] = q; });
    DATA.guide = guide;
    var linked = DATA.questions.filter(function (q) { return q.sourceUrl; }).length;
    var fc = document.getElementById("footCount");
    if (fc) fc.textContent = DATA.questions.length + " questions · " + linked + " with source links";
    render();
  }

  function boot() {
    // Standalone build: data is inlined on the page (works from file:// with no server).
    if (window.__CCAOF__ && window.__CCAOF__.questions && window.__CCAOF__.guide) {
      init(window.__CCAOF__.questions, window.__CCAOF__.guide);
      return;
    }
    // Served build: fetch the JSON files (needs http://, not file://).
    Promise.all([
      fetch("data/questions.json").then(function (r) { return r.json(); }),
      fetch("data/study-guide.json").then(function (r) { return r.json(); })
    ]).then(function (res) {
      init(res[0], res[1]);
    }).catch(function (err) {
      app.innerHTML = '<div class="panel empty"><h2>Couldn’t load the question bank.</h2>' +
        '<p>This page needs to be served over http (a local server), or use the single-file ' +
        '<code>ccao-f.html</code> build that works by double-clicking. Opening the multi-file ' +
        'version directly from disk is blocked by the browser.</p></div>';
      console.error(err);
    });
  }

  boot();
})();

</script>
</body>
</html>
