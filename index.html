ile, the documentation says you can:", "options": ["Only view it in chat", "Download it or save it directly to Google Drive", "Only print it", "Not access it"], "correct": [1], "rationale": "Files Claude creates can be downloaded or saved directly to Google Drive from the conversation, ready to open in Office or Google Workspace.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D3-41", "domain": 3, "type": "multi", "question": "Which are accurate per the file-creation documentation? (Select TWO.)", "options": ["Claude runs code in a private, sandboxed computing environment", "The maximum file size is 30MB per file", "Files can only be created on Enterprise", "Claude generates native video files"], "correct": [0, 1], "rationale": "File creation runs code in a private sandboxed environment and supports up to 30MB per file. It's available on all plans, and Claude does not generate video.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D4-22", "domain": 4, "type": "single", "question": "For a competitor comparison consolidating pricing, features, and reputation across several companies, the documented best-fit feature is:", "options": ["A single web search", "The Research feature, which runs chained searches and synthesizes a cited report", "Incognito chat", "The project name field"], "correct": [1], "rationale": "Research is designed for multi-source investigations like competitor comparisons — it runs multiple searches that build on each other and produces a synthesized, cited report.", "source": "Claude Help Center — Use research on Claude", "sourceUrl": "https://support.claude.com/en/articles/11088861-use-research-on-claude"}, {"id": "D4-23", "domain": 4, "type": "single", "question": "Per the documentation, Research can draw on which sources when connected?", "options": ["Only the open web", "Both the web and your internal context (Gmail, Google Calendar, Google Docs)", "Only your local disk", "Only Claude's training data"], "correct": [1], "rationale": "Research investigates across your internal context — such as Gmail, Calendar, and Google Docs when connected — and the web, letting it cross-reference internal and external information.", "source": "Claude Help Center — Use research on Claude", "sourceUrl": "https://support.claude.com/en/articles/11088861-use-research-on-claude"}, {"id": "D4-24", "domain": 4, "type": "single", "question": "An associate wants one thread that takes a CSV, builds a model, writes a memo, and produces a deck. Per the docs, file creation:", "options": ["Can't chain formats", "Supports multi-step, multi-format workflows from a single data source", "Requires a separate tool per format", "Only outputs plain text"], "correct": [1], "rationale": "The documentation shows Claude taking one data source (e.g., a CSV) and producing coordinated outputs — a model, a memo, and a presentation — within a single workflow.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D4-25", "domain": 4, "type": "single", "question": "Integrating Claude into an outbound-email workflow, the associate should design for the fact that Claude:", "options": ["Sends emails automatically", "Drafts emails but cannot send them — a person sends the draft, keeping a human checkpoint", "Deletes emails automatically", "Reads attachment contents and sends them"], "correct": [1], "rationale": "The Gmail connector lets Claude draft with context but not send; the person sends manually. This documented limit conveniently preserves a human checkpoint for outbound messages.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D4-26", "domain": 4, "type": "single", "question": "To help a new hire produce expert-level results from day one on a recurring task, the documented mechanism is:", "options": ["Custom instructions for everything", "A Skill that packages the team's proven approach and applies it automatically when relevant", "Incognito chat", "A longer prompt each time"], "correct": [1], "rationale": "Skills package institutional knowledge and proven workflows so anyone — including new members — gets consistent, expert-level results without re-explaining the standard.", "source": "Claude Help Center — Skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D4-27", "domain": 4, "type": "single", "question": "For a meeting-prep workflow that reads the calendar, finds the relevant email thread, and pulls a brief from Drive, the documented enabler is:", "options": ["Uploading screenshots", "Connecting Google Calendar, Gmail, and Drive connectors so Claude can gather that context when asked", "Turning memory off", "Renaming the project"], "correct": [1], "rationale": "Google Workspace connectors let Claude read calendar events, search email, and retrieve Drive files from the conversation — ideal for automated meeting prep — accessing data only when asked.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D4-28", "domain": 4, "type": "single", "question": "The documentation positions MCP/connectors and Skills in a workflow as:", "options": ["Interchangeable and identical", "Complementary — connectors give access to tools/data; Skills encode the procedure for using them", "Both only for coding", "Mutually exclusive"], "correct": [1], "rationale": "MCP connects Claude to external services and data; Skills provide procedural knowledge. Used together, connectors supply access while a Skill standardizes how to complete the task.", "source": "Claude Help Center — Skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D4-29", "domain": 4, "type": "single", "question": "For a business proposal requiring careful planning plus broad, cited research, the documented combination is:", "options": ["Neither feature", "Extended thinking combined with Research", "Incognito plus a new Project", "Web search with memory off"], "correct": [1], "rationale": "The docs recommend combining extended thinking (to plan the approach) with Research (to gather and synthesize information), which suits proposals and multi-paper analyses.", "source": "Claude Help Center — Web search, extended thinking, and research", "sourceUrl": "https://support.claude.com/en/articles/11095361-when-should-i-use-web-search-extended-thinking-and-research"}, {"id": "D4-30", "domain": 4, "type": "single", "question": "The documentation notes that Research can run in the background, which for workflows means the associate:", "options": ["Must watch every step", "Can navigate away or close the tab while Claude works, then return to a finished report", "Cannot use Claude for anything else", "Loses the results on navigation"], "correct": [1], "rationale": "Research works agentically in the background; you don't need to stay on the page. When complete, Claude outputs a structured, cited report you can return to.", "source": "Claude Help Center — Use research on Claude", "sourceUrl": "https://support.claude.com/en/articles/11088861-use-research-on-claude"}, {"id": "D4-31", "domain": 4, "type": "single", "question": "To keep a recurring initiative's context consistent across many chats and teammates, the documented structure is:", "options": ["One giant single conversation", "A Project bundling instructions and knowledge that all its chats inherit", "A fresh chat with no context each time", "Incognito chat"], "correct": [1], "rationale": "Projects bundle shared instructions and a knowledge base that every chat inherits, so recurring work stays consistent; on Team/Enterprise, projects can be shared with collaborators.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D4-32", "domain": 4, "type": "single", "question": "File creation, per the documentation, changes the associate's role from advisor-only by letting Claude:", "options": ["Only give verbal advice", "Write and run code to produce the actual files and analyses, turning idea into deliverable", "Replace the associate entirely", "Avoid all technical work"], "correct": [1], "rationale": "By writing and running code in a sandbox, Claude becomes an active collaborator that produces real files and analyses — you bring context and strategy; Claude handles implementation.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D4-33", "domain": 4, "type": "single", "question": "The documentation says Skills 'combine' or 'stack,' which for multi-area work means Claude:", "options": ["Requires manual selection of each skill", "Automatically identifies which skills are needed and coordinates their use", "Can only ever use one skill", "Ignores skills in complex tasks"], "correct": [1], "rationale": "Skills are composable: Claude automatically identifies and coordinates the relevant skills for a multi-step task, without you selecting each one manually.", "source": "Claude Help Center — Skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D4-34", "domain": 4, "type": "single", "question": "A stakeholder wants Claude to 'fully automate' approvals in a workflow. The best documented-aligned design keeps:", "options": ["No human involvement", "A human checkpoint before consequential actions (e.g., Claude drafts; a person approves/sends)", "Claude sending all outbound communication", "All review removed"], "correct": [1], "rationale": "Responsible integration retains human checkpoints for consequential actions; documented limits like 'Claude drafts but doesn't send email' reinforce keeping a person accountable.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D4-35", "domain": 4, "type": "single", "question": "When Research lacks vital context in the initial prompt, the documentation notes Claude may:", "options": ["Fabricate the missing context", "Pause and ask follow-up/scoping questions to narrow the investigation", "Refuse entirely", "Ignore the request"], "correct": [1], "rationale": "If the brief lacks scope, Research can ask scoping questions before starting, which helps target the investigation and avoid wasted effort on a vague prompt.", "source": "Claude Help Center — Use research on Claude", "sourceUrl": "https://support.claude.com/en/articles/11088861-use-research-on-claude"}, {"id": "D5-23", "domain": 5, "type": "single", "question": "Per the documentation, project instructions work best when they contain:", "options": ["Every task-specific detail for all future chats", "General context, key guidelines, and Claude's role — with task-specific detail reserved for the chat", "Only the project name", "Nothing"], "correct": [1], "rationale": "The docs advise keeping project instructions concise: general context, key guidelines, and Claude's role. Put task-specific instructions in the individual chat, not the project instructions.", "source": "Claude Help Center — How usage and length limits work", "sourceUrl": "https://support.claude.com/en/articles/11647753-how-do-usage-and-length-limits-work"}, {"id": "D5-24", "domain": 5, "type": "single", "question": "To keep a project performing well over time, the documentation recommends periodically:", "options": ["Adding every file you can find", "Removing files you're no longer actively using", "Deleting the instructions", "Never touching it"], "correct": [1], "rationale": "Regularly cleaning up unused project files helps maximize available context and keeps the project focused on currently relevant knowledge.", "source": "Claude Help Center — How usage and length limits work", "sourceUrl": "https://support.claude.com/en/articles/11647753-how-do-usage-and-length-limits-work"}, {"id": "D5-25", "domain": 5, "type": "single", "question": "Where does the documentation say individual Free/Pro/Max users enable code execution and file creation?", "options": ["It's always on and cannot be changed", "Settings > Capabilities — enable 'Code execution and file creation'", "In the project name", "By emailing Anthropic"], "correct": [1], "rationale": "For individual Free/Pro/Max plans, you enable 'Code execution and file creation' under Settings > Capabilities. This capability also powers artifacts and Skills.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D5-26", "domain": 5, "type": "single", "question": "For new Enterprise organizations, the documentation states code execution and file creation is enabled by default with:", "options": ["Full network egress on", "'Allow network egress' toggled off by default", "No sandbox", "All security off"], "correct": [1], "rationale": "For new Enterprise orgs, the capability is on by default with network egress toggled off — the most secure baseline, so nothing can be transmitted outside the sandbox.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D5-27", "domain": 5, "type": "single", "question": "Per the documentation, before individual Team/Enterprise members can use Google Workspace connectors, an admin must:", "options": ["Do nothing", "Enable the connectors at the organization level (Owner/Primary Owner)", "Delete all projects", "Turn off memory"], "correct": [1], "rationale": "On Team and Enterprise plans, an Owner or Primary Owner enables Google Workspace connectors at the organization level before individual members can authenticate them.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D5-28", "domain": 5, "type": "single", "question": "The Google Workspace connectors (Gmail, Calendar, Drive) are, per the documentation, available to:", "options": ["Enterprise only", "All users on Claude and Claude Desktop (with org enablement required on Team/Enterprise)", "No one", "Free only"], "correct": [1], "rationale": "Google Workspace connectors are available to all users on Claude and Claude Desktop; Team/Enterprise require org-level enablement first.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D5-29", "domain": 5, "type": "single", "question": "Per the documentation, using Skills requires which capability to be enabled?", "options": ["Incognito", "Code execution", "A bigger context window", "The Research toggle"], "correct": [1], "rationale": "Skills require code execution to be enabled. Anthropic's built-in document skills then invoke automatically when relevant.", "source": "Claude Help Center — Skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D5-30", "domain": 5, "type": "single", "question": "To upload a custom Skill, the documentation says you package the skill folder as:", "options": ["A single PDF", "A ZIP file, then add it under Customize > Skills", "An email attachment to support", "A spreadsheet"], "correct": [1], "rationale": "You create the skill folder (with a SKILL.md), package it as a ZIP, and upload it under Customize > Skills. Uploaded custom skills are private to your account unless shared.", "source": "Claude Help Center — Skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D5-31", "domain": 5, "type": "single", "question": "For consistent workflows across a team, the documentation says Team/Enterprise Owners can:", "options": ["Only use personal skills", "Provision skills organization-wide so they appear for all users", "Never share skills", "Delete members' chats"], "correct": [1], "rationale": "Owners on Team/Enterprise can provision skills org-wide; those skills appear for all users with a team indicator, ensuring consistent workflows without individual setup.", "source": "Claude Help Center — Skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D5-32", "domain": 5, "type": "single", "question": "For the most secure code-execution configuration, the documentation recommends organizations:", "options": ["Enable full network access immediately", "Start with network access off, then adjust as the team builds confidence", "Disable the sandbox", "Share credentials in chat"], "correct": [1], "rationale": "The recommended cautious baseline is network access off (most secure) — Claude can still execute code and create files, but cannot transmit anything externally — enabling trusted domains later if desired.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D5-33", "domain": 5, "type": "single", "question": "When a source policy document changes, the documented maintenance step for a project is to:", "options": ["Leave the old file in place", "Update or replace the file in the project knowledge base", "Rename the project", "Turn off memory"], "correct": [1], "rationale": "Project knowledge grounds responses, so updating or replacing outdated files keeps every chat in the project referencing the current policy.", "source": "Claude Help Center — What are projects", "sourceUrl": "https://support.claude.com/en/articles/9517075-what-are-projects"}, {"id": "D5-34", "domain": 5, "type": "single", "question": "Per the documentation, connectors respect access such that Claude:", "options": ["Can reach data you cannot", "Mirrors your existing permissions and cannot access what you can't already access", "Ignores permissions", "Needs your password in chat"], "correct": [1], "rationale": "Claude mirrors your existing Google Workspace permissions; you cannot access anything through a connector that you don't already have access to. Data is retrieved only when you ask.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D5-35", "domain": 5, "type": "single", "question": "The documentation notes tools and connectors are token-intensive, which means managing them helps:", "options": ["Nothing", "Maximize your available context window and optimize usage limits", "Increase the file size limit", "Disable memory"], "correct": [1], "rationale": "Because tools and connectors consume tokens, managing which are enabled helps preserve context-window space and optimize your usage limits.", "source": "Claude Help Center — How usage and length limits work", "sourceUrl": "https://support.claude.com/en/articles/11647753-how-do-usage-and-length-limits-work"}, {"id": "D5-36", "domain": 5, "type": "single", "question": "Per the documentation, a custom Skill's instructions live in:", "options": ["A .xlsx file", "A SKILL.md Markdown file (with optional scripts and resources)", "The project description", "A video file"], "correct": [1], "rationale": "A skill is a folder containing a SKILL.md Markdown file with instructions; you can add optional scripts and resources for more advanced functionality.", "source": "Claude Help Center — Skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D5-37", "domain": 5, "type": "single", "question": "Anthropic's built-in document Skills, per the documentation, cover creation of:", "options": ["Only text files", "Excel, Word, PowerPoint, and PDF files", "Only images", "Only web pages"], "correct": [1], "rationale": "Built-in Anthropic skills provide enhanced creation for Excel, Word, PowerPoint, and PDF files, and Claude invokes them automatically when relevant (with code execution enabled).", "source": "Claude Help Center — Skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D5-38", "domain": 5, "type": "multi", "question": "Which are documented ways to maximize a project's available context window? (Select THREE.)", "options": ["Keep project instructions concise", "Remove files you no longer use", "Rely on projects' RAG to load only relevant content", "Add as many unused files as possible", "Write the longest instructions you can"], "correct": [0, 1, 2], "rationale": "Concise instructions, removing unused files, and leaning on RAG all help preserve context. Piling on unused files or bloating instructions does the opposite.", "source": "Claude Help Center — How usage and length limits work", "sourceUrl": "https://support.claude.com/en/articles/11647753-how-do-usage-and-length-limits-work"}, {"id": "D6-23", "domain": 6, "type": "single", "question": "Per Anthropic's Privacy Center, the consumer setting that controls whether your chats train future models is:", "options": ["'Incognito only'", "The 'Help improve Claude' model-improvement toggle in Privacy Settings", "The project name", "The usage dashboard"], "correct": [1], "rationale": "On consumer plans (Free, Pro, Max), the 'Help improve Claude' toggle in Privacy Settings controls whether your chats and coding sessions are used to improve models. It's a user choice.", "source": "Anthropic Privacy Center — Model improvement privacy settings", "sourceUrl": "https://privacy.claude.com/en/articles/12109829-how-do-i-change-my-model-improvement-privacy-settings"}, {"id": "D6-24", "domain": 6, "type": "single", "question": "If a consumer user turns the model-improvement setting off, the documentation says Anthropic:", "options": ["Deletes all past chats immediately", "Won't use new chats/coding sessions for future training, though data already in a training run can't be pulled back", "Retroactively removes data from trained models", "Ignores the setting"], "correct": [1], "rationale": "Turning it off is forward-looking: new conversations won't be used for future training, but data already included in a started training run or an already-trained model cannot be retracted.", "source": "Anthropic Privacy Center — Model improvement privacy settings", "sourceUrl": "https://privacy.claude.com/en/articles/12109829-how-do-i-change-my-model-improvement-privacy-settings"}, {"id": "D6-25", "domain": 6, "type": "single", "question": "Even with model improvement turned off, the documentation notes conversations may still be used if:", "options": ["They are short", "Safety classifiers flag them — for trust & safety, detecting harmful content, and policy enforcement", "They mention a competitor", "They are in a project"], "correct": [1], "rationale": "Opting out doesn't exempt flagged content: conversations flagged by trust-and-safety classifiers may still be reviewed and used to improve safety systems and enforce policy.", "source": "Anthropic Privacy Center — Model improvement privacy settings", "sourceUrl": "https://privacy.claude.com/en/articles/12109829-how-do-i-change-my-model-improvement-privacy-settings"}, {"id": "D6-26", "domain": 6, "type": "single", "question": "Per the Privacy Center, incognito chats are:", "options": ["Sometimes used for training", "Never used to improve Claude, even if model improvement is enabled", "Always used for training", "Only private on Enterprise"], "correct": [1], "rationale": "Incognito chats are never used to improve Claude, even if you've enabled model improvement — making them suitable for sensitive, one-off conversations.", "source": "Anthropic Privacy Center — Is my data used for model training?", "sourceUrl": "https://privacy.claude.com/en/articles/10023580-is-my-data-used-for-model-training"}, {"id": "D6-27", "domain": 6, "type": "single", "question": "According to the Privacy Center, the data Anthropic may use to improve models does NOT include:", "options": ["Custom styles and conversation preferences", "Raw content from connectors (e.g., Google Drive) or MCP servers, unless directly copied into the chat", "The related conversation", "Claude for Chrome data"], "correct": [1], "rationale": "Training data may include the conversation, custom styles, and preferences, but not raw connector or MCP content — unless that content is directly copied into the conversation with Claude.", "source": "Anthropic Privacy Center — Is my data used for model training?", "sourceUrl": "https://privacy.claude.com/en/articles/10023580-is-my-data-used-for-model-training"}, {"id": "D6-28", "domain": 6, "type": "single", "question": "The documentation states that by default, model training does NOT use data from:", "options": ["Free consumer chats", "Commercial products — Team, Enterprise, and the API (and government) — which aren't used for training by default", "Any account", "Pro accounts only"], "correct": [1], "rationale": "Claude for Work (Team/Enterprise), the API, and government offerings are not used for model training by default; the opt-in training choice applies to consumer plans (Free, Pro, Max).", "source": "Anthropic Privacy Center — Is my data used for model training?", "sourceUrl": "https://privacy.claude.com/en/articles/10023580-is-my-data-used-for-model-training"}, {"id": "D6-29", "domain": 6, "type": "single", "question": "Per the Privacy Center, when you submit thumbs up/down feedback, Anthropic stores the related conversation:", "options": ["For 24 hours", "In its secured back-end for up to 5 years", "Never", "Only if you're on Enterprise"], "correct": [1], "rationale": "Submitting thumbs up/down feedback stores the entire related conversation (including content, custom styles, and preferences) in Anthropic's secured back-end for up to five years.", "source": "Anthropic Privacy Center — Is my data used for model training?", "sourceUrl": "https://privacy.claude.com/en/articles/10023580-is-my-data-used-for-model-training"}, {"id": "D6-30", "domain": 6, "type": "single", "question": "Regarding Google Workspace connector data, the documentation states Anthropic:", "options": ["Trains models on your Gmail, Drive, and Calendar data", "Does not train models on your Gmail, Drive, or Calendar connector data", "Sells connector data", "Keeps it forever regardless of the chat"], "correct": [1], "rationale": "Anthropic does not train on Gmail, Drive, or Calendar connector data. Retrieved data is stored with the chat, so deleting the chat deletes that retrieved data.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D6-31", "domain": 6, "type": "single", "question": "The file-creation feature can grant Claude internet access, which the documentation says means associates should:", "options": ["Ignore any risk", "Monitor chats closely when working with sensitive data (or disable network egress)", "Share all data freely", "Turn off the sandbox"], "correct": [1], "rationale": "Because the feature can give Claude limited internet access, Anthropic advises monitoring chats with sensitive data; disabling network egress eliminates the external-transmission risk entirely.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D6-32", "domain": 6, "type": "single", "question": "For handling regulated personal data before analysis, the responsible-use approach consistent with the docs is to:", "options": ["Upload it as-is because it's internal", "Anonymize or redact identifiers first, and follow org policy and least-access handling", "Instruct Claude not to retain it and proceed", "Skip the task entirely"], "correct": [1], "rationale": "Applying data-sensitivity safeguards means anonymizing/redacting regulated identifiers before use and following policy; connectors also retrieve only the minimum needed and mirror your permissions.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D6-33", "domain": 6, "type": "single", "question": "Per the documentation, deleting a chat that used a connector will:", "options": ["Have no effect on retrieved data", "Delete the data retrieved during that chat, since it's stored with the conversation", "Retrain the model", "Notify all org members"], "correct": [1], "rationale": "Connector-retrieved data is stored with its associated chat, so deleting the chat deletes that retrieved data — a straightforward control for connector data.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D6-34", "domain": 6, "type": "single", "question": "On Team/Enterprise, the documentation notes incognito chats are:", "options": ["Never retained at all", "Retained for a limited period for safety and included in organizational exports/Compliance API", "Shared publicly", "Used for training"], "correct": [1], "rationale": "While incognito chats aren't saved to your history, on Team/Enterprise they're retained briefly (e.g., ~30 days) for safety and appear in organizational exports and the Compliance API — so they aren't a non-retention guarantee.", "source": "Claude Help Center — Use incognito chats", "sourceUrl": "https://support.claude.com/en/articles/12260368-use-incognito-chats"}, {"id": "D6-35", "domain": 6, "type": "single", "question": "A governance-appropriate reason to prefer incognito chat for a sensitive one-off is that it:", "options": ["Makes Claude faster", "Keeps the conversation out of chat history and memory (and out of training)", "Increases the usage limit", "Publishes the chat"], "correct": [1], "rationale": "Incognito chats aren't saved to history or memory and are never used for training, which suits sensitive, one-off conversations you don't want retained or personalized on.", "source": "Claude Help Center — Use incognito chats", "sourceUrl": "https://support.claude.com/en/articles/12260368-use-incognito-chats"}, {"id": "D6-36", "domain": 6, "type": "multi", "question": "Which are accurate per Anthropic's privacy documentation? (Select TWO.)", "options": ["Incognito chats are never used to improve Claude", "Team/Enterprise/API data is not used for training by default", "Opting out removes data from already-trained models", "Connector raw content is always used for training"], "correct": [0, 1], "rationale": "Incognito is never used for training, and commercial (Team/Enterprise/API) data isn't used for training by default. Opting out is forward-looking, and connector raw content isn't used unless copied into the chat.", "source": "Anthropic Privacy Center — Is my data used for model training?", "sourceUrl": "https://privacy.claude.com/en/articles/10023580-is-my-data-used-for-model-training"}, {"id": "D7-16", "domain": 7, "type": "single", "question": "An associate toggled Research on, but Claude answered instantly without deep investigation. A documented check is to confirm:", "options": ["Memory is off", "Web search is turned on (Research requires it) and Research is actually active", "The project is renamed", "Incognito is on"], "correct": [1], "rationale": "Research requires web search to be on and the Research indicator to be active. If Claude answers shallowly, verify both are enabled (you can also explicitly ask it to use Research).", "source": "Claude Help Center — Use research on Claude", "sourceUrl": "https://support.claude.com/en/articles/11088861-use-research-on-claude"}, {"id": "D7-17", "domain": 7, "type": "single", "question": "Claude isn't producing downloadable files for an associate. The documented first fix is to:", "options": ["Buy Enterprise", "Enable Code execution and file creation in Settings > Capabilities", "Delete the project", "Turn off web search"], "correct": [1], "rationale": "File creation (and artifacts) require Code execution and file creation to be enabled in Settings > Capabilities (or Organization settings for Team/Enterprise).", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D7-18", "domain": 7, "type": "single", "question": "An associate hits their usage limit mid-task. Per the documentation, the options are to:", "options": ["Only wait forever", "Wait for the five-hour reset, upgrade the plan, or (on paid plans) use usage credits", "Delete their account", "Switch browsers"], "correct": [1], "rationale": "When you hit a usage limit, you wait for the reset, upgrade, or purchase/enable usage credits (Pro/Max) to continue at standard API rates. Sessions reset every five hours.", "source": "Claude Help Center — How usage and length limits work", "sourceUrl": "https://support.claude.com/en/articles/11647753-how-do-usage-and-length-limits-work"}, {"id": "D7-19", "domain": 7, "type": "single", "question": "An associate hits a length limit in a single long conversation. The documented remedy is to:", "options": ["Keep adding to the same chat", "Start a new conversation, or use projects to work with larger amounts of information efficiently", "Upgrade to Enterprise only", "Disable memory"], "correct": [1], "rationale": "Length limits cap a single conversation; the fix is to start a new chat or use projects (RAG) to handle larger information more efficiently, rather than forcing more into one thread.", "source": "Claude Help Center — How usage and length limits work", "sourceUrl": "https://support.claude.com/en/articles/11647753-how-do-usage-and-length-limits-work"}, {"id": "D7-20", "domain": 7, "type": "single", "question": "A Google connector shows a 'you may need to reconnect' error. The documented fix is to:", "options": ["Reinstall the operating system", "Go to Customize > Connectors, disconnect the Google connector, and re-authenticate on next use", "Delete all chats", "Turn off code execution"], "correct": [1], "rationale": "The documented remedy is to disconnect the Google connector under Customize > Connectors and re-authenticate the next time you use a Workspace feature; if needed, remove the connection in your Google account settings.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D7-21", "domain": 7, "type": "single", "question": "A workflow is accurate but burning usage quickly on routine steps. A documented optimization is to:", "options": ["Always use Opus", "Use efficient models (Haiku or the most recent Sonnet) for most tasks and reserve Opus for the hardest work", "Add more connectors", "Lengthen every prompt"], "correct": [1], "rationale": "The docs recommend efficient models — Haiku or the most recent Sonnet — for most tasks at lower token cost, keeping Opus for genuinely complex work, to optimize usage.", "source": "Claude Help Center — Manage usage credits", "sourceUrl": "https://support.claude.com/en/articles/12429409-manage-usage-credits-for-paid-claude-plans"}, {"id": "D7-22", "domain": 7, "type": "single", "question": "A custom Skill isn't activating. Consistent with the documentation, the associate should first check that:", "options": ["The Wi-Fi is on", "The skill's description clearly states when to use it (and code execution is enabled)", "They have five projects", "Memory is off"], "correct": [1], "rationale": "Skills load based on their description via progressive disclosure; a vague description is the common reason one doesn't fire. Also confirm code execution is enabled, which Skills require.", "source": "Claude Help Center — Skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D7-23", "domain": 7, "type": "single", "question": "A long single chat is losing earlier context. Beyond starting fresh, a documented structural optimization is to:", "options": ["Add unrelated topics", "Move the work into a project, where RAG loads relevant knowledge efficiently", "Turn off web search", "Rename the chat repeatedly"], "correct": [1], "rationale": "Projects use RAG to work with larger amounts of information efficiently, which helps when a single conversation is hitting length limits or losing track of earlier context.", "source": "Claude Help Center — How usage and length limits work", "sourceUrl": "https://support.claude.com/en/articles/11647753-how-do-usage-and-length-limits-work"}, {"id": "D1-33", "domain": 1, "type": "multi", "question": "Which are documented prompt-engineering techniques for Claude? (Select THREE.)", "options": ["Give clear, explicit instructions that state the task, audience, and format", "Provide one or more examples of the desired output", "Assign a relevant role or persona", "Use vague, ambiguous wording to keep the prompt short"], "correct": [0, 1, 2], "rationale": "Clarity/explicit instructions, examples (multishot), and role prompting are all documented techniques. Vague wording reduces quality.", "source": "Claude Docs — Prompt engineering best practices", "sourceUrl": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"}, {"id": "D2-48", "domain": 2, "type": "multi", "question": "Per the documentation, which are true of Artifacts? (Select TWO.)", "options": ["They're created for substantial, self-contained content (typically over 15 lines)", "They support a version selector and in-place editing for Markdown", "You must paste an API key to share one", "They're available only on Enterprise"], "correct": [0, 1], "rationale": "Artifacts are for substantial, self-contained, reusable content and support versions and in-place Markdown editing. Sharing needs no API key, and they're available on all plans.", "source": "Claude Help Center — What are artifacts and how do I use them", "sourceUrl": "https://support.claude.com/en/articles/9487310-what-are-artifacts-and-how-do-i-use-them"}, {"id": "D2-49", "domain": 2, "type": "multi", "question": "Before sharing a Claude-generated file externally, which steps does the documentation support? (Select TWO.)", "options": ["Review the formulas and data", "Check any sensitive content", "Assume it's final because Claude produced it", "Delete it unread"], "correct": [0, 1], "rationale": "Generated files are a strong starting point; the guidance is to verify formulas/data and review sensitive content before sharing. Assuming finality or discarding it are both wrong.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D3-42", "domain": 3, "type": "multi", "question": "Which are accurate about code execution and file creation? (Select THREE.)", "options": ["Available on all plans (Free through Enterprise)", "Maximum file size is 30MB per file", "Runs in a private, sandboxed computing environment", "Generates native video files", "Requires a separate paid add-on on every plan"], "correct": [0, 1, 2], "rationale": "It's available on all plans, caps files at 30MB, and runs in a sandbox. It doesn't produce video and needs no separate add-on.", "source": "Claude Help Center — Create and edit files with Claude", "sourceUrl": "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"}, {"id": "D3-43", "domain": 3, "type": "multi", "question": "Per the documentation, which help maximize a conversation's available context? (Select THREE.)", "options": ["Use Projects, whose RAG loads only relevant content", "Keep project instructions concise", "Turn off extended thinking when it isn't needed", "Attach every file you might ever need", "Never start a new conversation"], "correct": [0, 1, 2], "rationale": "Projects (RAG), concise instructions, and toggling extended thinking off all preserve context. Piling on files or refusing to start fresh do the opposite.", "source": "Claude Help Center — How usage and length limits work", "sourceUrl": "https://support.claude.com/en/articles/11647753-how-do-usage-and-length-limits-work"}, {"id": "D3-44", "domain": 3, "type": "multi", "question": "Which are true about the Research feature? (Select TWO.)", "options": ["It requires web search to be turned on", "It synthesizes multiple sources into a cited report", "It works with web search turned off", "It never uses your connected apps"], "correct": [0, 1], "rationale": "Research requires web search on and produces a cited, multi-source report drawing on the web and connected internal context (Gmail/Calendar/Docs).", "source": "Claude Help Center — Use research on Claude", "sourceUrl": "https://support.claude.com/en/articles/11088861-use-research-on-claude"}, {"id": "D5-39", "domain": 5, "type": "multi", "question": "Which are true of the Google Workspace connectors? (Select THREE.)", "options": ["Claude mirrors your existing permissions", "Gmail can draft messages but not send them", "On Team/Enterprise an Owner enables them organization-wide first", "Claude can reach files you don't have access to", "Connector data is used to train models by default"], "correct": [0, 1, 2], "rationale": "Connectors mirror your permissions, can draft (not send) email, and need org-level enablement on Team/Enterprise. Claude can't exceed your access, and connector data isn't used for training.", "source": "Claude Help Center — Use Google Workspace connectors", "sourceUrl": "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"}, {"id": "D5-40", "domain": 5, "type": "multi", "question": "Which are accurate about Skills? (Select THREE.)", "options": ["They require code execution to be enabled", "A skill is a folder containing a SKILL.md file", "Built-in Office/PDF skills invoke automatically when relevant", "Custom skills are automatically shared with everyone by default"], "correct": [0, 1, 2], "rationale": "Skills need code execution, are defined by a SKILL.md, and the built-in document skills auto-invoke. Custom skills are private unless you share them.", "source": "Claude Help Center — What are skills", "sourceUrl": "https://support.claude.com/en/articles/12512176-what-are-skills"}, {"id": "D6-37", "domain": 6, "type": "multi", "question": "Per Anthropic's privacy documentation, which are accurate? (Select THREE.)", "options": ["Incognito chats are never used to improve Claude", "Team, Enterprise, and API data isn't used for training by default", "Connector raw content isn't used for training unless copied into the chat", "Opting out removes your data from already-trained models", "Thumbs up/down feedback is discarded immediately"], "correct": [0, 1, 2], "rationale": "Incognito is never used for training; commercial (Team/Enterprise/API) data isn't by default; connector content isn't unless copied in. Opting out is forward-looking, and feedback is retained up to 5 years.", "source": "Anthropic Privacy Center — Is my data used for model training?", "sourceUrl": "https://privacy.claude.com/en/articles/10023580-is-my-data-used-for-model-training"}, {"id": "D6-38", "domain": 6, "type": "multi", "question": "Which are true of incognito chats? (Select TWO.)", "options": ["They aren't saved to your history or memory", "They're never used to improve Claude", "They increase your usage limit", "They can be reopened later"], "correct": [0, 1], "rationale": "Incognito chats aren't saved to history/memory and are never used for training. They don't change usage limits and can't be reopened.", "source": "Claude Help Center — Use incognito chats", "sourceUrl": "https://support.claude.com/en/articles/12260368-use-incognito-chats"}]}, "guide": {"title": "CCAO-F Study Guide", "subtitle": "Claude Certified Associate – Foundations", "sections": [{"id": "glance", "label": "Exam at a glance", "kind": "facts", "items": [["Exam code", "CCAO-F"], ["Items", "60 (multiple-choice + multiple-response)"], ["Time limit", "120 minutes"], ["Passing score", "720 on a 100–1,000 scale"], ["Delivery", "Proctored — online or Pearson VUE test center"], ["Fee", "$99 USD per attempt"], ["Validity", "12 months from award date"], ["Result", "Pass/fail + scaled score, plus percent-correct by domain"]]}, {"id": "how-to-use", "label": "How to use this guide", "kind": "prose", "body": ["This guide goes beyond the official exam blueprint: each domain below adds reference-grounded detail drawn from Anthropic's live documentation, with links so you can read the source. Pair it with the practice questions — answers tagged “Docs” link to the exact Help Center page that backs them.", "Fastest path to ready: skim the domain notes, take the free Anthropic Academy courses listed near the end (start with Claude 101 and AI Fluency), then drill with Practice and a full Mock exam. Aim for roughly 80% in practice before you sit the real thing — the 720 cut is about 69%, so give yourself margin.", "Everything here is an independent study aid built from public documentation; it is not affiliated with or endorsed by Anthropic, and the sample questions are illustrative, not from the live exam."]}, {"id": "scoring", "label": "How scoring works", "kind": "prose", "body": ["The exam is criterion-referenced: you're measured against a fixed standard set by subject-matter experts, not against other candidates. You pass by demonstrating the blueprint knowledge, not by beating a percentage of peers.", "Your total scaled score (100–1,000) determines pass/fail; the cut is 720. The per-domain percent-correct on your report is diagnostic only — it shows where you were strong or weak but does not decide your result.", "Practical takeaway: don't fixate on any single domain during the exam — every scored item counts toward the same total. In this app, the calibration bar estimates readiness from your practice accuracy; it's a study aid, not the official scaling."]}, {"id": "d1", "label": "Domain 1 · Prompting and Task Execution", "kind": "domain", "weight": 14, "overview": "Write effective prompts, decompose complex requests, iterate to improve quality, and adapt your approach to the task type.", "keyPoints": ["Be clear and direct: the docs say to treat Claude like a brilliant new colleague with no context — state the task, audience, format, tone, and length explicitly. Golden rule: if a colleague with minimal context would be confused by your prompt, so will Claude.", "Give examples (multishot): one good input–output example steers format and style better than a pile of adjectives.", "Assign a role/persona (in the prompt or Project instructions) to set the right perspective, vocabulary, and level of detail — it shapes tone, not factual accuracy.", "Decompose and chain: break a complex goal into ordered steps you can check; ask Claude to reason step by step for multi-step problems.", "Reduce hallucinations by explicitly allowing “I don't know” and asking Claude to flag uncertainty.", "Prefer positive instructions (“use a professional, courteous tone”) over stacking “don't” rules; be specific about length and format (“5 bullets, each under 15 words”).", "Don't over-engineer — longer prompts aren't automatically better; iterate on the first draft. Capture repeated work as a reusable template, and note that prompts largely carry across model upgrades.", "Stuck starting? The Claude Console has a prompt generator to draft a first prompt."], "watchFor": "The “best prompt” answer is almost always the most specific one that supplies context and constraints. Reusable templates beat re-writing instructions each time.", "refs": [["Be clear, direct, and detailed", "https://docs.claude.com/en/docs/build-with-claude/prompt-engineering/be-clear-and-direct"], ["Prompt engineering overview", "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"]]}, {"id": "d2", "label": "Domain 2 · Output Evaluation and Validation", "kind": "domain", "weight": 21, "overview": "The largest domain. Evaluate outputs for accuracy and completeness, spot hallucinations, inconsistencies, and bias, validate claims, and decide when human review is required.", "keyPoints": ["Verify before you trust: fluent, confident, well-structured output is not evidence of correctness — check specific claims, figures, and citations against authoritative sources.", "Hallucination = confident, plausible-sounding content that is fabricated or unsupported (invented citations, quotes, statistics). Self-reported confidence and answer length are not accuracy signals.", "The Research feature returns easy-to-check citations so you can trace each claim to its source — still verify anything high-stakes.", "File-creation outputs (Excel formulas, reports, decks) are a strong starting point, but the docs say to review formulas, data, and sensitive content before sharing.", "Match the need to the problem type: accuracy (wrong), completeness (missing required parts), consistency (self-contradiction), and bias (unfair assumptions) are distinct.", "Human review scales with stakes: legal, medical, financial, external, or regulated outputs need verification regardless of polish.", "Choose the output format for how it'll be consumed: an Artifact for substantial, reusable, editable deliverables (Claude makes one for self-contained content, typically over 15 lines); inline for quick replies; a downloadable file for polished .docx/.xlsx/.pptx/.pdf.", "Curate rather than paste raw output: select, verify, and organize the relevant, accurate points."], "watchFor": "When an answer sounds authoritative and cites something specific, that is exactly when to verify. Confidence is a style, not a fact-check.", "refs": [["Use research on Claude", "https://support.claude.com/en/articles/11088861-use-research-on-claude"], ["Create and edit files with Claude", "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"], ["What are artifacts?", "https://support.claude.com/en/articles/9487310-what-are-artifacts-and-how-do-i-use-them"], ["Web search vs. extended thinking vs. research", "https://support.claude.com/en/articles/11095361-when-should-i-use-web-search-extended-thinking-and-research"]]}, {"id": "d3", "label": "Domain 3 · Product and Model Selection", "kind": "domain", "weight": 12, "overview": "Select the right product feature and model tier, aligning to cost, speed, and quality, and manage context and memory.", "keyPoints": ["Match model to task and cost: the usage-credits guidance says to use the efficient Haiku model or the most recent Sonnet for most (and high-volume) work, reserving Opus for genuinely complex reasoning. Your plan sets usage limits, not which model you can pick.", "Projects are self-contained workspaces with shared instructions + a knowledge base; free users can create up to five, and paid plans scale large knowledge via RAG (up to ~10x) as it nears context limits.", "Research (paid plans) runs multiple web + internal searches into a cited report and requires web search to be turned on.", "Choose the retrieval tool: web search for current/changing facts; extended thinking for complex reasoning; Research for comprehensive, multi-source reports (roughly five or more tool calls).", "Context is finite — distinguish usage limits (quantity over time; session limit resets every five hours) from length limits (one conversation). Hit a length limit → start a new chat or use a Project (RAG loads only relevant content).", "Memory from chat history is available on all plans; searching past chats is paid-only and uses RAG; each Project has its own separate memory.", "Code execution & file creation (all plans) produces real .xlsx/.docx/.pptx/.pdf files (30MB/file) in a sandbox, and also powers artifacts and Skills."], "watchFor": "“Always use the top model” and “always use the cheapest” are both wrong. The right answer matches the tier to the task's real demands.", "refs": [["What are projects?", "https://support.claude.com/en/articles/9517075-what-are-projects"], ["Use research on Claude", "https://support.claude.com/en/articles/11088861-use-research-on-claude"], ["Usage and length limits", "https://support.claude.com/en/articles/11647753-how-do-usage-and-length-limits-work"], ["Chat search and memory", "https://support.claude.com/en/articles/11817273-use-claude-s-chat-search-and-memory-to-build-on-previous-context"], ["Manage usage credits (model efficiency)", "https://support.claude.com/en/articles/12429409-manage-usage-credits-for-paid-claude-plans"]]}, {"id": "d4", "label": "Domain 4 · Workflow Integration and Solution Design", "kind": "domain", "weight": 16, "overview": "Analyze requirements and use cases, use Claude for research/planning/optimization, support design and iteration, integrate into workflows, and communicate value and limits to stakeholders.", "keyPoints": ["Start from requirements and the use case: inputs, outputs, and success criteria — before choosing tools.", "Map the current process; target high-value, lower-risk steps; preserve (or replace) controls that catch costly errors instead of automating them away.", "Keep a human checkpoint before consequential actions. A concrete documented example: the Gmail connector lets Claude draft emails with context but cannot send them — a person sends the draft.", "Use Research to gather multi-source, cited input for plans and proposals, and combine it with extended thinking to plan the approach and then execute.", "Standardize recurring team deliverables with Skills so everyone gets consistent, expert-level results; ground a recurring initiative's context in a Project.", "Communicate realistic benefits alongside limitations and required oversight; never promise zero errors or full replacement.", "Know the associate scope boundary: escalate custom API integration and enterprise-scale agentic system design to Claude Architects/Developers."], "watchFor": "Associate scope = translate business needs into effective Claude use and know when to escalate. Building against APIs or designing agentic systems is out of scope.", "refs": [["Google Workspace connectors (draft vs. send)", "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"], ["Use research on Claude", "https://support.claude.com/en/articles/11088861-use-research-on-claude"], ["What are skills?", "https://support.claude.com/en/articles/12512176-what-are-skills"], ["What are projects?", "https://support.claude.com/en/articles/9517075-what-are-projects"]]}, {"id": "d5", "label": "Domain 5 · Configuration and Knowledge Management", "kind": "domain", "weight": 12, "overview": "Configure Projects with instructions and knowledge sources, manage connectors, write good system-level instructions, and keep configurations current.", "keyPoints": ["Project instructions are inherited by every chat — keep them to role, general context, and key guidelines, and put task-specifics in the chat. The project name and description are informational and are not seen by Claude.", "Project knowledge grounds responses in your team's current, approved documents; update or replace files when policy changes, and remove unused files to preserve context.", "Connectors (Gmail, Calendar, Drive) are available to all users; on Team/Enterprise an Owner or Primary Owner must enable them org-wide first. Claude mirrors your existing permissions, pulls only what you ask for, and reads Drive files as text content only (no images/comments).", "Enable Code execution & file creation in Settings > Capabilities (Free/Pro/Max) or Organization settings (Team/Enterprise) — it also powers artifacts and Skills.", "Skills are folders with a SKILL.md that load on demand via progressive disclosure (keeping context lean); built-in Office/PDF skills auto-invoke, org owners can provision skills, and custom skills are private unless shared.", "For code-execution security, network egress can be off, package-managers-only, or allowlisted domains — “off” is the most secure baseline (new Enterprise orgs default to off)."], "watchFor": "When a Project misbehaves, check the instructions first — is the rule stated clearly and not contradicted?", "refs": [["What are projects?", "https://support.claude.com/en/articles/9517075-what-are-projects"], ["Create and manage projects", "https://support.claude.com/en/articles/9519177-how-can-i-create-and-manage-projects"], ["Google Workspace connectors", "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"], ["Use skills in Claude", "https://support.claude.com/en/articles/12512180-use-skills-in-claude"], ["Create and edit files (capabilities + network)", "https://support.claude.com/en/articles/12111783-create-and-edit-files-with-claude"]]}, {"id": "d6", "label": "Domain 6 · Governance, Risk, and Responsible Use", "kind": "domain", "weight": 15, "overview": "Identify appropriate vs. inappropriate use cases, apply data-sensitivity/privacy/regulatory considerations, follow organizational AI policy, and weigh ethical implications.", "keyPoints": ["Handle sensitive data by policy: anonymize or redact regulated identifiers (PII, health, financial) and third-party-confidential information before use; data classified “restricted” → decline or escalate.", "Consumer training is opt-in: the “Help improve Claude” toggle in Privacy Settings controls whether your chats train future models, and turning it off is forward-looking (it can't pull back data already in a training run). Flagged conversations may still be used for safety even if you opt out.", "Team, Enterprise, and API data isn't used for training by default; Gmail/Drive/Calendar connector data isn't used for training unless you copy it into the chat; incognito chats are never used for training.", "Thumbs up/down feedback stores the entire related conversation for up to five years.", "Incognito chat (ghost icon, outside projects) isn't saved to history or memory; on Team/Enterprise it's retained at least 30 days for safety and appears in organizational exports and the Compliance API.", "Keep a human accountable for decisions about people and watch for bias; don't present unverified output as authoritative legal, medical, or tax advice; be appropriately transparent about AI use; follow the org's AI policy and escalate when a use case is unclear.", "Code execution can give Claude limited internet access — monitor chats with sensitive data, or disable network egress to prevent data leaving the sandbox."], "watchFor": "The safe answer usually enables the task responsibly (anonymize, get clearance, escalate) rather than either uploading as-is or abandoning it entirely.", "refs": [["Is my data used for model training?", "https://privacy.claude.com/en/articles/10023580-is-my-data-used-for-model-training"], ["Model improvement privacy settings", "https://privacy.claude.com/en/articles/12109829-how-do-i-change-my-model-improvement-privacy-settings"], ["Use incognito chats", "https://support.claude.com/en/articles/12260368-use-incognito-chats"], ["Connectors (privacy & data handling)", "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"]]}, {"id": "d7", "label": "Domain 7 · Troubleshooting and Optimization", "kind": "domain", "weight": 10, "overview": "Diagnose and fix underperforming prompts and poor outputs, adjust based on feedback, and optimize workflows for efficiency and effectiveness.", "keyPoints": ["Off-target output? Diagnose the prompt first: clarify the goal, add missing context, specify format, give an example, or decompose the task — before switching tools.", "Dropped sections → enumerate every required part or split into steps. A format that's sometimes ignored → confirm the rule is stated clearly and not contradicted elsewhere.", "Long or drifting conversation → summarize the essentials and restart, or move the work into a Project (RAG loads only relevant context). A length limit → new chat or projects.", "Research not digging in? Confirm web search is on and Research is active — or prompt “Claude, please use the research tool to…”", "No files or artifacts appearing? Enable Code execution & file creation in Settings > Capabilities.", "Google connector erroring (“you may need to reconnect”) → Customize > Connectors, disconnect, then re-authenticate on next use.", "Too slow or costly at volume → route routine, high-volume steps to Haiku or the most recent Sonnet and reserve Opus for the hard steps. Optimize with evidence, one variable at a time, and capture what works as a reusable template or Skill."], "watchFor": "Repeating the identical prompt or declaring the task impossible are never the right troubleshooting answer.", "refs": [["Prompt engineering overview", "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"], ["Usage and length limits", "https://support.claude.com/en/articles/11647753-how-do-usage-and-length-limits-work"], ["Use research on Claude", "https://support.claude.com/en/articles/11088861-use-research-on-claude"], ["Google Workspace connectors (reconnect)", "https://support.claude.com/en/articles/10166901-use-google-workspace-connectors"]]}, {"id": "features", "label": "Claude feature reference (from the docs)", "kind": "reference", "intro": "Verified facts for the features the prep section names. The Docs-tagged practice questions are written against these pages.", "groups": [{"feature": "Projects", "facts": ["Self-contained workspaces with their own chat history and knowledge base; available on all plans (free users: up to five projects).", "Project instructions are inherited by every chat in the project; the name and description are informational and not seen by Claude.", "Knowledge-base files are available across all chats in the project; on paid plans, enhanced project knowledge scales large content via RAG (up to ~10x).", "Each project has its own scoped memory; contexts don't bleed across projects or into global memory. Team/Enterprise can share projects (can-use vs. can-edit)."]}, {"feature": "Artifacts", "facts": ["Created when content is significant, self-contained (typically over 15 lines), and likely to be edited, reused, or referred back to outside the chat.", "Require Code execution and file creation to be enabled — the same capability that powers Word/Excel/PowerPoint/PDF creation.", "Render in a side window and support a version selector; Markdown supports in-place ‘Edit with Claude’; your edits don't change Claude's memory of the original.", "AI-powered artifacts run on each user's own subscription (no API keys, free to share) — don't publish confidential information."]}, {"feature": "Code execution & file creation", "facts": ["Available to all plans (Free–Enterprise); creates .xlsx, .pptx, .docx, and .pdf files you can download or save to Google Drive.", "Runs code in a private, sandboxed computing environment; maximum file size is 30MB per file (uploads and downloads).", "Enabled in Settings > Capabilities (Free/Pro/Max) or Organization settings (Team/Enterprise). New Enterprise orgs default to network egress off.", "Network egress options: off (most secure), package-managers-only, or allowlisted domains. Review generated formulas, data, and sensitive content before sharing."]}, {"feature": "Memory & incognito", "facts": ["Memory from chat history is available on all plans; searching past chats is paid-only, uses RAG, and shows as a tool call. The memory summary refreshes about every 24 hours.", "Global memory synthesis excludes chats inside projects; deleting a conversation removes it from memory.", "Incognito chat (ghost icon, outside projects only) isn't saved to history or memory and can't be reopened.", "On Team/Enterprise, incognito chats are retained at least 30 days for safety and appear in organizational exports and the Compliance API."]}, {"feature": "Skills", "facts": ["Folders with a SKILL.md, loaded on demand via progressive disclosure (keeps context lean); require code execution.", "Built-in Anthropic skills (Excel, Word, PowerPoint, PDF) are invoked automatically when relevant; custom skills are private unless shared.", "A skill's description determines when it activates — a vague description is why a skill ‘won't fire’. Org owners can provision skills org-wide.", "MCP provides access to external tools/data; Skills provide the procedure for a task. Custom instructions are broad; Skills are task-specific."]}, {"feature": "Research, web search & extended thinking", "facts": ["Research (paid plans) runs multiple, building searches across the web and your connected Gmail/Calendar/Docs, producing a longer cited report; it requires web search to be on.", "Use web search for current/changing facts; extended thinking for complex reasoning; Research for multi-source reports (~5+ tool calls).", "Research runs agentically and can work in the background; if it answers shallowly, prompt it to ‘use the research tool’.", "Research draws on the same usage limits and can consume them faster."]}, {"feature": "Connectors (Google Workspace)", "facts": ["Gmail, Calendar, and Drive connectors are available to all users; on Team/Enterprise an Owner must enable them org-wide first.", "Claude mirrors your existing permissions, accesses data only when you ask, and reads Drive files as text content only (no images/comments).", "Gmail: search, read, and draft — but Claude cannot send email. Every action requires your approval.", "Anthropic doesn't train on connector data (unless you copy it into the chat); retrieved data is stored with the chat and deleted when you delete the chat."]}, {"feature": "Plans & usage limits", "facts": ["Pro is $20/month with at least 5x the free per-session usage; the session limit resets every five hours, with a separate weekly limit.", "Team supports up to 150 seats (minimum five); Standard seats get 1.25x Pro per-session usage, Premium seats 6.25x; limits are per-member, not pooled.", "Team includes centralized admin/billing, SSO and role-based access, and workplace connectors; go to Enterprise beyond 150 seats.", "Usage limits = quantity over time; length limits = how long one conversation can get. Paid plans can enable usage credits to continue at standard API rates."]}]}, {"id": "courses", "label": "Training courses (Anthropic Academy)", "kind": "courses", "intro": "Anthropic's official courses are free and hosted on Skilljar (Anthropic Academy). For CCAO-F, take them roughly in this order — Claude 101 and AI Fluency cover the most exam ground.", "items": [["Claude 101", "https://anthropic.skilljar.com/claude-101", "Start here. Everyday work tasks and core features (chats, file uploads, Projects) — foundational for every domain."], ["AI Fluency: Framework & Foundations", "https://anthropic.skilljar.com/ai-fluency-framework-foundations", "Collaborate with AI effectively, efficiently, ethically, and safely — maps to D1 (prompting), D2 (evaluation), and D6 (responsible use)."], ["AI Capabilities and Limitations", "https://anthropic.skilljar.com/ai-capabilities-and-limitations", "How AI works and where it fails — supports D2 (hallucinations/validation) and D6."], ["Introduction to Claude Cowork", "https://anthropic.skilljar.com/introduction-to-claude-cowork", "Task loop, file and research workflows, plugins and skills — supports D3/D4/D5."], ["Introduction to agent skills", "https://anthropic.skilljar.com/introduction-to-agent-skills", "Build, configure, and share Skills — supports D5 (configuration & knowledge management)."], ["Browse all Anthropic courses", "https://anthropic.skilljar.com/", "Full catalog on Skilljar (also API, MCP, and Claude Code courses for deeper/adjacent topics)."], ["Anthropic Academy (learning hub)", "https://www.anthropic.com/learn", "Landing page for Anthropic's learning resources and course paths."], ["CCAO-F certification & registration", "https://anthropic-partners.skilljar.com/claude-certified-associate-foundations-certification", "Official exam page (Anthropic Partner Network / Partner Academy) — exam guide, policies, and registration."]]}, {"id": "strategy", "label": "Test-taking strategy", "kind": "prose", "body": ["Read the stem for the decision it asks for — usually ‘the most appropriate action.’ Many options are true-ish; pick the one that best fits responsible, effective practice.", "Watch for absolute distractors: ‘always,’ ‘never,’ ‘send as-is,’ ‘no review.’ They're usually wrong. Balanced answers that verify, anonymize, escalate, or match the tool to the task are usually right.", "Multiple-response items tell you how many to select — select exactly that many.", "Eliminate the two clearly-wrong options first, then choose between the remaining two on which is safer and more effective.", "With 60 items in 120 minutes you have ~2 minutes each — flag hard ones and move on, then return."]}, {"id": "logistics", "label": "Exam-day logistics", "kind": "prose", "body": ["Register through the Anthropic Partner Network / Partner Academy; the exam is delivered by Pearson VUE (online-proctored or test center).", "Bring valid, unexpired, government-issued photo ID whose name matches your registration exactly.", "You may cancel or reschedule up to 24 hours before; changes inside 24 hours forfeit the fee.", "Keep your workspace clear — no phones, smart watches, headphones, notes, or secondary monitors. You must stay in view of the webcam if testing online.", "Retakes: 14 days after a first fail, 30 after a second, 90 after a third; up to four attempts per rolling 12 months, fee each time.", "You accept a confidentiality/NDA before starting; exam content is confidential and must not be disclosed."]}]}};</script>
<script>
/* ============================================================
   CCAO-F Practice Console — vanilla SPA, no build step.
   Data: data/questions.json, data/study-guide.json
   Persistence: localStorage (progress + mock history)
   ============================================================ */
(function () {
  "use strict";

  var STORE_KEY = "ccaof_v1";
  var MOCK_COUNT = 60;
  var MOCK_SECONDS = 120 * 60;
  var CUT = 720;

  var DATA = { meta: null, questions: [], byId: {}, guide: null };
  var app = document.getElementById("app");

  var practice = null; // active practice session
  var mock = null;     // active mock session
  var mockTimer = null;

  /* ---------------- utils ---------------- */
  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function shuffle(a) {
    a = a.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }
  function letter(i) { return String.fromCharCode(65 + i); }
  function rangeArr(n) { var a = []; for (var i = 0; i < n; i++) a.push(i); return a; }
  // Stable per-session shuffled display order for a question's options.
  // bag is keyed by question id so options don't jump around between re-renders.
  function permFor(bag, id, n) {
    if (!bag[id]) bag[id] = shuffle(rangeArr(n));
    return bag[id];
  }
  function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }
  function setsEqual(sel, key) {
    if (sel.size !== key.length) return false;
    for (var i = 0; i < key.length; i++) if (!sel.has(key[i])) return false;
    return true;
  }
  function domainName(id) {
    var d = DATA.meta.domains.find(function (x) { return x.id === id; });
    return d ? d.name : "Domain " + id;
  }
  function pct(n) { return Math.round(n * 100); }

  function scaledFromAccuracy(acc /* 0..1 */) {
    return Math.round(100 + clamp(acc, 0, 1) * 900);
  }

  /* ---------------- store ---------------- */
  function loadStore() {
    try {
      var raw = localStorage.getItem(STORE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { q: {}, mocks: [] };
  }
  function saveStore(s) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch (e) {}
  }
  function recordAttempt(qid, correct) {
    var s = loadStore();
    var rec = s.q[qid] || { attempts: 0, lastCorrect: false };
    rec.attempts += 1;
    rec.lastCorrect = !!correct;
    s.q[qid] = rec;
    saveStore(s);
  }
  function recordMock(result) {
    var s = loadStore();
    s.mocks = s.mocks || [];
    s.mocks.unshift(result);
    s.mocks = s.mocks.slice(0, 5);
    saveStore(s);
  }
  function computeReadiness() {
    var s = loadStore();
    var ids = Object.keys(s.q);
    var attempted = ids.length;
    var correct = 0;
    ids.forEach(function (id) { if (s.q[id].lastCorrect) correct++; });
    var acc = attempted ? correct / attempted : 0;
    return {
      attempted: attempted,
      total: DATA.questions.length,
      correct: correct,
      accuracy: acc,
      scaled: scaledFromAccuracy(acc),
      lastMock: (s.mocks && s.mocks[0]) || null
    };
  }

  /* ---------------- calibration bar ---------------- */
  function calibHTML(scaled, opts) {
    opts = opts || {};
    scaled = clamp(scaled, 100, 1000);
    var pctFill = ((scaled - 100) / 900) * 100;
    var pass = scaled >= CUT;
    return (
      '<div class="calib" style="--pct:' + pctFill.toFixed(1) + '%">' +
        '<div class="calib__head">' +
          '<div class="calib__score">' + scaled + '<span class="unit">/ 1000 est.</span></div>' +
          '<div class="calib__verdict ' + (pass ? "pass" : "below") + '">' +
            (pass ? "At or above cut" : "Below 720 cut") + '</div>' +
        '</div>' +
        '<div class="calib__track">' +
          '<div class="calib__fill ' + (pass ? "" : "below") + '"></div>' +
          '<div class="calib__cut"></div>' +
        '</div>' +
        '<div class="calib__cutlabel">720 · pass</div>' +
        '<div class="calib__scale"><span>100</span><span>1000</span></div>' +
        (opts.note ? '<div class="calib__note">' + opts.note + '</div>' : "") +
      '</div>'
    );
  }

  /* ---------------- mount helper ---------------- */
  function mount(html, after) {
    app.innerHTML = html;
    window.scrollTo(0, 0);
    if (after) after();
  }

  /* ================= HOME ================= */
  function viewHome() {
    var r = computeReadiness();
    var note = r.attempted === 0
      ? "Answer some practice questions and this estimate fills in. Estimated readiness maps your accuracy to the scaled range — it is a study aid, not the official scoring."
      : "Estimated from your last answer on " + r.attempted + " of " + r.total +
        " questions (" + pct(r.accuracy) + "% correct). This is a study aid, not the official scaled score.";

    var modes = [
      { href: "#/practice", num: "01", title: "Practice", desc: "Work through questions with instant answers and rationale. Filter by domain." },
      { href: "#/mock", num: "02", title: "Mock exam", desc: "60 questions, 120 minutes, no feedback until you submit — the real format." },
      { href: "#/study", num: "03", title: "Study guide", desc: "Domain-by-domain notes, scoring, strategy, and exam-day logistics." }
    ];

    var weightRows = DATA.meta.domains.map(function (d) {
      var w = d.weight;
      return (
        '<div class="wrow">' +
          '<span class="wrow__code mono">D' + d.id + '</span>' +
          '<div>' +
            '<div class="wrow__top"><span class="wrow__name">' + esc(d.name) + '</span></div>' +
            '<div class="wrow__bar"><span style="width:' + (w / 21 * 100).toFixed(0) + '%"></span></div>' +
          '</div>' +
          '<span class="wrow__meta">' + w + '%</span>' +
        '</div>'
      );
    }).join("");

    var facts = [
      ["Items", "60 · multiple-choice + multiple-response"],
      ["Time", "120 minutes"],
      ["Passing score", "720 on a 100–1,000 scale"],
      ["Fee", "$99 USD per attempt"],
      ["Validity", "12 months"],
      ["This bank", DATA.questions.length + " practice questions"]
    ].map(function (row) {
      return "<tr><td>" + esc(row[0]) + "</td><td>" + esc(row[1]) + "</td></tr>";
    }).join("");

    mount(
      '<div class="stack">' +
        '<section class="panel hero">' +
          '<div class="eyebrow">Claude Certified Associate · Foundations</div>' +
          '<h1 class="hero__title">Get exam-ready with calibrated practice.</h1>' +
          '<p class="hero__lead">A focused console for the CCAO-F exam: ' + DATA.questions.length +
            ' scenario questions weighted to the official blueprint, a full-length timed mock, and a study guide. Your progress stays on this device.</p>' +
          '<div style="margin-top:1.4rem">' +
            calibHTML(r.scaled, { note: note }) +
          '</div>' +
          '<div class="row" style="margin-top:1.4rem">' +
            '<a class="btn btn--primary" href="#/practice">Start practicing</a>' +
            '<a class="btn btn--ghost" href="#/mock">Take a mock exam</a>' +
          '</div>' +
        '</section>' +

        '<section class="grid-modes">' +
          modes.map(function (m) {
            return '<a class="modecard" href="' + m.href + '">' +
              '<span class="modecard__num">' + m.num + '</span>' +
              '<h3>' + m.title + '</h3><p>' + m.desc + '</p></a>';
          }).join("") +
        '</section>' +

        '<div class="grid-modes" style="align-items:start">' +
          '<section class="panel">' +
            '<div class="eyebrow" style="margin-bottom:.7rem">Blueprint weighting</div>' +
            '<div class="weights">' + weightRows + '</div>' +
          '</section>' +
          '<section class="panel">' +
            '<div class="eyebrow" style="margin-bottom:.7rem">Exam facts</div>' +
            '<table class="facts">' + facts + '</table>' +
          '</section>' +
        '</div>' +

        (loadStore().mocks && loadStore().mocks.length
          ? '<section class="panel"><div class="section-title"><div class="eyebrow">Recent mock exams</div>' +
              '<button class="linkbtn" id="reset">Reset all progress</button></div>' +
              recentMocksHTML() + '</section>'
          : '<section class="panel"><div class="row" style="justify-content:space-between">' +
              '<span class="wrow__meta">No mock attempts yet.</span>' +
              '<button class="linkbtn" id="reset">Reset all progress</button></div></section>') +
      '</div>',
      function () {
        var rb = document.getElementById("reset");
        if (rb) rb.addEventListener("click", function () {
          if (confirm("Clear all saved progress and mock history on this device?")) {
            localStorage.removeItem(STORE_KEY);
            render();
          }
        });
      }
    );
  }

  function recentMocksHTML() {
    var s = loadStore();
    return '<div class="results__domains">' + s.mocks.map(function (m) {
      var when = new Date(m.date);
      var passed = m.scaled >= CUT;
      return '<div class="dscore">' +
        '<span class="mono" style="grid-column:1/2;font-size:.72rem;color:var(--muted)">' +
          (when.getMonth() + 1) + "/" + when.getDate() + '</span>' +
        '<div class="dscore__bar"><span style="width:' + ((m.scaled - 100) / 900 * 100).toFixed(0) +
